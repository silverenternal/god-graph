[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = "thin"
codegen-units = 1

[package.metadata.docs.rs]
# 启用除 GPU 外的所有特性（GPU 需要 CUDA，docs.rs 不支持）
features = ["std", "parallel", "dot", "matrix", "simd", "tensor", "tensor-gnn", "tensor-pool", "transformer", "safetensors"]
rustdoc-args = ["--cfg", "docsrs"]
