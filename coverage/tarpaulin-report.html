{"Line":0}},{"line":261,"address":[],"length":0,"stats":{"Line":0}},{"line":263,"address":[],"length":0,"stats":{"Line":0}},{"line":266,"address":[],"length":0,"stats":{"Line":0}}],"covered":75,"coverable":118},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","flow.rs"],"content":"//! 最大流算法模块\n//!\n//! 包含 Edmonds-Karp、Dinic 等算法\n//!\n//! ## 内存优化\n//!\n//! 使用稀疏邻接表存储残量图，空间复杂度 O(V+E)：\n//! - `edmonds_karp`: 使用 `HashMap\u003cusize, Vec\u003c(usize, f64)\u003e\u003e` 存储残量图\n//! - `dinic`: 使用 `HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e` 存储残量\n//! - `push_relabel`: 使用 `HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e` 存储残量\n//!\n//! 对于稠密图（E ≈ V²），可考虑使用邻接矩阵实现（未提供）。\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse std::collections::{HashMap, VecDeque};\n\n/// Edmonds-Karp 最大流算法\n///\n/// 使用 BFS 寻找增广路的 Ford-Fulkerson 方法变体\n///\n/// # 参数\n/// * `graph` - 有向图\n/// * `source` - 源点\n/// * `sink` - 汇点\n/// * `capacity` - 获取边容量的闭包\n///\n/// # 返回\n/// 最大流值\n///\n/// # 复杂度\n/// - 时间：O(V * E²)\n/// - 空间：O(V + E)\n///\n/// # 示例\n/// ```\n/// use god_gragh::prelude::*;\n/// use god_gragh::algorithms::flow::edmonds_karp;\n///\n/// let mut graph = GraphBuilder::directed()\n///     .with_nodes(vec![\"S\", \"A\", \"B\", \"T\"])\n///     .with_edges(vec![\n///         (0, 1, 10.0), // S-\u003eA\n///         (0, 2, 5.0),  // S-\u003eB\n///         (1, 2, 15.0), // A-\u003eB\n///         (1, 3, 10.0), // A-\u003eT\n///         (2, 3, 10.0), // B-\u003eT\n///     ])\n///     .build()\n///     .unwrap();\n///\n/// let source = graph.nodes().next().unwrap().index();\n/// let sink = graph.nodes().nth(3).unwrap().index();\n/// let max_flow = edmonds_karp(\u0026mut graph, source, sink, |_, _, cap| *cap);\n/// assert_eq!(max_flow, 15.0);\n/// ```\npub fn edmonds_karp\u003cT, E, F\u003e(\n    graph: \u0026mut Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    sink: NodeIndex,\n    mut capacity: F,\n) -\u003e f64\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return 0.0;\n    }\n\n    // 收集所有节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let index_to_pos: HashMap\u003cusize, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, ni)| (ni.index(), i))\n        .collect();\n\n    // 构建残量邻接表：使用 HashMap 优化稀疏图内存使用\n    // adj[u] = [(v, capacity), ...]\n    // 空间复杂度：O(V + E)，而非邻接矩阵的 O(V²)\n    let mut adj: HashMap\u003cusize, Vec\u003c(usize, f64)\u003e\u003e = HashMap::with_capacity(n);\n\n    // 初始化残量图\n    for edge in graph.edges() {\n        if let Ok((src, tgt)) = graph.edge_endpoints(edge.index()) {\n            if let Some(\u0026u) = index_to_pos.get(\u0026src.index()) {\n                if let Some(\u0026v) = index_to_pos.get(\u0026tgt.index()) {\n                    let cap = capacity(src, tgt, edge.data());\n                    if cap \u003e 0.0 {\n                        adj.entry(u).or_default().push((v, cap));\n                        // 添加反向边（初始容量为 0）\n                        adj.entry(v).or_default().push((u, 0.0));\n                    }\n                }\n            }\n        }\n    }\n\n    let mut max_flow = 0.0;\n\n    // BFS 寻找增广路\n    fn bfs(\n        adj: \u0026HashMap\u003cusize, Vec\u003c(usize, f64)\u003e\u003e,\n        source_pos: usize,\n        sink_pos: usize,\n        n: usize,\n        parent: \u0026mut [(isize, usize)], // (parent, edge_index)\n    ) -\u003e bool {\n        parent.fill((-1, 0));\n        let mut visited = vec![false; n];\n        let mut queue = VecDeque::new();\n\n        queue.push_back(source_pos);\n        visited[source_pos] = true;\n\n        while let Some(u) = queue.pop_front() {\n            if let Some(neighbors) = adj.get(\u0026u) {\n                for (idx, (v, cap)) in neighbors.iter().enumerate() {\n                    if !visited[*v] \u0026\u0026 *cap \u003e 1e-9 {\n                        visited[*v] = true;\n                        parent[*v] = (u as isize, idx);\n                        if *v == sink_pos {\n                            return true;\n                        }\n                        queue.push_back(*v);\n                    }\n                }\n            }\n        }\n        false\n    }\n\n    let source_pos = *index_to_pos.get(\u0026source.index()).unwrap_or(\u00260);\n    let sink_pos = *index_to_pos.get(\u0026sink.index()).unwrap_or(\u00260);\n    let mut parent = vec![(-1, 0); n];\n\n    while bfs(\u0026adj, source_pos, sink_pos, n, \u0026mut parent) {\n        // 找到路径上的最小残量\n        let mut path_flow = f64::INFINITY;\n        let mut v = sink_pos;\n        while v != source_pos {\n            let (u, edge_idx) = parent[v];\n            let u = u as usize;\n            if let Some(neighbors) = adj.get(\u0026u) {\n                if let Some((_, cap)) = neighbors.get(edge_idx) {\n                    path_flow = path_flow.min(*cap);\n                }\n            }\n            v = u;\n        }\n\n        // 更新残量\n        let mut v = sink_pos;\n        while v != source_pos {\n            let (u, edge_idx) = parent[v];\n            let u = u as usize;\n            \n            // 更新正向边\n            if let Some(neighbors) = adj.get_mut(\u0026u) {\n                if let Some((_target, cap)) = neighbors.get_mut(edge_idx) {\n                    *cap -= path_flow;\n                    let target_val = *_target;\n                    // 找到反向边并更新\n                    if let Some(reverse_neighbors) = adj.get_mut(\u0026v) {\n                        if let Some((_, rev_cap)) = reverse_neighbors.iter_mut().find(|(t, _)| *t == target_val) {\n                            *rev_cap += path_flow;\n                        }\n                    }\n                }\n            }\n            v = u;\n        }\n\n        max_flow += path_flow;\n    }\n\n    max_flow\n}\n\n/// Dinic 最大流算法\n///\n/// 使用分层图和阻塞流的高效最大流算法\n///\n/// ## 内存优化\n///\n/// 使用 `HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e` 存储残量，空间复杂度 O(V+E)\n/// 对于稀疏图（E \u003c\u003c V²），比邻接矩阵 O(V²) 节省 10-100x 内存\n///\n/// # 复杂度\n/// - 时间：O(V² * E)\n/// - 空间：O(V + E)\npub fn dinic\u003cT, E, F\u003e(\n    graph: \u0026mut Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    sink: NodeIndex,\n    mut capacity: F,\n) -\u003e f64\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return 0.0;\n    }\n\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let index_to_pos: HashMap\u003cusize, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, ni)| (ni.index(), i))\n        .collect();\n\n    // 构建邻接表和残量图：使用 HashMap 优化稀疏图内存\n    // adj: 邻接表结构，residual: 残量 HashMap\n    let mut adj: Vec\u003cVec\u003cusize\u003e\u003e = vec![Vec::new(); n];\n    let mut residual: HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e = HashMap::with_capacity(n);\n\n    for edge in graph.edges() {\n        if let Ok((src, tgt)) = graph.edge_endpoints(edge.index()) {\n            if let (Some(\u0026u), Some(\u0026v)) = (\n                index_to_pos.get(\u0026src.index()),\n                index_to_pos.get(\u0026tgt.index()),\n            ) {\n                let cap = capacity(src, tgt, edge.data());\n                if !residual.get(\u0026u).map(|m| m.contains_key(\u0026v)).unwrap_or(false) {\n                    adj[u].push(v);\n                }\n                residual.entry(u).or_default().insert(v, cap);\n            }\n        }\n    }\n\n    let source_pos = *index_to_pos.get(\u0026source.index()).unwrap_or(\u00260);\n    let sink_pos = *index_to_pos.get(\u0026sink.index()).unwrap_or(\u00260);\n    let mut max_flow = 0.0;\n\n    // BFS 构建分层图\n    fn bfs_level(\n        adj: \u0026[Vec\u003cusize\u003e],\n        residual: \u0026HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e,\n        source_pos: usize,\n        sink_pos: usize,\n        level: \u0026mut [isize],\n    ) -\u003e bool {\n        let _n = adj.len();\n        level.fill(-1);\n        level[source_pos] = 0;\n        let mut queue = VecDeque::new();\n        queue.push_back(source_pos);\n\n        while let Some(u) = queue.pop_front() {\n            if let Some(neighbors) = adj.get(u) {\n                for \u0026v in neighbors {\n                    let cap = residual.get(\u0026u).and_then(|m| m.get(\u0026v)).copied().unwrap_or(0.0);\n                    if level[v] == -1 \u0026\u0026 cap \u003e 1e-9 {\n                        level[v] = level[u] + 1;\n                        if v == sink_pos {\n                            return true;\n                        }\n                        queue.push_back(v);\n                    }\n                }\n            }\n        }\n        false\n    }\n\n    // DFS 寻找阻塞流\n    fn dfs_block(\n        u: usize,\n        flow: f64,\n        sink_pos: usize,\n        adj: \u0026[Vec\u003cusize\u003e],\n        residual: \u0026mut HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e,\n        level: \u0026mut [isize],\n        ptr: \u0026mut [usize],\n    ) -\u003e f64 {\n        if u == sink_pos || flow \u003c 1e-9 {\n            return flow;\n        }\n\n        let start = ptr[u];\n        for i in start..adj[u].len() {\n            ptr[u] = i;\n            let v = adj[u][i];\n            let cap = residual.get(\u0026u).and_then(|m| m.get(\u0026v)).copied().unwrap_or(0.0);\n            if level[v] == level[u] + 1 \u0026\u0026 cap \u003e 1e-9 {\n                let pushed = dfs_block(\n                    v,\n                    flow.min(cap),\n                    sink_pos,\n                    adj,\n                    residual,\n                    level,\n                    ptr,\n                );\n                if pushed \u003e 1e-9 {\n                    *residual.entry(u).or_default().get_mut(\u0026v).unwrap() -= pushed;\n                    *residual.entry(v).or_default().entry(u).or_insert(0.0) += pushed;\n                    return pushed;\n                }\n            }\n        }\n        0.0\n    }\n\n    let mut level = vec![-1; n];\n    let mut ptr = vec![0; n];\n\n    while bfs_level(\u0026adj, \u0026residual, source_pos, sink_pos, \u0026mut level) {\n        ptr.fill(0);\n        while let Some(push) = {\n            let pushed = dfs_block(\n                source_pos,\n                f64::INFINITY,\n                sink_pos,\n                \u0026adj,\n                \u0026mut residual,\n                \u0026mut level,\n                \u0026mut ptr,\n            );\n            if pushed \u003e 1e-9 {\n                Some(pushed)\n            } else {\n                None\n            }\n        } {\n            max_flow += push;\n        }\n    }\n\n    max_flow\n}\n\n/// Push-Relabel 最大流算法（FIFO 队列优化）\n///\n/// 使用预流推进策略，通过高度标签和 FIFO 队列优化\n///\n/// ## 内存优化\n///\n/// 使用 `HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e` 存储残量，空间复杂度 O(V+E)\n///\n/// # 参数\n/// * `graph` - 有向图\n/// * `source` - 源点\n/// * `sink` - 汇点\n/// * `capacity` - 获取边容量的闭包\n///\n/// # 返回\n/// 最大流值\n///\n/// # 复杂度\n/// - 时间：O(V²E)（使用 FIFO 队列优化）\n/// - 空间：O(V + E)\n///\n/// # 示例\n/// ```\n/// use god_gragh::prelude::*;\n/// use god_gragh::algorithms::flow::push_relabel;\n///\n/// let mut graph = GraphBuilder::directed()\n///     .with_nodes(vec![\"S\", \"A\", \"B\", \"T\"])\n///     .with_edges(vec![\n///         (0, 1, 10.0), // S-\u003eA\n///         (0, 2, 5.0),  // S-\u003eB\n///         (1, 2, 15.0), // A-\u003eB\n///         (1, 3, 10.0), // A-\u003eT\n///         (2, 3, 10.0), // B-\u003eT\n///     ])\n///     .build()\n///     .unwrap();\n///\n/// let source = graph.nodes().next().unwrap().index();\n/// let sink = graph.nodes().nth(3).unwrap().index();\n/// let max_flow = push_relabel(\u0026mut graph, source, sink, |_, _, cap| *cap);\n/// assert_eq!(max_flow, 15.0);\n/// ```\npub fn push_relabel\u003cT, E, F\u003e(\n    graph: \u0026mut Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    sink: NodeIndex,\n    mut capacity: F,\n) -\u003e f64\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return 0.0;\n    }\n\n    // 收集所有节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let index_to_pos: HashMap\u003cusize, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, ni)| (ni.index(), i))\n        .collect();\n\n    let source_pos = index_to_pos[\u0026source.index()];\n    let sink_pos = index_to_pos[\u0026sink.index()];\n\n    // 构建邻接表和残量图：使用 HashMap 优化稀疏图内存\n    // 空间复杂度：O(V + E)，而非邻接矩阵的 O(V²)\n    let mut adj: Vec\u003cVec\u003cusize\u003e\u003e = vec![vec![]; n];\n    let mut residual: HashMap\u003cusize, HashMap\u003cusize, f64\u003e\u003e = HashMap::with_capacity(n);\n\n    // 初始化残量图\n    for edge in graph.edges() {\n        if let Ok((src, tgt)) = graph.edge_endpoints(edge.index()) {\n            if let Some(\u0026u) = index_to_pos.get(\u0026src.index()) {\n                if let Some(\u0026v) = index_to_pos.get(\u0026tgt.index()) {\n                    let cap = capacity(src, tgt, edge.data());\n                    residual.entry(u).or_default().insert(v, cap);\n                    adj[u].push(v);\n                    adj[v].push(u); // 反向边\n                }\n            }\n        }\n    }\n\n    // 高度标签和超额流\n    let mut height = vec![0; n];\n    let mut excess = vec![0.0; n];\n\n    // 初始化：源点高度为 n，推送初始流\n    height[source_pos] = n;\n\n    for \u0026v in \u0026adj[source_pos] {\n        if let Some(cap) = residual.get(\u0026source_pos).and_then(|m| m.get(\u0026v)).copied() {\n            if cap \u003e 1e-9 {\n                *residual.entry(source_pos).or_default().entry(v).or_insert(0.0) = 0.0;\n                *residual.entry(v).or_default().entry(source_pos).or_insert(0.0) = cap;\n                excess[v] = cap;\n                excess[source_pos] -= cap;\n            }\n        }\n    }\n\n    // FIFO 队列存储活跃节点（超额流 \u003e 0 且非源汇点）\n    let mut queue: VecDeque\u003cusize\u003e = VecDeque::new();\n    let mut in_queue = vec![false; n];\n\n    for i in 0..n {\n        if i != source_pos \u0026\u0026 i != sink_pos \u0026\u0026 excess[i] \u003e 1e-9 {\n            queue.push_back(i);\n            in_queue[i] = true;\n        }\n    }\n\n    // Push-Relabel 主循环\n    while let Some(u) = queue.pop_front() {\n        in_queue[u] = false;\n\n        if excess[u] \u003c= 1e-9 {\n            continue;\n        }\n\n        // 尝试推送\n        let mut pushed = false;\n        if let Some(neighbors) = adj.get(u) {\n            for \u0026v in neighbors {\n                let cap = residual.get(\u0026u).and_then(|m| m.get(\u0026v)).copied().unwrap_or(0.0);\n                if cap \u003e 1e-9 \u0026\u0026 height[u] == height[v] + 1 {\n                    let delta = excess[u].min(cap);\n                    *residual.entry(u).or_default().entry(v).or_insert(0.0) -= delta;\n                    *residual.entry(v).or_default().entry(u).or_insert(0.0) += delta;\n                    excess[u] -= delta;\n                    excess[v] += delta;\n\n                    if v != source_pos \u0026\u0026 v != sink_pos \u0026\u0026 !in_queue[v] \u0026\u0026 excess[v] \u003e 1e-9 {\n                        queue.push_back(v);\n                        in_queue[v] = true;\n                    }\n\n                    if excess[u] \u003c= 1e-9 {\n                        pushed = true;\n                        break;\n                    }\n                }\n            }\n        }\n\n        // 如果无法推送，进行 Relabel\n        if !pushed \u0026\u0026 excess[u] \u003e 1e-9 {\n            let mut min_height = usize::MAX;\n            if let Some(neighbors) = adj.get(u) {\n                for \u0026v in neighbors {\n                    let cap = residual.get(\u0026u).and_then(|m| m.get(\u0026v)).copied().unwrap_or(0.0);\n                    if cap \u003e 1e-9 \u0026\u0026 height[v] \u003c min_height {\n                        min_height = height[v];\n                    }\n                }\n            }\n\n            if min_height \u003c usize::MAX {\n                height[u] = min_height + 1;\n            }\n\n            // 重新加入队列\n            if !in_queue[u] {\n                queue.push_back(u);\n                in_queue[u] = true;\n            }\n        }\n    }\n\n    // 计算最大流（从源点流出的总流量）\n    let mut max_flow = 0.0;\n    if let Some(neighbors) = adj.get(source_pos) {\n        for \u0026v in neighbors {\n            let cap = residual.get(\u0026v).and_then(|m| m.get(\u0026source_pos)).copied().unwrap_or(0.0);\n            if cap \u003e 1e-9 {\n                max_flow += cap;\n            }\n        }\n    }\n\n    max_flow\n}\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_edmonds_karp_basic() {\n        let mut graph = GraphBuilder::directed()\n            .with_nodes(vec![\"S\", \"A\", \"B\", \"C\", \"D\", \"T\"])\n            .with_edges(vec![\n                (0, 1, 16.0), // S-\u003eA\n                (0, 2, 13.0), // S-\u003eB\n                (1, 2, 10.0), // A-\u003eB\n                (1, 3, 12.0), // A-\u003eC\n                (2, 1, 4.0),  // B-\u003eA\n                (2, 4, 14.0), // B-\u003eD\n                (3, 1, 9.0),  // C-\u003eA\n                (3, 5, 20.0), // C-\u003eT\n                (4, 3, 7.0),  // D-\u003eC\n                (4, 5, 4.0),  // D-\u003eT\n            ])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let sink = NodeIndex::new(5, 1);\n        let max_flow = edmonds_karp(\u0026mut graph, source, sink, |_, _, cap| *cap);\n\n        assert_eq!(max_flow, 23.0);\n    }\n\n    #[test]\n    fn test_dinic_basic() {\n        let mut graph = GraphBuilder::directed()\n            .with_nodes(vec![\"S\", \"A\", \"B\", \"T\"])\n            .with_edges(vec![\n                (0, 1, 10.0), // S-\u003eA\n                (0, 2, 5.0),  // S-\u003eB\n                (1, 2, 15.0), // A-\u003eB\n                (1, 3, 10.0), // A-\u003eT\n                (2, 3, 10.0), // B-\u003eT\n            ])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let sink = NodeIndex::new(3, 1);\n        let max_flow = dinic(\u0026mut graph, source, sink, |_, _, cap| *cap);\n\n        assert_eq!(max_flow, 15.0);\n    }\n\n    #[test]\n    fn test_edmonds_karp_simple() {\n        let mut graph = GraphBuilder::directed()\n            .with_nodes(vec![\"S\", \"A\", \"T\"])\n            .with_edges(vec![\n                (0, 1, 5.0), // S-\u003eA\n                (1, 2, 3.0), // A-\u003eT\n            ])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let sink = NodeIndex::new(2, 1);\n        let max_flow = edmonds_karp(\u0026mut graph, source, sink, |_, _, cap| *cap);\n\n        assert_eq!(max_flow, 3.0); // 瓶颈在 A-\u003eT\n    }\n\n    #[test]\n    fn test_push_relabel_basic() {\n        let mut graph = GraphBuilder::directed()\n            .with_nodes(vec![\"S\", \"A\", \"B\", \"T\"])\n            .with_edges(vec![\n                (0, 1, 10.0), // S-\u003eA\n                (0, 2, 5.0),  // S-\u003eB\n                (1, 2, 15.0), // A-\u003eB\n                (1, 3, 10.0), // A-\u003eT\n                (2, 3, 10.0), // B-\u003eT\n            ])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let sink = NodeIndex::new(3, 1);\n        let max_flow = push_relabel(\u0026mut graph, source, sink, |_, _, cap| *cap);\n\n        assert_eq!(max_flow, 15.0);\n    }\n}\n","traces":[{"line":58,"address":[4001463,3998992,4002176,4002245,4004647,3999061],"length":1,"stats":{"Line":2}},{"line":67,"ad {"line":505,"address":[],"length":0,"stats":{"Line":1}},{"line":511,"address":[],"length":0,"stats":{"Line":1}},{"line":512,"address":[],"length":0,"stats":{"Line":2}},{"line":513,"address":[],"length":0,"stats":{"Line":2}},{"line":514,"address":[],"length":0,"stats":{"Line":3}},{"line":515,"address":[],"length":0,"stats":{"Line":2}},{"line":516,"address":[],"length":0,"stats":{"Line":1}},{"line":521,"address":[],"length":0,"stats":{"Line":1}}],"covered":192,"coverable":210},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","matching.rs"],"content":"//! 匹配算法模块\n//!\n//! 包含最大匹配算法：Hopcroft-Karp（二分图）、Blossom（一般图）\n\nuse crate::edge::EdgeIndex;\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse std::collections::VecDeque;\n\n/// Hopcroft-Karp 二分图最大匹配算法\n///\n/// # 复杂度\n/// - 时间：O(E * sqrt(V))\n/// - 空间：O(V)\n///\n/// # 参数\n/// * `graph` - 二分图\n/// * `left_nodes` - 左部节点的索引列表\n/// * `right_nodes` - 右部节点的索引列表\n///\n/// # 返回\n/// 匹配对列表，每个元素是 (左部节点索引，右部节点索引)\n///\n/// # 示例\n/// ```\n/// use god_gragh::prelude::*;\n/// use god_gragh::algorithms::matching::hopcroft_karp;\n///\n/// let graph = GraphBuilder::undirected()\n///     .with_nodes(vec![\"L1\", \"L2\", \"R1\", \"R2\"])\n///     .with_edges(vec![(0, 2, 1.0), (0, 3, 1.0), (1, 2, 1.0)])\n///     .build()\n///     .unwrap();\n///\n/// let left = vec![0, 1];  // L1, L2\n/// let right = vec![2, 3]; // R1, R2\n/// let matching = hopcroft_karp(\u0026graph, \u0026left, \u0026right);\n/// assert!(!matching.is_empty());\n/// ```\npub fn hopcroft_karp\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    left_nodes: \u0026[usize],\n    right_nodes: \u0026[usize],\n) -\u003e Vec\u003c(usize, usize)\u003e {\n    let n_left = left_nodes.len();\n    let n_right = right_nodes.len();\n\n    if n_left == 0 || n_right == 0 {\n        return vec![];\n    }\n\n    // 构建邻接表\n    let node_indices: Vec\u003c_\u003e = graph.nodes().map(|n| n.index()).collect();\n    let _index_to_pos: std::collections::HashMap\u003cusize, usize\u003e = left_nodes\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026idx)| (idx, i))\n        .collect();\n\n    let mut adj: Vec\u003cVec\u003cusize\u003e\u003e = vec![vec![]; n_left];\n\n    for (left_pos, \u0026left_idx) in left_nodes.iter().enumerate() {\n        if left_idx \u003c node_indices.len() {\n            for neighbor in graph.neighbors(node_indices[left_idx]) {\n                if let Some(right_pos) = right_nodes.iter().position(|\u0026r| r == neighbor.index()) {\n                    adj[left_pos].push(right_pos);\n                }\n            }\n        }\n    }\n\n    // 匹配数组\n    let mut pair_left = vec![None; n_left];\n    let mut pair_right = vec![None; n_right];\n    let mut dist = vec![0; n_left];\n\n    // BFS 寻找增广路\n    fn bfs(\n        adj: \u0026[Vec\u003cusize\u003e],\n        pair_left: \u0026[Option\u003cusize\u003e],\n        pair_right: \u0026[Option\u003cusize\u003e],\n        dist: \u0026mut [usize],\n    ) -\u003e bool {\n        let mut queue = VecDeque::new();\n        for (i, \u0026p) in pair_left.iter().enumerate() {\n            if p.is_none() {\n                dist[i] = 0;\n                queue.push_back(i);\n            } else {\n                dist[i] = usize::MAX;\n            }\n        }\n\n        let mut found = false;\n        while let Some(u) = queue.pop_front() {\n            for \u0026v in \u0026adj[u] {\n                if let Some(next) = pair_right.get(v).and_then(|\u0026x| x) {\n                    if dist[next] == usize::MAX {\n                        dist[next] = dist[u] + 1;\n                        queue.push_back(next);\n                    }\n                } else {\n                    found = true;\n                }\n            }\n        }\n        found\n    }\n\n    // DFS 寻找增广路\n    fn dfs(\n        u: usize,\n        adj: \u0026[Vec\u003cusize\u003e],\n        pair_left: \u0026mut [Option\u003cusize\u003e],\n        pair_right: \u0026mut [Option\u003cusize\u003e],\n        dist: \u0026mut [usize],\n    ) -\u003e bool {\n        for \u0026v in \u0026adj[u] {\n            if let Some(next) = pair_right.get(v).and_then(|\u0026x| x) {\n                if dist[next] == dist[u] + 1\n                    \u0026\u0026 dfs(next, adj, pair_left, pair_right, dist)\n                {\n                    pair_left[u] = Some(v);\n                    pair_right[v] = Some(u);\n                    return true;\n                }\n            } else {\n                pair_left[u] = Some(v);\n                pair_right[v] = Some(u);\n                return true;\n            }\n        }\n        dist[u] = usize::MAX;\n        false\n    }\n\n    // 主循环\n    while bfs(\u0026adj, \u0026pair_left, \u0026pair_right, \u0026mut dist) {\n        for i in 0..n_left {\n            if pair_left[i].is_none() {\n                dfs(i, \u0026adj, \u0026mut pair_left, \u0026mut pair_right, \u0026mut dist);\n            }\n        }\n    }\n\n    // 构建结果\n    left_nodes\n        .iter()\n        .enumerate()\n        .filter_map(|(i, \u0026left_idx)| {\n            pair_left[i].map(|right_pos| (left_idx, right_nodes[right_pos]))\n        })\n        .collect()\n}\n\n/// Blossom 算法（一般图最大匹配）\n///\n/// 使用带花树算法求解一般图的最大匹配\n///\n/// # 复杂度\n/// - 时间：O(V * E)\n/// - 空间：O(V)\n///\n/// # 参数\n/// * `graph` - 无向图\n///\n/// # 返回\n/// 匹配边索引列表\n///\n/// # 示例\n/// ```\n/// use god_gragh::prelude::*;\n/// use god_gragh::algorithms::matching::blossom;\n///\n/// let graph = GraphBuilder::undirected()\n///     .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n///     .with_edges(vec![(0, 1, 1.0), (2, 3, 1.0)])\n///     .build()\n///     .unwrap();\n///\n/// let matching = blossom(\u0026graph);\n/// assert_eq!(matching.len(), 2);\n/// ```\npub fn blossom\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e Vec\u003cEdgeIndex\u003e {\n    let n = graph.node_count();\n    if n == 0 {\n        return vec![];\n    }\n\n    let node_indices: Vec\u003c_\u003e = graph.nodes().map(|n| n.index()).collect();\n    let mut match_node: Vec\u003cOption\u003cusize\u003e\u003e = vec![None; n]; // 每个节点的匹配对象\n    let mut used_edges = Vec::new();\n\n    // 尝试为每个未匹配节点寻找增广路\n    for start in 0..n {\n        if match_node[start].is_some() {\n            continue;\n        }\n\n        // BFS 寻找增广路\n        let mut parent: Vec\u003cOption\u003cusize\u003e\u003e = vec![None; n];\n        let mut visited = vec![false; n];\n        let mut queue = VecDeque::new();\n\n        queue.push_back(start);\n        visited[start] = true;\n\n        while let Some(u) = queue.pop_front() {\n            for neighbor in graph.neighbors(node_indices[u]) {\n                let v = neighbor.index();\n                if v \u003e= n {\n                    continue;\n                }\n\n                if !visited[v] {\n                    visited[v] = true;\n                    parent[v] = Some(u);\n\n                    if let Some(matched) = match_node.get(v).and_then(|\u0026x| x) {\n                        // v 已匹配，继续搜索\n                        if !visited[matched] {\n                            visited[matched] = true;\n                            parent[matched] = Some(v);\n                            queue.push_back(matched);\n                        }\n                    } else {\n                        // 找到增广路\n                        let mut curr = v;\n                        let mut prev = u;\n                        while let Some(p) = parent[prev] {\n                            match_node[prev] = Some(curr);\n                            match_node[curr] = Some(prev);\n                            curr = p;\n                            prev = parent[p].unwrap();\n                        }\n                        match_node[start] = Some(curr);\n                        match_node[curr] = Some(start);\n                        break;\n                    }\n                }\n            }\n        }\n    }\n\n    // 收集匹配边\n    let mut seen = std::collections::HashSet::new();\n    for (u, \u0026v_opt) in match_node.iter().enumerate() {\n        if let Some(v) = v_opt {\n            if u \u003c v \u0026\u0026 !seen.contains(\u0026(u, v)) {\n                seen.insert((u, v));\n                // 找到对应的边索引\n                if u \u003c node_indices.len() {\n                    for edge_idx in graph.incident_edges(node_indices[u]) {\n                        if let Ok((src, tgt)) = graph.edge_endpoints(edge_idx) {\n                            if (src.index() == u \u0026\u0026 tgt.index() == v)\n                                || (src.index() == v \u0026\u0026 tgt.index() == u)\n                            {\n                                used_edges.push(edge_idx);\n                                break;\n                            }\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    used_edges\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_hopcroft_karp_basic() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![\"L1\", \"L2\", \"R1\", \"R2\"])\n            .with_edges(vec![(0, 2, 1.0), (0, 3, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n\n        let left = vec![0, 1];\n        let right = vec![2, 3];\n        let matching = hopcroft_karp(\u0026graph, \u0026left, \u0026right);\n        assert!(!matching.is_empty());\n    }\n\n    #[test]\n    fn test_blossom_basic() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let matching = blossom(\u0026graph);\n        assert!(!matching.is_empty());\n    }\n}\n","traces":[{"line":40,"address":[4888432,4890621,4891155],"length":1,"stats":{"Line":1}},{"line":45,"address":[4888536],"length":1," ,"covered":87,"coverable":104},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","mod.rs"],"content":"//! 算法模块\n//!\n//! 包含各种图算法实现\n\npub mod traversal;\npub mod shortest_path;\npub mod mst;\npub mod centrality;\npub mod flow;\npub mod matching;\npub mod community;\npub mod properties;\n\n/// 并行算法模块（需要 `parallel` 特性）\n#[cfg(feature = \"parallel\")]\npub mod parallel;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","mst.rs"],"content":"//! 最小生成树算法模块\n//!\n//! 包含 Kruskal 和 Prim 算法\n\nuse crate::edge::EdgeIndex;\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse std::cmp::Ordering;\nuse std::collections::HashMap;\n\n/// 并查集数据结构，用于 Kruskal 算法\nstruct UnionFind {\n    parent: Vec\u003cusize\u003e,\n    rank: Vec\u003cusize\u003e,\n}\n\nimpl UnionFind {\n    fn new(n: usize) -\u003e Self {\n        Self {\n            parent: (0..n).collect(),\n            rank: vec![0; n],\n        }\n    }\n\n    fn find(\u0026mut self, x: usize) -\u003e usize {\n        if self.parent[x] != x {\n            self.parent[x] = self.find(self.parent[x]);\n        }\n        self.parent[x]\n    }\n\n    fn union(\u0026mut self, x: usize, y: usize) -\u003e bool {\n        let rx = self.find(x);\n        let ry = self.find(y);\n        if rx == ry {\n            return false;\n        }\n        if self.rank[rx] \u003c self.rank[ry] {\n            self.parent[rx] = ry;\n        } else if self.rank[rx] \u003e self.rank[ry] {\n            self.parent[ry] = rx;\n        } else {\n            self.parent[ry] = rx;\n            self.rank[rx] += 1;\n        }\n        true\n    }\n}\n\n/// Kruskal 算法\n///\n/// 计算无向加权图的最小生成树\n/// 返回构成 MST 的边索引列表\n///\n/// # 复杂度\n/// - 时间：O(E log E) - 主要来自边排序\n/// - 空间：O(V) - 并查集存储\n///\n/// # 示例\n/// ```rust,no_run\n/// use god_gragh::graph::Graph;\n/// use god_gragh::graph::traits::GraphOps;\n/// use god_gragh::algorithms::mst::kruskal;\n///\n/// let mut graph = Graph::\u003c\u0026str, f64\u003e::undirected();\n/// let a = graph.add_node(\"A\").unwrap();\n/// let b = graph.add_node(\"B\").unwrap();\n/// let c = graph.add_node(\"C\").unwrap();\n/// let d = graph.add_node(\"D\").unwrap();\n/// graph.add_edge(a, b, 1.0).unwrap();\n/// graph.add_edge(a, c, 4.0).unwrap();\n/// graph.add_edge(b, c, 2.0).unwrap();\n/// graph.add_edge(b, d, 5.0).unwrap();\n/// graph.add_edge(c, d, 3.0).unwrap();\n///\n/// let mst_edges = kruskal(\u0026graph);\n/// assert_eq!(mst_edges.len(), 3); // n-1 条边\n/// ```\npub fn kruskal\u003cT\u003e(graph: \u0026Graph\u003cT, f64\u003e) -\u003e Vec\u003cEdgeIndex\u003e {\n    let n = graph.node_count();\n    if n == 0 {\n        return vec![];\n    }\n\n    // 收集所有边及其权重\n    let mut edges: Vec\u003c(EdgeIndex, f64)\u003e = graph\n        .edges()\n        .map(|edge| (edge.index(), *edge.data()))\n        .collect();\n\n    // 按权重排序\n    edges.sort_by(|a, b| a.1.partial_cmp(\u0026b.1).unwrap_or(Ordering::Equal));\n\n    // 使用并查集构建 MST\n    let mut uf = UnionFind::new(n);\n    let mut mst = Vec::with_capacity(n - 1);\n\n    for (edge_idx, _weight) in edges {\n        if let Ok((source, target)) = graph.edge_endpoints(edge_idx) {\n            if uf.union(source.index(), target.index()) {\n                mst.push(edge_idx);\n                if mst.len() == n - 1 {\n                    break;\n                }\n            }\n        }\n    }\n\n    mst\n}\n\n/// Prim 算法\n///\n/// 计算无向加权图的最小生成树\n/// 返回构成 MST 的边索引列表\n///\n/// # 复杂度\n/// - 时间：O((V + E) log V) - 使用二叉堆\n/// - 空间：O(V) - 距离数组和堆\n///\n/// # 示例\n/// ```rust,no_run\n/// use god_gragh::graph::Graph;\n/// use god_gragh::graph::traits::GraphOps;\n/// use god_gragh::algorithms::mst::prim;\n///\n/// let mut graph = Graph::\u003c\u0026str, f64\u003e::undirected();\n/// let a = graph.add_node(\"A\").unwrap();\n/// let b = graph.add_node(\"B\").unwrap();\n/// let c = graph.add_node(\"C\").unwrap();\n/// let d = graph.add_node(\"D\").unwrap();\n/// graph.add_edge(a, b, 1.0).unwrap();\n/// graph.add_edge(a, c, 4.0).unwrap();\n/// graph.add_edge(b, c, 2.0).unwrap();\n/// graph.add_edge(b, d, 5.0).unwrap();\n/// graph.add_edge(c, d, 3.0).unwrap();\n///\n/// let mst_edges = prim(\u0026graph);\n/// assert_eq!(mst_edges.len(), 3); // n-1 条边\n/// ```\npub fn prim\u003cT\u003e(graph: \u0026Graph\u003cT, f64\u003e) -\u003e Vec\u003cEdgeIndex\u003e {\n    use std::collections::BinaryHeap;\n\n    #[derive(Debug)]\n    struct EdgeCandidate {\n        weight: f64,\n        target_idx: usize,\n        edge_idx: EdgeIndex,\n    }\n\n    impl PartialEq for EdgeCandidate {\n        fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n            self.weight == other.weight\n        }\n    }\n\n    impl Eq for EdgeCandidate {}\n\n    impl PartialOrd for EdgeCandidate {\n        fn partial_cmp(\u0026self, other: \u0026Self) -\u003e Option\u003cOrdering\u003e {\n            Some(self.cmp(other))\n        }\n    }\n\n    impl Ord for EdgeCandidate {\n        fn cmp(\u0026self, other: \u0026Self) -\u003e Ordering {\n            other.weight.total_cmp(\u0026self.weight)\n        }\n    }\n\n    let n = graph.node_count();\n    if n == 0 {\n        return vec![];\n    }\n\n    let mut in_mst = vec![false; n];\n    let mut mst = Vec::with_capacity(n - 1);\n    let mut heap = BinaryHeap::new();\n\n    // 收集所有有效节点及其索引映射\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let index_to_pos: HashMap\u003cusize, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, ni)| (ni.index(), i))\n        .collect();\n\n    // 从第一个节点开始\n    let start_pos = 0;\n    in_mst[start_pos] = true;\n\n    // 将起始节点的边加入堆\n    let start_node = node_indices[start_pos];\n    for edge in graph.incident_edges(start_node) {\n        if let Ok((source, target)) = graph.edge_endpoints(edge) {\n            let neighbor = if source == start_node { target } else { source };\n            if let Some(\u0026pos) = index_to_pos.get(\u0026neighbor.index()) {\n                if !in_mst[pos] {\n                    if let Ok(weight) = graph.get_edge(edge) {\n                        heap.push(EdgeCandidate {\n                            weight: *weight,\n                            target_idx: pos,\n                            edge_idx: edge,\n                        });\n                    }\n                }\n            }\n        }\n    }\n\n    while let Some(EdgeCandidate { target_idx, edge_idx, weight: _ }) = heap.pop() {\n        if in_mst[target_idx] {\n            continue;\n        }\n\n        in_mst[target_idx] = true;\n        mst.push(edge_idx);\n\n        if mst.len() == n - 1 {\n            break;\n        }\n\n        // 将新加入节点的边加入堆\n        let target_node = node_indices[target_idx];\n        for edge in graph.incident_edges(target_node) {\n            if let Ok((source, target)) = graph.edge_endpoints(edge) {\n                let neighbor = if source == target_node { target } else { source };\n                if let Some(\u0026pos) = index_to_pos.get(\u0026neighbor.index()) {\n                    if !in_mst[pos] {\n                        if let Ok(weight) = graph.get_edge(edge) {\n                            heap.push(EdgeCandidate {\n                                weight: *weight,\n                                target_idx: pos,\n                                edge_idx: edge,\n                            });\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    mst\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_kruskal_basic() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 1.0),\n                (0, 2, 4.0),\n                (1, 2, 2.0),\n                (1, 3, 5.0),\n                (2, 3, 3.0),\n            ])\n            .build()\n            .unwrap();\n\n        let mst = kruskal(\u0026graph);\n        assert_eq!(mst.len(), 3); // 4 个节点需要 3 条边\n    }\n\n    #[test]\n    fn test_prim_basic() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 1.0),\n                (0, 2, 4.0),\n                (1, 2, 2.0),\n                (1, 3, 5.0),\n                (2, 3, 3.0),\n            ])\n            .build()\n            .unwrap();\n\n        let mst = prim(\u0026graph);\n        assert_eq!(mst.len(), 3);\n    }\n}\n","traces":[{"line":19,"address":[4252244,4252064,4252238],"length":1,"stats":{"Line":2}},{"line":21,"address":[4252090],"length":1,"stats":{"Line":2}},{"line":22,"address":[4252123],"length":1,"stats":{"Line":2}},{"line":26,"address":[6909072],"length":1,"stats":{"Line":2}},{"line":27,"address":[4252404,4252280],"length":1,"stats":{"Line":4}},{"line":28,"address":[4393304],"length":1,"stats":{"Line":2}},{"line":30,"address":[4393273],"length":1,"stats":{"Line":2}},{"line":33,"address":[6909232],"length":1,"stats":{"Line":2}},{"line":34,"address":[4252445],"length":1,"stats":{"Line":2}},{"line":35,"address":[4176854],"length":1,"stats":{"Line":2}},{"line":36,"address":[4393453],"length":1,"stats":{"Line":2}},{"line":37,"address":[4393535],"length":1,"stats":{"Line":0}},{"line":39,"address":[6909509,6909324],"length":1,"stats":{"Line":2}},{"line":40,"address":[4252672],"length":1,"stats":{"Line":0}},{"line":41,"address":[6909411,6909640,6909625],"length":1,"stats":{"Line":6}},{"line":42,"address":[6909604],"length":1,"stats":{"Line":2}},{"line":44,"address":[4393668],"length":1,"stats":{"Line":2}},{"line":45,"address":[4393694,4393781,4393786],"length":1,"stats":{"Line":4}},{"line":47,"address":[6909655],"length":1,"stats":{"Line":2}},{"line":80,"address":[],"length":0,"stats":{"Line":2}},{"line":81,"address 0,"stats":{"Line":2}}],"covered":69,"coverable":87},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","parallel.rs"],"content":"//! 并行算法模块\n//!\n//! 基于 rayon 的并行图算法实现\n//!\n//! ## 锁策略说明\n//!\n//! | 算法 | 锁策略 | 说明 |\n//! |------|--------|------|\n//! | `par_dfs` | 无锁 | 使用 `AtomicBool` + CAS 操作 |\n//! | `par_bfs` | 无锁 | 使用 `AtomicBool` + 线程局部收集 |\n//! | `par_pagerank` | 无锁 | 纯函数式迭代，无共享状态 |\n//! | `par_dijkstra` | 细粒度锁 | 使用 `SegQueue` 无锁队列 + `AtomicU64` CAS 距离更新 |\n//! | `par_connected_components` | 无锁 | 使用 `AtomicUsize` + CAS 操作 |\n//! | `par_degree_centrality` | 无锁 | 纯并行映射 |\n//!\n//! 需要启用 `parallel` 特性\n\nuse std::collections::HashMap;\nuse std::sync::atomic::{AtomicBool, AtomicU64, AtomicUsize, Ordering};\nuse std::sync::Arc;\n\nuse crossbeam_queue::SegQueue;\nuse rayon::prelude::*;\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse crate::errors::GraphResult;\n\n/// 并行 DFS（子树并行，无锁设计）\n///\n/// 使用原子操作标记访问状态，避免 Mutex 锁竞争\npub fn par_dfs\u003cT, F\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    start: NodeIndex,\n    visitor: F,\n) where\n    T: Clone + Send + Sync,\n    F: Fn(NodeIndex) -\u003e bool + Send + Sync,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return;\n    }\n\n    let visited: Vec\u003cAtomicBool\u003e = (0..n).map(|_| AtomicBool::new(false)).collect();\n    let visited = Arc::new(visited);\n\n    // 标记起始节点\n    visited[start.index()].store(true, Ordering::SeqCst);\n\n    // 获取起始节点的所有邻居\n    let neighbors: Vec\u003cNodeIndex\u003e = graph.neighbors(start).collect();\n\n    // 对每个邻居启动并行 DFS\n    neighbors.into_par_iter().for_each(|neighbor| {\n        if !visited[neighbor.index()].load(Ordering::Relaxed)\n            \u0026\u0026 visited[neighbor.index()]\n                .compare_exchange(false, true, Ordering::SeqCst, Ordering::Relaxed)\n                .is_ok()\n            \u0026\u0026 visitor(neighbor)\n        {\n            par_dfs_subtree(graph, neighbor, \u0026visited, \u0026visitor);\n        }\n    });\n}\n\n/// 并行 DFS 子树处理\nfn par_dfs_subtree\u003cT, F\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    node: NodeIndex,\n    visited: \u0026Vec\u003cAtomicBool\u003e,\n    visitor: \u0026F,\n) where\n    T: Clone + Send + Sync,\n    F: Fn(NodeIndex) -\u003e bool + Send + Sync,\n{\n    // 收集所有未访问的邻居\n    let unvisited_neighbors: Vec\u003cNodeIndex\u003e = graph\n        .neighbors(node)\n        .filter(|\u0026n| {\n            !visited[n.index()].load(Ordering::Relaxed)\n                \u0026\u0026 visited[n.index()]\n                    .compare_exchange(false, true, Ordering::SeqCst, Ordering::Relaxed)\n                    .is_ok()\n        })\n        .collect();\n\n    if unvisited_neighbors.is_empty() {\n        return;\n    }\n\n    // 如果邻居数量足够多，使用并行处理\n    if unvisited_neighbors.len() \u003e= 4 {\n        unvisited_neighbors.into_par_iter().for_each(|neighbor| {\n            if visitor(neighbor) {\n                par_dfs_subtree(graph, neighbor, visited, visitor);\n            }\n        });\n    } else {\n        // 串行处理\n        for neighbor in unvisited_neighbors {\n            if visitor(neighbor) {\n                par_dfs_subtree(graph, neighbor, visited, visitor);\n            }\n        }\n    }\n}\n\n/// 并行 PageRank 算法\n///\n/// 使用无锁并行设计，每次迭代中所有节点的更新可以并行执行\n/// 使用反向邻接表优化，时间复杂度 O(iterations * E)\npub fn par_pagerank\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    damping: f64,\n    iterations: usize,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    // 收集所有有效节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let node_to_pos: HashMap\u003cNodeIndex, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026ni)| (ni, i))\n        .collect();\n\n    // 预计算每个节点的出度\n    let out_degrees: Vec\u003cusize\u003e = node_indices\n        .iter()\n        .map(|\u0026ni| graph.out_degree(ni).unwrap_or(0))\n        .collect();\n\n    // 预计算反向邻接表（谁指向谁）- O(E) 复杂度\n    // 遍历所有边，构建 incoming[pos] = 指向节点 pos 的所有源节点位置\n    let mut incoming: Vec\u003cVec\u003cusize\u003e\u003e = vec![Vec::new(); n];\n    for edge in graph.edges() {\n        let src = edge.source();\n        let tgt = edge.target();\n        if let (Some(\u0026src_pos), Some(\u0026tgt_pos)) = (node_to_pos.get(\u0026src), node_to_pos.get(\u0026tgt)) {\n            incoming[tgt_pos].push(src_pos);\n        }\n    }\n\n    // 初始化：均匀分布\n    let mut scores: Vec\u003cf64\u003e = vec![1.0 / n as f64; n];\n\n    for _ in 0..iterations {\n        // 并行计算每个节点的新分数\n        let new_scores: Vec\u003cf64\u003e = (0..n)\n            .into_par_iter()\n            .map(|i| {\n                // 基础分数：随机跳转贡献\n                let mut rank = (1.0 - damping) / n as f64;\n\n                // 只遍历指向当前节点的邻居（O(in_degree) 而非 O(V)）\n                for \u0026neighbor_pos in \u0026incoming[i] {\n                    let out_degree = out_degrees[neighbor_pos];\n                    if out_degree \u003e 0 {\n                        rank += damping * scores[neighbor_pos] / out_degree as f64;\n                    }\n                }\n\n                rank\n            })\n            .collect();\n\n        scores = new_scores;\n    }\n\n    // 转换回 HashMap\n    node_indices\n        .into_iter()\n        .enumerate()\n        .map(|(i, ni)| (ni, scores[i]))\n        .collect()\n}\n\n/// SIMD 优化的并行 PageRank 算法（预留接口）\n///\n/// # 特性\n/// - 使用批量计算优化，减少缓存未命中\n/// - **注意**: SIMD 优化尚未实现，当前为预留接口\n/// - 未来计划使用 `std::simd` 或 `portable-simd` 实现真正的 AVX2/AVX-512 优化\n///\n/// # 参数\n/// * `graph` - 图\n/// * `damping` - 阻尼系数（通常 0.85）\n/// * `iterations` - 迭代次数\n///\n/// # 返回\n/// HashMap，键为节点索引，值为 PageRank 分数\n///\n/// SIMD 优化的并行 PageRank 实现\n///\n/// 使用 `std::simd` 批量计算入边邻居的贡献，在支持 AVX2/AVX-512 的 CPU 上可获得 2-4x 加速。\n///\n/// # Algorithm\n///\n/// 1. 预计算反向邻接表和出度数组\n/// 2. 迭代更新 PageRank 分数：\n///    - 基础分数：`(1 - damping) / n`\n///    - 邻居贡献：`damping * score[neighbor] / out_degree[neighbor]`\n/// 3. 使用 SIMD 批量处理 4 个或 8 个邻居的贡献计算\n///\n/// # Performance\n///\n/// - 时间复杂度：O(iterations * (V + E))\n/// - 空间复杂度：O(V + E)\n/// - SIMD 加速：对入边邻居密集的场景效果最佳\n///\n/// # Example\n///\n/// ```rust,ignore\n/// use god_gragh::algorithms::parallel::par_pagerank_simd;\n///\n/// let scores = par_pagerank_simd(\u0026graph, 0.85, 20);\n/// ```\n///\n/// # Requirements\n///\n/// 需要启用 `simd` 特性并 nightly Rust：\n/// ```toml\n/// [dependencies]\n/// god-gragh = { version = \"0.3\", features = [\"simd\"] }\n/// ```\n/// ```bash\n/// cargo +nightly build --features simd\n/// ```\n#[cfg(all(feature = \"simd\", nightly))]\npub fn par_pagerank_simd\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    damping: f64,\n    iterations: usize,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    use std::simd::f64x4;\n    use std::simd::SimdFloat;\n    \n    let n = graph.node_count();\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    // 收集所有有效节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let node_to_pos: HashMap\u003cNodeIndex, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026ni)| (ni, i))\n        .collect();\n\n    // 预计算每个节点的出度\n    let out_degrees: Vec\u003cusize\u003e = node_indices\n        .iter()\n        .map(|\u0026ni| graph.out_degree(ni).unwrap_or(0))\n        .collect();\n\n    // 预计算反向邻接表（谁指向谁）- O(E) 复杂度\n    let mut incoming: Vec\u003cVec\u003cusize\u003e\u003e = vec![Vec::new(); n];\n    for edge in graph.edges() {\n        let src = edge.source();\n        let tgt = edge.target();\n        if let (Some(\u0026src_pos), Some(\u0026tgt_pos)) = (node_to_pos.get(\u0026src), node_to_pos.get(\u0026tgt)) {\n            incoming[tgt_pos].push(src_pos);\n        }\n    }\n\n    // 初始化：均匀分布\n    let mut scores: Vec\u003cf64\u003e = vec![1.0 / n as f64; n];\n\n    // 预计算阻尼系数和基础分数\n    let base_rank = (1.0 - damping) / n as f64;\n    let damping_simd = f64x4::from_array([damping; 4]);\n\n    for _ in 0..iterations {\n        // SIMD 批量并行计算\n        let new_scores: Vec\u003cf64\u003e = (0..n)\n            .into_par_iter()\n            .map(|i| {\n                // 基础分数：随机跳转贡献\n                let mut rank = base_rank;\n\n                let neighbors = \u0026incoming[i];\n                let len = neighbors.len();\n                \n                // SIMD 批量处理：每 4 个邻居一组\n                let mut j = 0;\n                while j + 4 \u003c= len {\n                    // 加载 4 个邻居的位置\n                    let neighbor_indices = [\n                        neighbors[j],\n                        neighbors[j + 1],\n                        neighbors[j + 2],\n                        neighbors[j + 3],\n                    ];\n                    \n                    // 加载 4 个邻居的分数\n                    let scores_array = [\n                        scores[neighbor_indices[0]],\n                        scores[neighbor_indices[1]],\n                        scores[neighbor_indices[2]],\n                        scores[neighbor_indices[3]],\n                    ];\n                    let scores_simd = f64x4::from_array(scores_array);\n                    \n                    // 加载 4 个邻居的出度倒数（避免除法）\n                    let inv_degrees = [\n                        if out_degrees[neighbor_indices[0]] \u003e 0 {\n                            1.0 / out_degrees[neighbor_indices[0]] as f64\n                        } else { 0.0 },\n                        if out_degrees[neighbor_indices[1]] \u003e 0 {\n                            1.0 / out_degrees[neighbor_indices[1]] as f64\n                        } else { 0.0 },\n                        if out_degrees[neighbor_indices[2]] \u003e 0 {\n                            1.0 / out_degrees[neighbor_indices[2]] as f64\n                        } else { 0.0 },\n                        if out_degrees[neighbor_indices[3]] \u003e 0 {\n                            1.0 / out_degrees[neighbor_indices[3]] as f64\n                        } else { 0.0 },\n                    ];\n                    let inv_degrees_simd = f64x4::from_array(inv_degrees);\n                    \n                    // SIMD 批量计算：damping * score * (1/out_degree)\n                    let contributions = damping_simd * scores_simd * inv_degrees_simd;\n                    \n                    // 水平求和：将 4 个贡献值相加\n                    rank += contributions.reduce_sum();\n                    \n                    j += 4;\n                }\n                \n                // 处理剩余不足 4 个的邻居\n                while j \u003c len {\n                    let neighbor_pos = neighbors[j];\n                    let out_degree = out_degrees[neighbor_pos];\n                    if out_degree \u003e 0 {\n                        rank += damping * scores[neighbor_pos] / out_degree as f64;\n                    }\n                    j += 1;\n                }\n\n                rank\n            })\n            .collect();\n\n        scores = new_scores;\n    }\n\n    // 转换回 HashMap\n    node_indices\n        .into_iter()\n        .enumerate()\n        .map(|(i, ni)| (ni, scores[i]))\n        .collect()\n}\n\n/// SIMD 优化的并行 PageRank 实现（stable Rust 回退版本）\n///\n/// 当使用 stable Rust 时，此函数回退到普通并行实现。\n/// 要使用真正的 SIMD 优化，请使用 nightly Rust 并启用 `simd` 特性。\n#[cfg(all(feature = \"simd\", not(nightly)))]\npub fn par_pagerank_simd\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    damping: f64,\n    iterations: usize,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    // 回退到普通并行实现\n    par_pagerank(graph, damping, iterations)\n}\n\n/// SIMD 优化的度中心性计算\n///\n/// **注意**: 度中心性计算本身是简单的 O(V) 操作，SIMD 加速效果有限（约 1.1-1.3x）。\n/// 主要优化来自并行迭代而非 SIMD 指令。\n///\n/// 此函数保留 SIMD 接口以便未来扩展加权度中心性等更复杂的计算。\n///\n/// # Performance\n///\n/// - 时间复杂度：O(V)\n/// - 空间复杂度：O(V)\n/// - SIMD 加速：有限（简单归一化操作）\n#[cfg(all(feature = \"simd\", nightly))]\npub fn par_degree_centrality_simd\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    let n = graph.node_count();\n    if n \u003c= 1 {\n        return HashMap::new();\n    }\n\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let norm = 1.0 / (n - 1) as f64;\n\n    // 批量并行计算度数\n    // 注意：SIMD 对此简单计算的加速有限，主要收益来自并行迭代\n    let centralities: Vec\u003cf64\u003e = node_indices\n        .par_iter()\n        .map(|\u0026ni| {\n            let degree = graph.out_degree(ni).unwrap_or(0) as f64;\n            degree * norm\n        })\n        .collect();\n\n    // 转换回 HashMap\n    node_indices\n        .into_iter()\n        .zip(centralities.into_iter())\n        .collect()\n}\n\n/// SIMD 优化的度中心性计算（stable Rust 回退版本）\n///\n/// 当使用 stable Rust 时，此函数回退到普通并行实现。\n#[cfg(all(feature = \"simd\", not(nightly)))]\npub fn par_degree_centrality_simd\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    // 回退到普通并行实现\n    par_degree_centrality(graph)\n}\n\n/// 并行 BFS（分层并行，无锁设计）\n///\n/// 每层节点并行处理，层间同步\n/// 使用线程局部收集 + 合并策略避免 Mutex 锁竞争\npub fn par_bfs\u003cT, F\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n    start: NodeIndex,\n    visitor: F,\n) where\n    T: Clone + Send + Sync,\n    F: Fn(NodeIndex, usize) -\u003e bool + Send + Sync,\n{\n    let n = graph.node_count();\n    let visited: Vec\u003cAtomicBool\u003e = (0..n).map(|_| AtomicBool::new(false)).collect();\n    let visited = Arc::new(visited);\n\n    // 标记起始节点\n    visited[start.index()].store(true, Ordering::SeqCst);\n\n    let mut current_layer = vec![start];\n    let mut depth = 0;\n\n    while !current_layer.is_empty() {\n        // 使用线程局部收集策略避免 Mutex 锁\n        let next_layer_vecs: Vec\u003cVec\u003cNodeIndex\u003e\u003e = current_layer\n            .par_iter()\n            .filter_map(|\u0026node| {\n                if !visitor(node, depth) {\n                    return None;\n                }\n\n                let neighbors: Vec\u003cNodeIndex\u003e = graph\n                    .neighbors(node)\n                    .filter(|\u0026neighbor| {\n                        !visited[neighbor.index()].load(Ordering::Relaxed)\n                            \u0026\u0026 visited[neighbor.index()]\n                                .compare_exchange(false, true, Ordering::SeqCst, Ordering::Relaxed)\n                                .is_ok()\n                    })\n                    .collect();\n\n                if neighbors.is_empty() {\n                    None\n                } else {\n                    Some(neighbors)\n                }\n            })\n            .collect();\n\n        // 合并所有线程局部的结果\n        let mut next_layer = Vec::new();\n        for layer_vec in next_layer_vecs {\n            next_layer.extend(layer_vec);\n        }\n\n        depth += 1;\n        current_layer = next_layer;\n    }\n}\n\n/// 并行连通分量（基于并查集）\n/// \n/// 注意：由于并行并查集的实现复杂性，这里使用简化版本：\n/// 1. 边的处理是并行的\n/// 2. 但 union 操作使用原子操作保证安全性\n/// 3. find 操作使用迭代而非递归避免栈溢出\n/// \n/// 注意：此实现在多核上可能不会带来显著加速，因为并查集本质上是串行的\npub fn par_connected_components\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n) -\u003e Vec\u003cVec\u003cNodeIndex\u003e\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let n = node_indices.len();\n\n    if n == 0 {\n        return Vec::new();\n    }\n\n    // 并查集：parent[i] 表示节点 i 的父节点\n    let parent: Vec\u003cAtomicUsize\u003e = (0..n).map(AtomicUsize::new).collect();\n\n    // 初始化：每个节点的父节点是自己\n    for (i, atomic) in parent.iter().enumerate().take(n) {\n        atomic.store(i, Ordering::Relaxed);\n    }\n\n    // 查找根节点（迭代版本，不带路径压缩以避免竞争）\n    fn find(parent: \u0026[AtomicUsize], mut i: usize) -\u003e usize {\n        loop {\n            let p = parent[i].load(Ordering::Relaxed);\n            if p == i {\n                return p;\n            }\n            i = p;\n        }\n    }\n\n    // 合并两个集合（使用原子 CAS 操作）\n    fn union_atomic(\n        parent: \u0026[AtomicUsize],\n        i: usize,\n        j: usize,\n    ) {\n        let root_i = find(parent, i);\n        let root_j = find(parent, j);\n\n        if root_i == root_j {\n            return;\n        }\n\n        // 使用较小的根作为新根，保证确定性\n        let (old_root, new_root) = if root_i \u003c root_j {\n            (root_i, root_j)\n        } else {\n            (root_j, root_i)\n        };\n\n        // 尝试设置父节点，失败说明已被其他线程设置\n        let _ = parent[old_root].compare_exchange(\n            old_root,\n            new_root,\n            Ordering::SeqCst,\n            Ordering::Relaxed\n        );\n    }\n\n    // 并行处理所有边\n    let edges: Vec\u003c(usize, usize)\u003e = graph\n        .edges()\n        .flat_map(|edge| {\n            let source_idx = edge.source().index();\n            let target_idx = edge.target().index();\n            vec![(source_idx, target_idx), (target_idx, source_idx)]\n        })\n        .collect();\n\n    edges.par_iter().for_each(|\u0026(src, tgt)| {\n        union_atomic(\u0026parent, src, tgt);\n    });\n\n    // 收集每个根节点对应的分量\n    let mut components_map: HashMap\u003cusize, Vec\u003cNodeIndex\u003e\u003e = HashMap::new();\n\n    for \u0026node in \u0026node_indices {\n        let root = find(\u0026parent, node.index());\n        components_map.entry(root).or_default().push(node);\n    }\n\n    components_map.into_values().collect()\n}\n\n/// 并行度中心性\npub fn par_degree_centrality\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone + Send + Sync\u003e,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e\nwhere\n    T: Clone + Send + Sync,\n{\n    let n = graph.node_count();\n    if n \u003c= 1 {\n        return HashMap::new();\n    }\n\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let norm = 1.0 / (n - 1) as f64;\n\n    node_indices\n        .par_iter()\n        .map(|\u0026ni| {\n            let degree = graph.out_degree(ni).unwrap_or(0) as f64;\n            (ni, degree * norm)\n        })\n        .collect()\n}\n\n/// 并行 Dijkstra 算法（delta-stepping 简化版）\n///\n/// # 锁设计\n///\n/// 此实现使用混合锁/无锁数据结构：\n/// - **桶队列**: 使用 `crossbeam-queue::SegQueue` 无锁并发队列\n/// - **距离数组**: 使用 `AtomicU64` 存储距离的位表示，支持无锁 CAS 更新\n/// - **完成标记**: 使用 `AtomicBool` 标记已完成的节点\n///\n/// 注意：虽然核心数据结构使用无锁操作，但桶队列的 `pop()` 操作内部存在细粒度锁。\n/// 在稠密图上，锁竞争可能带来一定开销。\n///\n/// 使用桶式优先队列实现并行松弛操作\n/// 适用于非负权重的图，delta 参数控制桶的粒度\n///\n/// # 参数\n/// * `graph` - 图\n/// * `source` - 源节点\n/// * `get_weight` - 获取边权重的闭包（需要是 Fn 而非 FnMut）\n/// * `delta` - 桶宽度（默认 1.0）\n///\n/// # 返回\n/// HashMap，键为节点索引，值为最短距离\n///\n/// # 复杂度\n/// - 时间：O((V + E) * log(V) / P)，P 为并行度\n/// - 空间：O(V + E + B)，B 为桶数量\npub fn par_dijkstra\u003cT, E, F\u003e(\n    graph: \u0026Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    get_weight: F,\n    delta: f64,\n) -\u003e GraphResult\u003cHashMap\u003cNodeIndex, f64\u003e\u003e\nwhere\n    T: Clone + Send + Sync,\n    E: Clone + Send + Sync,\n    F: Fn(NodeIndex, NodeIndex, \u0026E) -\u003e f64 + Send + Sync,\n{\n    let n = graph.node_count();\n    if n == 0 {\n        return Ok(HashMap::new());\n    }\n\n    // 收集所有有效节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let node_to_pos: HashMap\u003cNodeIndex, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026ni)| (ni, i))\n        .collect();\n\n    // 距离数组：使用 AtomicU64 存储 f64 的位表示，支持无锁 CAS 更新\n    let distances: Vec\u003cAtomicU64\u003e = (0..n)\n        .map(|_| AtomicU64::new(f64::INFINITY.to_bits()))\n        .collect();\n\n    // 设置源节点距离\n    if let Some(\u0026source_pos) = node_to_pos.get(\u0026source) {\n        distances[source_pos].store(0.0_f64.to_bits(), Ordering::Relaxed);\n    }\n\n    // 桶式优先队列：buckets[k] 存储距离在 [k*delta, (k+1)*delta) 范围内的节点\n    // 使用 SegQueue 无锁并发队列\n    let buckets: Vec\u003cSegQueue\u003cusize\u003e\u003e = (0..10000).map(|_| SegQueue::new()).collect();\n    let buckets = Arc::new(buckets);\n\n    // 初始桶\n    if let Some(\u0026source_pos) = node_to_pos.get(\u0026source) {\n        buckets[0].push(source_pos);\n    }\n\n    // 已完成的节点\n    let settled: Vec\u003cAtomicBool\u003e = (0..n).map(|_| AtomicBool::new(false)).collect();\n\n    let mut current_bucket = 0;\n    let mut empty_count = 0;\n    let max_empty_buckets = 100;\n\n    loop {\n        // 收集当前桶中的所有节点\n        let mut nodes_to_process: Vec\u003cusize\u003e = Vec::new();\n        while let Some(node_pos) = buckets[current_bucket].pop() {\n            nodes_to_process.push(node_pos);\n        }\n\n        if nodes_to_process.is_empty() {\n            empty_count += 1;\n            if empty_count \u003e= max_empty_buckets {\n                // 连续多个空桶，结束\n                break;\n            }\n            current_bucket += 1;\n            continue;\n        }\n\n        empty_count = 0;\n\n        // 克隆节点列表用于并行处理后的标记\n        let nodes_to_process_clone = nodes_to_process.clone();\n\n        // 并行处理当前桶中的节点\n        nodes_to_process.into_par_iter().for_each(|node_pos| {\n            if settled[node_pos].load(Ordering::Relaxed) {\n                return;\n            }\n\n            let node = node_indices[node_pos];\n            let node_dist = {\n                let dist_bits = distances[node_pos].load(Ordering::Relaxed);\n                f64::from_bits(dist_bits)\n            };\n\n            // 遍历所有邻居\n            for neighbor in graph.neighbors(node) {\n                if let Some(\u0026neighbor_pos) = node_to_pos.get(\u0026neighbor) {\n                    if settled[neighbor_pos].load(Ordering::Relaxed) {\n                        continue;\n                    }\n\n                    if let Ok(edge_data) = graph.get_edge_by_nodes(node, neighbor) {\n                        let weight = get_weight(node, neighbor, edge_data);\n                        let new_dist = node_dist + weight;\n\n                        // 使用 CAS 无锁更新距离\n                        let mut current_bits = distances[neighbor_pos].load(Ordering::Relaxed);\n                        loop {\n                            let current_dist = f64::from_bits(current_bits);\n                            if new_dist \u003e= current_dist {\n                                break;\n                            }\n                            let new_bits = new_dist.to_bits();\n                            match distances[neighbor_pos].compare_exchange(\n                                current_bits,\n                                new_bits,\n                                Ordering::Relaxed,\n                                Ordering::Relaxed,\n                            ) {\n                                Ok(_) =\u003e {\n                                    // 成功更新，将节点放入对应的桶\n                                    let bucket_idx = ((new_dist / delta).floor() as usize)\n                                        .saturating_add(1)\n                                        .min(buckets.len() - 1);\n                                    buckets[bucket_idx].push(neighbor_pos);\n                                    break;\n                                }\n                                Err(observed) =\u003e {\n                                    // CAS 失败，重试\n                                    current_bits = observed;\n                                }\n                            }\n                        }\n                    }\n                }\n            }\n        });\n\n        // 标记当前桶中的节点为已完成\n        for node_pos in nodes_to_process_clone {\n            settled[node_pos].store(true, Ordering::Relaxed);\n        }\n\n        current_bucket += 1;\n    }\n\n    // 构建结果 HashMap\n    let mut result = HashMap::with_capacity(n);\n    for (i, \u0026ni) in node_indices.iter().enumerate() {\n        let dist_bits = distances[i].load(Ordering::Relaxed);\n        let dist = f64::from_bits(dist_bits);\n        if dist != f64::INFINITY {\n            result.insert(ni, dist);\n        }\n    }\n\n    Ok(result)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_par_pagerank() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n            .build()\n            .unwrap();\n\n        let ranks = par_pagerank(\u0026graph, 0.85, 20);\n        assert_eq!(ranks.len(), 3);\n\n        // 在环形结构中，所有节点的 PageRank 应该相近\n        let values: Vec\u003c_\u003e = ranks.values().collect();\n        for i in 1..values.len() {\n            assert!((values[i] - values[0]).abs() \u003c 0.01);\n        }\n    }\n\n    #[test]\n    fn test_par_connected_components() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3, 4, 5, 6])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (3, 4, 1.0)])\n            .build()\n            .unwrap();\n\n        let components = par_connected_components(\u0026graph);\n        assert_eq!(components.len(), 3); // {0,1,2}, {3,4}, {5}\n    }\n\n    #[test]\n    fn test_par_degree_centrality() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let centrality = par_degree_centrality(\u0026graph);\n        assert_eq!(centrality.len(), 4);\n    }\n\n    #[test]\n    fn test_par_dfs() {\n        use std::sync::atomic::AtomicUsize;\n\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\", \"E\", \"F\"])\n            .with_edges(vec![\n                (0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0),  // A -\u003e B, C, D\n                (1, 4, 1.0),                              // B -\u003e E\n                (2, 5, 1.0),                              // C -\u003e F\n            ])\n            .build()\n            .unwrap();\n\n        let start = graph.nodes().next().unwrap().index();\n        let count = Arc::new(AtomicUsize::new(1)); // 起始节点已经计数\n        let count_clone = count.clone();\n\n        par_dfs(\u0026graph, start, move |_node| {\n            count_clone.fetch_add(1, Ordering::SeqCst);\n            true\n        });\n\n        // 应该访问所有 6 个节点\n        assert_eq!(count.load(Ordering::SeqCst), 6);\n    }\n\n    #[test]\n    fn test_par_dijkstra_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 1.0),\n                (0, 2, 4.0),\n                (1, 2, 2.0),\n                (1, 3, 5.0),\n                (2, 3, 1.0),\n            ])\n            .build()\n            .unwrap();\n\n        let start = graph.nodes().next().unwrap().index();\n        let distances = par_dijkstra(\u0026graph, start, |_, _, w| *w, 1.0).unwrap();\n\n        assert!(distances.contains_key(\u0026start));\n        assert_eq!(distances.get(\u0026start), Some(\u00260.0));\n    }\n\n    #[test]\n    fn test_par_dijkstra_single_node() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![1])\n            .build()\n            .unwrap();\n\n        let start = graph.nodes().next().unwrap().index();\n        let distances = par_dijkstra(\u0026graph, start, |_, _, _: \u0026f64| 1.0, 1.0).unwrap();\n\n        assert_eq!(distances.len(), 1);\n        assert_eq!(distances.get(\u0026start), Some(\u00260.0));\n    }\n\n    #[test]\n    fn test_par_dijkstra_empty_graph() {\n        let graph: Graph\u003ci32, f64\u003e = GraphBuilder::directed().build().unwrap();\n        let distances = par_dijkstra(\u0026graph, NodeIndex::new(0, 1), |_, _, _: \u0026f64| 1.0, 1.0).unwrap();\n        assert!(distances.is_empty());\n    }\n}\n","traces":[{"line":33,"address":[4501388,4501382,4500848],"length":1,"stats":{"Line":1}},{"line":41,"address":[4500882,4500936],"length":1,"stats":{"Line":2}},{"line":42,"address":[],"length":0,"stats":{"Line":1}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":4}},{"line":47,"address":[],"length":0,"stats":{"Line":1}},{"line":50,"address":[],"length":0,"stats":{"Line":2}},{"line":53,"address":[],"length":0,"stats":{"Line":1}},{"line":56,"address":[4501238,4501456],"length":1,"stats":{"Line":2}},{"line":57,"address":[],"length":0,"stats":{"Line":1}},{"line":58,"address":[],"length":0,"stats":{"Line":2}},{"line":59,"address":[],"length":0,"stats":{"Line":1}},{"line":60,"address":[],"length":0,"stats":{"Line":1}},{"line":61,"address":[],"length":0,"stats":{"Line":1}},{"line":63,"address":[4501671],"length":1,"stats":{"Line":1}},{"line":69,"address":[4497312,4497968,4498049],"length":1,"stats":{"Line":1}},{"line":79,"address":[],"length":0,"stats":{"Line":1}},{"line":80,"address":[],"length":0,"stats":{"Line":1}},{"line":81,"address":[4498080,4497430,4498099],"length":1,"stats":{"Line":3}},{"line":82,"address":[],"length":0,"stats":{"Line":1}},{"line":83,"address":[],"length":0,"stats":{"Line":1}},{"line":84,"address":[],"length":0,"stats":{"Line":1}},{"line":85,"address":[],"length":0,"stats":{"Line":1}},{"line":89,"address":[],"length":0,"stats":{"Line":2}},{"line":90,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[4497575,4497535],"length":1,"stats":{"Line":2}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":97," 通性、二分性、环检测等图属性检查算法\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse std::collections::{HashMap, VecDeque};\n\n/// 检查图是否连通\npub fn is_connected\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e bool {\n    if graph.node_count() == 0 {\n        return true;\n    }\n\n    let first_node = graph.nodes().next().map(|n| n.index()).unwrap();\n    let mut visited = vec![false; graph.node_count()];\n    let mut count = 0;\n\n    let mut queue = VecDeque::new();\n    queue.push_back(first_node);\n    visited[first_node.index()] = true;\n\n    while let Some(node) = queue.pop_front() {\n        count += 1;\n\n        for neighbor in graph.neighbors(node) {\n            if !visited[neighbor.index()] {\n                visited[neighbor.index()] = true;\n                queue.push_back(neighbor);\n            }\n        }\n    }\n\n    count == graph.node_count()\n}\n\n/// 检查图是否为二分图\npub fn is_bipartite\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e bool {\n    let mut color: HashMap\u003cusize, bool\u003e = HashMap::new();\n\n    for start in graph.nodes() {\n        let start_idx = start.index();\n        if color.contains_key(\u0026start_idx.index()) {\n            continue;\n        }\n\n        let mut queue = VecDeque::new();\n        queue.push_back(start_idx.index());\n        color.insert(start_idx.index(), true);\n\n        while let Some(node_idx) = queue.pop_front() {\n            let current_color = color[\u0026node_idx];\n            let node_ni = NodeIndex::new(node_idx, 0);\n\n            for neighbor in graph.neighbors(node_ni) {\n                let neighbor_idx = neighbor.index();\n                match color.get(\u0026neighbor_idx) {\n                    Some(\u0026c) if c == current_color =\u003e return false,\n                    None =\u003e {\n                        color.insert(neighbor_idx, !current_color);\n                        queue.push_back(neighbor_idx);\n                    }\n                    _ =\u003e {}\n                }\n            }\n        }\n    }\n\n    true\n}\n\n/// 检查图是否为 DAG（有向无环图）\npub fn is_dag\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e bool {\n    // 使用拓扑排序检测环\n    crate::algorithms::traversal::topological_sort(graph).is_ok()\n}\n\n/// 检测图中是否存在环\npub fn has_cycle\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e bool {\n    !is_dag(graph)\n}\n\n/// 检查图是否为树\npub fn is_tree\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e bool {\n    let n = graph.node_count();\n    if n == 0 {\n        return true;\n    }\n\n    // 树的定义：连通且边数 = 节点数 - 1\n    is_connected(graph) \u0026\u0026 graph.edge_count() == n - 1\n}\n\n/// 计算图的直径（最长最短路径）\npub fn diameter\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e usize {\n    if graph.node_count() == 0 {\n        return 0;\n    }\n\n    let mut max_distance = 0;\n\n    for start in graph.nodes() {\n        let mut distances: HashMap\u003cusize, usize\u003e = HashMap::new();\n        let mut queue = VecDeque::new();\n\n        let start_idx = start.index();\n        distances.insert(start_idx.index(), 0);\n        queue.push_back(start_idx);\n\n        while let Some(node) = queue.pop_front() {\n            let node_idx = node.index();\n            let dist = distances[\u0026node_idx];\n            max_distance = max_distance.max(dist);\n\n            let node_ni = NodeIndex::new(node_idx, 0);\n            for neighbor in graph.neighbors(node_ni) {\n                let neighbor_idx = neighbor.index();\n                if let std::collections::hash_map::Entry::Vacant(e) = distances.entry(neighbor_idx) {\n                    e.insert(dist + 1);\n                    queue.push_back(neighbor);\n                }\n            }\n        }\n    }\n\n    max_distance\n}\n\n/// 计算图的密度\npub fn density\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e f64 {\n    let n = graph.node_count();\n    if n \u003c= 1 {\n        return 0.0;\n    }\n\n    let max_edges = n * (n - 1);\n    graph.edge_count() as f64 / max_edges as f64\n}\n\n/// 计算图的 girth（最短环的长度）\n///\n/// Girth 是图中最短环的长度。如果图中没有环，返回 0。\n///\n/// # 复杂度\n/// - 时间：O(V * (V + E)) - 对每个节点进行 BFS\n/// - 空间：O(V)\n///\n/// # 示例\n/// ```\n/// use god_gragh::prelude::*;\n/// use god_gragh::algorithms::properties::girth;\n///\n/// let graph = GraphBuilder::directed()\n///     .with_nodes(vec![\"A\", \"B\", \"C\"])\n///     .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n///     .build()\n///     .unwrap();\n///\n/// let g = girth(\u0026graph);\n/// assert_eq!(g, 3); // 三角形环\n/// ```\npub fn girth\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e usize {\n    use std::collections::VecDeque;\n\n    let n = graph.node_count();\n    if n == 0 {\n        return 0;\n    }\n\n    let node_indices: Vec\u003c_\u003e = graph.nodes().map(|n| n.index()).collect();\n    let mut min_cycle = usize::MAX;\n\n    // 对每个节点进行 BFS，寻找回到自身的最短路径\n    for start in \u0026node_indices {\n        let mut dist = vec![usize::MAX; n];\n        let mut queue = VecDeque::new();\n\n        dist[start.index()] = 0;\n        queue.push_back(*start);\n\n        while let Some(u) = queue.pop_front() {\n            if dist[u.index()] \u003e= min_cycle {\n                continue; // 剪枝：当前路径已经超过已知最短环\n            }\n\n            for v in graph.neighbors(u) {\n                let new_dist = dist[u.index()] + 1;\n\n                // 如果 v 已经访问过，且不是 u 的直接父节点，则找到环\n                if dist[v.index()] != usize::MAX {\n                    if dist[v.index()] != dist[u.index()] - 1 {\n                        let cycle_len = new_dist + dist[v.index()];\n                        min_cycle = min_cycle.min(cycle_len);\n                    }\n                } else {\n                    dist[v.index()] = new_dist;\n                    queue.push_back(v);\n                }\n            }\n        }\n    }\n\n    if min_cycle == usize::MAX {\n        0\n    } else {\n        min_cycle\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_is_connected() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n        assert!(is_connected(\u0026graph));\n    }\n\n    #[test]\n    fn test_is_bipartite() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3, 4])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n        assert!(is_bipartite(\u0026graph));\n    }\n\n    #[test]\n    fn test_is_dag() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![1, 2, 3])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n        assert!(is_dag(\u0026graph));\n    }\n\n    #[test]\n    fn test_density() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![1, 2, 3, 4])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n        let d = density(\u0026graph);\n        assert!(d \u003e 0.0 \u0026\u0026 d \u003c 1.0);\n    }\n\n    #[test]\n    fn test_diameter() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![1, 2, 3, 4, 5])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 3, 1.0), (3, 4, 1.0)])\n            .build()\n            .unwrap();\n        \n        // 线性图 A-\u003eB-\u003eC-\u003eD-\u003eE 的直径是 4\n        let diam = diameter(\u0026graph);\n        assert_eq!(diam, 4);\n    }\n\n    #[test]\n    fn test_girth_triangle() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n            .build()\n            .unwrap();\n        \n        // 三角形环的长度是 3\n        let g = girth(\u0026graph);\n        assert_eq!(g, 3);\n    }\n\n    #[test]\n    fn test_girth_no_cycle() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n        \n        // 无环图的 girth 是 0\n        let g = girth(\u0026graph);\n        assert_eq!(g, 0);\n    }\n\n    #[test]\n    fn test_has_cycle() {\n        let graph_with_cycle = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n            .build()\n            .unwrap();\n        assert!(has_cycle(\u0026graph_with_cycle));\n\n        let graph_without_cycle = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n        assert!(!has_cycle(\u0026graph_without_cycle));\n    }\n\n    #[test]\n    fn test_is_tree() {\n        let tree = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3, 4])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0)])\n            .build()\n            .unwrap();\n        assert!(is_tree(\u0026tree));\n\n        let not_tree = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n            .build()\n            .unwrap();\n        assert!(!is_tree(\u0026not_tree));\n    }\n}\n","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":1}},{"line":12,"address":[4906068],"length":1,"stats":{"Line":1}},{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":3}},{"line":17,"address":[],"length":0,"stats":{"Line":1}},{"line":18,"address":[],"length":0,"stats":{"Line":1}},{"line"
