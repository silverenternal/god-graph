<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","home","hugo","codes","god-gragh","benches","centrality.rs"],"content":"//! 中心性算法性能基准测试\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::{GraphOps, GraphQuery};\nuse god_gragh::algorithms::centrality::{\n    degree_centrality, betweenness_centrality, closeness_centrality, pagerank\n};\n#[cfg(feature = \"parallel\")]\nuse god_gragh::algorithms::parallel::{\n    par_pagerank, par_degree_centrality as par_degree_centrality_fn\n};\n#[cfg(all(feature = \"parallel\", feature = \"simd\"))]\nuse god_gragh::algorithms::parallel::{\n    par_pagerank_simd, par_degree_centrality_simd\n};\n\n/// 创建随机图\nfn create_random_graph(num_nodes: usize, edge_probability: f64, seed: u64) -\u003e Graph\u003cusize, f64\u003e {\n    use rand::{Rng, SeedableRng};\n    use rand_chacha::ChaCha8Rng;\n\n    let mut rng = ChaCha8Rng::seed_from_u64(seed);\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(num_nodes, num_nodes * num_nodes / 2);\n    \n    let nodes: Vec\u003c_\u003e = (0..num_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    for i in 0..num_nodes {\n        for j in (i + 1)..num_nodes {\n            if rng.gen_range(0.0..1.0) \u003c edge_probability {\n                graph.add_edge(nodes[i], nodes[j], 1.0).unwrap();\n            }\n        }\n    }\n\n    graph\n}\n\n/// 创建星型图（用于测试度中心性）\nfn create_star_graph(num_nodes: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(num_nodes, num_nodes - 1);\n    \n    let nodes: Vec\u003c_\u003e = (0..num_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    // 中心节点连接到所有其他节点\n    for i in 1..num_nodes {\n        graph.add_edge(nodes[0], nodes[i], 1.0).unwrap();\n    }\n\n    graph\n}\n\n/// 创建线性图（用于测试介数中心性）\nfn create_linear_graph(num_nodes: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(num_nodes, num_nodes - 1);\n    \n    let nodes: Vec\u003c_\u003e = (0..num_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    for i in 0..num_nodes.saturating_sub(1) {\n        graph.add_edge(nodes[i], nodes[i + 1], 1.0).unwrap();\n    }\n\n    graph\n}\n\n// ============================================\n// 度中心性基准测试\n// ============================================\n\nfn bench_degree_centrality(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 2000, 5000];\n\n    let mut group = c.benchmark_group(\"degree_centrality\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.1, 42);\n\n            b.iter(|| {\n                let centrality = degree_centrality(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// 介数中心性基准测试\n// ============================================\n\nfn bench_betweenness_centrality(c: \u0026mut Criterion) {\n    let sizes = vec![50, 100, 200, 500];\n\n    let mut group = c.benchmark_group(\"betweenness_centrality\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.1, 42);\n\n            b.iter(|| {\n                let centrality = betweenness_centrality(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\n/// 在线性图上测试介数中心性（中间节点应该有最高介数）\nfn bench_betweenness_centrality_linear(c: \u0026mut Criterion) {\n    let sizes = vec![50, 100, 200, 500];\n\n    let mut group = c.benchmark_group(\"betweenness_centrality_linear\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_linear_graph(size);\n\n            b.iter(|| {\n                let centrality = betweenness_centrality(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// 接近中心性基准测试\n// ============================================\n\nfn bench_closeness_centrality(c: \u0026mut Criterion) {\n    let sizes = vec![50, 100, 200, 500];\n\n    let mut group = c.benchmark_group(\"closeness_centrality\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.1, 42);\n\n            b.iter(|| {\n                let centrality = closeness_centrality(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// PageRank 基准测试\n// ============================================\n\nfn bench_pagerank(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"pagerank\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.05, 42);\n\n            b.iter(|| {\n                let ranks = pagerank(\u0026graph, 0.85, 20);\n                black_box(ranks);\n            });\n        });\n    }\n    group.finish();\n}\n\n/// PageRank 收敛测试（不同迭代次数）\nfn bench_pagerank_convergence(c: \u0026mut Criterion) {\n    let iterations = vec![5, 10, 20, 50, 100];\n\n    let mut group = c.benchmark_group(\"pagerank_convergence\");\n    for \u0026iters in \u0026iterations {\n        group.bench_with_input(BenchmarkId::from_parameter(iters), \u0026iters, |b, \u0026iters| {\n            let graph = create_random_graph(1000, 0.05, 42);\n\n            b.iter(|| {\n                let ranks = pagerank(\u0026graph, 0.85, iters);\n                black_box(ranks);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// 星型图度中心性（验证正确性）\n// ============================================\n\nfn bench_degree_centrality_star(c: \u0026mut Criterion) {\n    let sizes = vec![10, 50, 100, 500];\n\n    let mut group = c.benchmark_group(\"degree_centrality_star\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_star_graph(size);\n\n            b.iter(|| {\n                let centrality = degree_centrality(\u0026graph);\n                \n                // 验证：中心节点的度中心性应该最高\n                let center_idx = graph.nodes().next().unwrap().index();\n                let center_centrality = centrality.get(\u0026center_idx).copied().unwrap_or(0.0);\n                black_box(center_centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_degree_centrality,\n    bench_betweenness_centrality,\n    bench_betweenness_centrality_linear,\n    bench_closeness_centrality,\n    bench_pagerank,\n    bench_pagerank_convergence,\n    bench_degree_centrality_star,\n    bench_pagerank_parallel,\n    bench_pagerank_simd_comparison,\n    bench_degree_centrality_parallel,\n);\ncriterion_main!(benches);\n\n// ============================================\n// 并行 PageRank 基准测试\n// ============================================\n\n#[cfg(feature = \"parallel\")]\nfn bench_pagerank_parallel(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"pagerank_parallel\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.05, 42);\n\n            b.iter(|| {\n                let ranks = par_pagerank(\u0026graph, 0.85, 20);\n                black_box(ranks);\n            });\n        });\n    }\n    group.finish();\n}\n\n#[cfg(not(feature = \"parallel\"))]\nfn bench_pagerank_parallel(_: \u0026mut Criterion) {}\n\n// ============================================\n// SIMD PageRank 对比测试\n// ============================================\n\n#[cfg(all(feature = \"parallel\", feature = \"simd\"))]\nfn bench_pagerank_simd_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"pagerank_simd_comparison\");\n    for size in sizes {\n        group.bench_with_input(\n            BenchmarkId::new(\"serial\", size),\n            \u0026size,\n            |b, \u0026size| {\n                let graph = create_random_graph(size, 0.05, 42);\n                b.iter(|| {\n                    let ranks = pagerank(\u0026graph, 0.85, 20);\n                    black_box(ranks);\n                });\n            },\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"parallel\", size),\n            \u0026size,\n            |b, \u0026size| {\n                let graph = create_random_graph(size, 0.05, 42);\n                b.iter(|| {\n                    let ranks = par_pagerank(\u0026graph, 0.85, 20);\n                    black_box(ranks);\n                });\n            },\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"simd\", size),\n            \u0026size,\n            |b, \u0026size| {\n                let graph = create_random_graph(size, 0.05, 42);\n                b.iter(|| {\n                    let ranks = par_pagerank_simd(\u0026graph, 0.85, 20);\n                    black_box(ranks);\n                });\n            },\n        );\n    }\n    group.finish();\n}\n\n#[cfg(not(all(feature = \"parallel\", feature = \"simd\")))]\nfn bench_pagerank_simd_comparison(_: \u0026mut Criterion) {}\n\n// ============================================\n// 并行度中心性基准测试\n// ============================================\n\n#[cfg(feature = \"parallel\")]\nfn bench_degree_centrality_parallel(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 2000, 5000];\n\n    let mut group = c.benchmark_group(\"degree_centrality_parallel\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_random_graph(size, 0.1, 42);\n\n            b.iter(|| {\n                let centrality = par_degree_centrality_fn(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\n#[cfg(not(feature = \"parallel\"))]\nfn bench_degree_centrality_parallel(_: \u0026mut Criterion) {}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","comparison.rs"],"content":"//! 与 petgraph 库的性能对比基准测试\n//!\n//! 这些基准测试用于对比 god-gragh 和 petgraph 在相同操作上的性能\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse std::collections::HashSet;\n\n// ============================================\n// god-gragh 导入\n// ============================================\nuse god_gragh::graph::Graph as GodGraph;\nuse god_gragh::graph::traits::{GraphOps as GodGraphOps, GraphQuery as GodGraphQuery};\nuse god_gragh::algorithms::traversal::{dfs as god_dfs, bfs as god_bfs};\nuse god_gragh::algorithms::shortest_path::dijkstra as god_dijkstra;\n\n// ============================================\n// petgraph 导入\n// ============================================\nuse petgraph::graph::{Graph as PetGraph, NodeIndex as PetNodeIndex};\nuse petgraph::visit::{Dfs, Bfs};\nuse petgraph::algo::dijkstra as pet_dijkstra;\n\n// ============================================\n// 图构建辅助函数\n// ============================================\n\n/// 创建线性图（god-gragh）\nfn create_god_linear_graph(size: usize) -\u003e GodGraph\u003cusize, f64\u003e {\n    let mut graph: GodGraph\u003cusize, f64\u003e = GodGraph::with_capacity(size, size);\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    for i in 0..size.saturating_sub(1) {\n        graph.add_edge(nodes[i], nodes[i + 1], 1.0).unwrap();\n    }\n\n    graph\n}\n\n/// 创建线性图（petgraph）\nfn create_pet_linear_graph(size: usize) -\u003e PetGraph\u003cusize, f64\u003e {\n    let mut graph = PetGraph::\u003cusize, f64\u003e::new();\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i))\n        .collect();\n\n    for i in 0..size.saturating_sub(1) {\n        graph.add_edge(nodes[i], nodes[i + 1], 1.0);\n    }\n\n    graph\n}\n\n/// 创建网格图（god-gragh）\nfn create_god_grid_graph(rows: usize, cols: usize) -\u003e GodGraph\u003cusize, f64\u003e {\n    let size = rows * cols;\n    let mut graph: GodGraph\u003cusize, f64\u003e = GodGraph::with_capacity(size, size * 4);\n\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    for row in 0..rows {\n        for col in 0..cols {\n            let idx = row * cols + col;\n            if col + 1 \u003c cols {\n                graph.add_edge(nodes[idx], nodes[idx + 1], 1.0).unwrap();\n            }\n            if row + 1 \u003c rows {\n                graph.add_edge(nodes[idx], nodes[idx + cols], 1.0).unwrap();\n            }\n        }\n    }\n\n    graph\n}\n\n/// 创建网格图（petgraph）\nfn create_pet_grid_graph(rows: usize, cols: usize) -\u003e PetGraph\u003cusize, f64\u003e {\n    let size = rows * cols;\n    let mut graph = PetGraph::\u003cusize, f64\u003e::new();\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i))\n        .collect();\n\n    for row in 0..rows {\n        for col in 0..cols {\n            let idx = row * cols + col;\n            if col + 1 \u003c cols {\n                graph.add_edge(nodes[idx], nodes[idx + 1], 1.0);\n            }\n            if row + 1 \u003c rows {\n                graph.add_edge(nodes[idx], nodes[idx + cols], 1.0);\n            }\n        }\n    }\n\n    graph\n}\n\n// ============================================\n// DFS 对比\n// ============================================\n\nfn bench_dfs_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"dfs_comparison\");\n    \n    for size in sizes {\n        group.bench_with_input(BenchmarkId::new(\"god-gragh\", size), \u0026size, |b, \u0026size| {\n            let graph = create_god_linear_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n\n            b.iter(|| {\n                let mut count = 0;\n                god_dfs(\u0026graph, start, |_node| {\n                    count += 1;\n                    true\n                });\n                black_box(count);\n            });\n        });\n\n        group.bench_with_input(BenchmarkId::new(\"petgraph\", size), \u0026size, |b, \u0026size| {\n            let graph = create_pet_linear_graph(size);\n            let start = PetNodeIndex::new(0);\n\n            b.iter(|| {\n                let mut dfs = Dfs::new(\u0026graph, start);\n                let mut count = 0;\n                while dfs.next(\u0026graph).is_some() {\n                    count += 1;\n                }\n                black_box(count);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// BFS 对比\n// ============================================\n\nfn bench_bfs_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"bfs_comparison\");\n    \n    for size in sizes {\n        group.bench_with_input(BenchmarkId::new(\"god-gragh\", size), \u0026size, |b, \u0026size| {\n            let graph = create_god_linear_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n\n            b.iter(|| {\n                let mut count = 0;\n                god_bfs(\u0026graph, start, |_node, _depth| {\n                    count += 1;\n                    true\n                });\n                black_box(count);\n            });\n        });\n\n        group.bench_with_input(BenchmarkId::new(\"petgraph\", size), \u0026size, |b, \u0026size| {\n            let graph = create_pet_linear_graph(size);\n            let start = PetNodeIndex::new(0);\n\n            b.iter(|| {\n                let mut bfs = Bfs::new(\u0026graph, start);\n                let mut count = 0;\n                while bfs.next(\u0026graph).is_some() {\n                    count += 1;\n                }\n                black_box(count);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// Dijkstra 对比\n// ============================================\n\nfn bench_dijkstra_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 2000, 5000];\n\n    let mut group = c.benchmark_group(\"dijkstra_comparison\");\n    \n    for size in sizes {\n        group.bench_with_input(BenchmarkId::new(\"god-gragh\", size), \u0026size, |b, \u0026size| {\n            let graph = create_god_linear_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n\n            b.iter(|| {\n                let distances = god_dijkstra(\u0026graph, start, |_, _, w| *w).unwrap();\n                black_box(distances);\n            });\n        });\n\n        group.bench_with_input(BenchmarkId::new(\"petgraph\", size), \u0026size, |b, \u0026size| {\n            let graph = create_pet_linear_graph(size);\n            let start = PetNodeIndex::new(0);\n\n            b.iter(|| {\n                let distances = pet_dijkstra(\u0026graph, start, None, |edge: petgraph::graph::EdgeReference\u003cf64\u003e| *edge.weight());\n                black_box(distances);\n            });\n        });\n    }\n    group.finish();\n}\n\n// ============================================\n// 网格图遍历对比\n// ============================================\n\nfn bench_grid_traversal_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![(10, 10), (20, 20), (30, 30), (50, 50)];\n\n    let mut group = c.benchmark_group(\"grid_traversal_comparison\");\n    \n    for (rows, cols) in sizes {\n        let total = rows * cols;\n        \n        group.bench_with_input(\n            BenchmarkId::new(\"god-gragh\", total), \n            \u0026(rows, cols), \n            |b, \u0026(rows, cols)| {\n                let graph = create_god_grid_graph(rows, cols);\n                let start = graph.nodes().next().unwrap().index();\n\n                b.iter(|| {\n                    let mut visited = HashSet::new();\n                    god_dfs(\u0026graph, start, |node| {\n                        visited.insert(node.index());\n                        true\n                    });\n                    black_box(visited.len());\n                });\n            }\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"petgraph\", total), \n            \u0026(rows, cols), \n            |b, \u0026(rows, cols)| {\n                let graph = create_pet_grid_graph(rows, cols);\n                let start = PetNodeIndex::new(0);\n\n                b.iter(|| {\n                    let mut dfs = Dfs::new(\u0026graph, start);\n                    let mut count = 0;\n                    while dfs.next(\u0026graph).is_some() {\n                        count += 1;\n                    }\n                    black_box(count);\n                });\n            }\n        );\n    }\n    group.finish();\n}\n\n// ============================================\n// 图构建性能对比\n// ============================================\n\nfn bench_graph_construction_comparison(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"graph_construction_comparison\");\n    \n    for size in sizes {\n        group.bench_with_input(BenchmarkId::new(\"god-gragh\", size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                black_box(create_god_linear_graph(size));\n            });\n        });\n\n        group.bench_with_input(BenchmarkId::new(\"petgraph\", size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                black_box(create_pet_linear_graph(size));\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_dfs_comparison,\n    bench_bfs_comparison,\n    bench_dijkstra_comparison,\n    bench_grid_traversal_comparison,\n    bench_graph_construction_comparison,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","construction.rs"],"content":"//! 图构建性能基准测试\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::GraphOps;\n\nfn bench_add_nodes(c: \u0026mut Criterion) {\n    let sizes = vec![100, 1000, 5000, 10000];\n\n    let mut group = c.benchmark_group(\"add_nodes\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                let mut graph: Graph\u003ci32, f64\u003e = Graph::directed();\n                for i in 0..size {\n                    graph.add_node(i).unwrap();\n                }\n                black_box(graph);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_add_edges(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000];\n\n    let mut group = c.benchmark_group(\"add_edges\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                let mut graph: Graph\u003ci32, f64\u003e = Graph::with_capacity(size, size * 2);\n\n                // 先添加节点\n                let nodes: Vec\u003c_\u003e = (0..size)\n                    .map(|i| graph.add_node(i as i32).unwrap())\n                    .collect();\n\n                // 添加线性边\n                for i in 0..size.saturating_sub(1) {\n                    graph.add_edge(nodes[i], nodes[i + 1], 1.0).unwrap();\n                }\n\n                black_box(graph);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_remove_node(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000];\n\n    let mut group = c.benchmark_group(\"remove_node\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                let mut graph: Graph\u003ci32, f64\u003e = Graph::with_capacity(size, size * 2);\n\n                let nodes: Vec\u003c_\u003e = (0..size)\n                    .map(|i| graph.add_node(i as i32).unwrap())\n                    .collect();\n\n                // 添加边：每个节点连接到下一个节点\n                for i in 0..size.saturating_sub(1) {\n                    graph.add_edge(nodes[i], nodes[i + 1], 1.0).unwrap();\n                }\n\n                // 删除中间节点\n                if size \u003e 2 {\n                    graph.remove_node(nodes[size / 2]).unwrap();\n                }\n\n                black_box(graph);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_with_capacity(c: \u0026mut Criterion) {\n    let sizes = vec![1000, 5000, 10000, 50000];\n\n    let mut group = c.benchmark_group(\"with_capacity\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            b.iter(|| {\n                let graph: Graph\u003ci32, f64\u003e = Graph::with_capacity(size, size * 2);\n                black_box(graph);\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_add_nodes,\n    bench_add_edges,\n    bench_remove_node,\n    bench_with_capacity,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","parallel.rs"],"content":"//! 并行算法性能基准测试\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::GraphOps;\nuse god_gragh::algorithms::parallel::{par_pagerank, par_connected_components, par_degree_centrality};\n\nfn create_large_graph(num_nodes: usize, avg_degree: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(num_nodes, num_nodes * avg_degree);\n    let nodes: Vec\u003c_\u003e = (0..num_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    // 添加随机边（确定性伪随机）\n    let mut seed = 42u64;\n    for i in 0..num_nodes {\n        for _ in 0..avg_degree {\n            // 简单的 LCG 伪随机\n            seed = seed.wrapping_mul(6364136223846793005).wrapping_add(1);\n            let target = (seed as usize) % num_nodes;\n            if target != i {\n                let _ = graph.add_edge(nodes[i], nodes[target], 1.0);\n            }\n        }\n    }\n    \n    graph\n}\n\n/// 创建稀疏的 disconnected 图（环状连接，避免内存爆炸）\nfn create_disconnected_graph_sparse(num_components: usize, nodes_per_component: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let total_nodes = num_components * nodes_per_component;\n    let total_edges = total_nodes * 2; // 每个节点约 2 条边\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(total_nodes, total_edges);\n\n    let nodes: Vec\u003c_\u003e = (0..total_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    // 每个连通分量内部形成环状连接（而非完全连接）\n    for comp in 0..num_components {\n        let start = comp * nodes_per_component;\n        for i in 0..nodes_per_component {\n            let current = start + i;\n            let next = start + (i + 1) % nodes_per_component;\n            let _ = graph.add_edge(nodes[current], nodes[next], 1.0);\n            // 添加一些额外的边确保连通性\n            if i + 2 \u003c nodes_per_component {\n                let _ = graph.add_edge(nodes[current], nodes[start + i + 2], 1.0);\n            }\n        }\n    }\n\n    graph\n}\n\nfn bench_par_pagerank(c: \u0026mut Criterion) {\n    let params = vec![(500, 5), (1000, 5), (2000, 5), (5000, 5)];\n\n    let mut group = c.benchmark_group(\"par_pagerank\");\n    for (num_nodes, avg_degree) in params {\n        group.bench_with_input(\n            BenchmarkId::from_parameter(num_nodes),\n            \u0026(num_nodes, avg_degree),\n            |b, \u0026(num_nodes, avg_degree)| {\n                let graph = create_large_graph(num_nodes, avg_degree);\n                \n                b.iter(|| {\n                    let ranks = par_pagerank(\u0026graph, 0.85, 20);\n                    black_box(ranks);\n                });\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_par_connected_components(c: \u0026mut Criterion) {\n    // 使用稀疏图而非完全图，避免内存爆炸\n    // 每个分量内部形成环状连接，而非完全连接\n    let params = vec![(4, 50), (4, 100), (4, 250), (4, 500)];\n\n    let mut group = c.benchmark_group(\"par_connected_components\");\n    for (num_components, nodes_per_component) in params {\n        let total = num_components * nodes_per_component;\n        group.bench_with_input(\n            BenchmarkId::from_parameter(total),\n            \u0026(num_components, nodes_per_component),\n            |b, \u0026(num_components, nodes_per_component)| {\n                let graph = create_disconnected_graph_sparse(num_components, nodes_per_component);\n\n                b.iter(|| {\n                    let components = par_connected_components(\u0026graph);\n                    black_box(components);\n                });\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_par_degree_centrality(c: \u0026mut Criterion) {\n    let sizes = vec![500, 1000, 2000, 5000];\n\n    let mut group = c.benchmark_group(\"par_degree_centrality\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_large_graph(size, 10);\n            \n            b.iter(|| {\n                let centrality = par_degree_centrality(\u0026graph);\n                black_box(centrality);\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_par_pagerank,\n    bench_par_connected_components,\n    bench_par_degree_centrality,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","shortest_path.rs"],"content":"//! 最短路径算法性能基准测试\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::{GraphOps, GraphQuery};\nuse god_gragh::algorithms::shortest_path::{dijkstra, bellman_ford, astar};\n\nfn create_weighted_graph(size: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(size, size * 3);\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    // 添加线性边\n    for i in 0..size.saturating_sub(1) {\n        graph.add_edge(nodes[i], nodes[i + 1], (i + 1) as f64).unwrap();\n    }\n    \n    // 添加一些额外边\n    for i in 0..size.saturating_sub(2) {\n        graph.add_edge(nodes[i], nodes[i + 2], (i + 2) as f64 * 1.5).unwrap();\n    }\n    \n    graph\n}\n\nfn create_grid_graph_with_weights(rows: usize, cols: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let size = rows * cols;\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(size, size * 4);\n    \n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    for row in 0..rows {\n        for col in 0..cols {\n            let idx = row * cols + col;\n            // 向右连接\n            if col + 1 \u003c cols {\n                graph.add_edge(nodes[idx], nodes[idx + 1], (idx % 10 + 1) as f64).unwrap();\n            }\n            // 向下连接\n            if row + 1 \u003c rows {\n                graph.add_edge(nodes[idx], nodes[idx + cols], ((idx * 3) % 10 + 1) as f64).unwrap();\n            }\n        }\n    }\n    \n    graph\n}\n\nfn bench_dijkstra(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000];\n\n    let mut group = c.benchmark_group(\"dijkstra\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_weighted_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n            \n            b.iter(|| {\n                let distances = dijkstra(\u0026graph, start, |_, _, w| *w).unwrap();\n                black_box(distances);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_bellman_ford(c: \u0026mut Criterion) {\n    let sizes = vec![50, 100, 200, 500];\n\n    let mut group = c.benchmark_group(\"bellman_ford\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_weighted_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n            \n            b.iter(|| {\n                let distances = bellman_ford(\u0026graph, start, |_, _, w| *w).unwrap();\n                black_box(distances);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_astar(c: \u0026mut Criterion) {\n    let sizes = vec![(10, 10), (20, 20), (30, 30), (50, 50)];\n\n    let mut group = c.benchmark_group(\"astar\");\n    for (rows, cols) in sizes {\n        let total = rows * cols;\n        group.bench_with_input(BenchmarkId::from_parameter(total), \u0026(rows, cols), |b, \u0026(rows, cols)| {\n            let graph = create_grid_graph_with_weights(rows, cols);\n            let nodes: Vec\u003c_\u003e = graph.nodes().map(|n| n.index()).collect();\n            let start = nodes[0];\n            let goal = nodes[nodes.len() - 1];\n            \n            // 曼哈顿距离启发式\n            let heuristic = move |node: god_gragh::node::NodeIndex| -\u003e f64 {\n                let idx = node.index();\n                let row = idx / cols;\n                let col = idx % cols;\n                let goal_row = (nodes.len() - 1) / cols;\n                let goal_col = (nodes.len() - 1) % cols;\n                ((goal_row as i32 - row as i32).abs() + (goal_col as i32 - col as i32).abs()) as f64\n            };\n            \n            b.iter(|| {\n                let result = astar(\u0026graph, start, goal, |_, _, w| *w, \u0026heuristic).unwrap();\n                black_box(result);\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_dijkstra,\n    bench_bellman_ford,\n    bench_astar,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","speedup.rs"],"content":"//! 并行算法加速比基准测试\n//!\n//! 验证并行算法相对于串行版本的加速比\n//! 目标：8 核 CPU 上达到 6-8x 加速比\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId, Throughput};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::{GraphOps, GraphQuery};\nuse god_gragh::algorithms::traversal::{dfs, bfs};\nuse god_gragh::algorithms::centrality::pagerank;\nuse god_gragh::algorithms::parallel::{par_dfs, par_bfs, par_pagerank};\nuse std::sync::atomic::{AtomicUsize, Ordering};\n\n/// 创建测试图\nfn create_test_graph(num_nodes: usize, avg_degree: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(num_nodes, num_nodes * avg_degree);\n    let nodes: Vec\u003c_\u003e = (0..num_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n\n    // 添加随机边（确定性伪随机）\n    let mut seed = 42u64;\n    for i in 0..num_nodes {\n        for _ in 0..avg_degree {\n            seed = seed.wrapping_mul(6364136223846793005).wrapping_add(1);\n            let target = (seed as usize) % num_nodes;\n            if target != i {\n                let _ = graph.add_edge(nodes[i], nodes[target], 1.0);\n            }\n        }\n    }\n\n    graph\n}\n\n/// 串行 DFS 包装函数\nfn serial_dfs(graph: \u0026Graph\u003cusize, f64\u003e, start: usize) {\n    let start_idx = graph.nodes().nth(start).unwrap().index();\n    let mut count = 0;\n    dfs(graph, start_idx, |_node| {\n        count += 1;\n        true\n    });\n    black_box(count);\n}\n\n/// 并行 DFS 包装函数\nfn parallel_dfs(graph: \u0026Graph\u003cusize, f64\u003e, start: usize) {\n    let start_idx = graph.nodes().nth(start).unwrap().index();\n    let count = AtomicUsize::new(0);\n    par_dfs(graph, start_idx, |_node| {\n        count.fetch_add(1, Ordering::Relaxed);\n        true\n    });\n    black_box(count.load(Ordering::Relaxed));\n}\n\n/// 串行 BFS 包装函数\nfn serial_bfs(graph: \u0026Graph\u003cusize, f64\u003e, start: usize) {\n    let start_idx = graph.nodes().nth(start).unwrap().index();\n    let mut count = 0;\n    bfs(graph, start_idx, |_node, _depth| {\n        count += 1;\n        true\n    });\n    black_box(count);\n}\n\n/// 并行 BFS 包装函数\nfn parallel_bfs(graph: \u0026Graph\u003cusize, f64\u003e, start: usize) {\n    let start_idx = graph.nodes().nth(start).unwrap().index();\n    let count = AtomicUsize::new(0);\n    par_bfs(graph, start_idx, |_node, _depth| {\n        count.fetch_add(1, Ordering::Relaxed);\n        true\n    });\n    black_box(count.load(Ordering::Relaxed));\n}\n\n/// 串行 PageRank 包装函数\nfn serial_pagerank(graph: \u0026Graph\u003cusize, f64\u003e, damping: f64, iterations: usize) {\n    let ranks = pagerank(graph, damping, iterations);\n    black_box(ranks);\n}\n\n/// 并行 PageRank 包装函数\nfn parallel_pagerank(graph: \u0026Graph\u003cusize, f64\u003e, damping: f64, iterations: usize) {\n    let ranks = par_pagerank(graph, damping, iterations);\n    black_box(ranks);\n}\n\nfn bench_dfs_speedup(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"dfs_speedup\");\n    \n    let sizes = vec![\n        (1_000, 5),\n        (5_000, 5),\n        (10_000, 5),\n        (50_000, 5),\n        (100_000, 5),\n    ];\n\n    for (num_nodes, avg_degree) in sizes {\n        let graph = create_test_graph(num_nodes, avg_degree);\n        let start = 0;\n        \n        group.throughput(Throughput::Elements(num_nodes as u64));\n        \n        group.bench_with_input(\n            BenchmarkId::new(\"serial\", num_nodes),\n            \u0026(\u0026graph, start),\n            |b, \u0026(graph, start)| b.iter(|| serial_dfs(graph, start)),\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"parallel\", num_nodes),\n            \u0026(\u0026graph, start),\n            |b, \u0026(graph, start)| b.iter(|| parallel_dfs(graph, start)),\n        );\n    }\n    group.finish();\n}\n\nfn bench_bfs_speedup(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"bfs_speedup\");\n    \n    let sizes = vec![\n        (1_000, 5),\n        (5_000, 5),\n        (10_000, 5),\n        (50_000, 5),\n        (100_000, 5),\n    ];\n\n    for (num_nodes, avg_degree) in sizes {\n        let graph = create_test_graph(num_nodes, avg_degree);\n        let start = 0;\n        \n        group.throughput(Throughput::Elements(num_nodes as u64));\n        \n        group.bench_with_input(\n            BenchmarkId::new(\"serial\", num_nodes),\n            \u0026(\u0026graph, start),\n            |b, \u0026(graph, start)| b.iter(|| serial_bfs(graph, start)),\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"parallel\", num_nodes),\n            \u0026(\u0026graph, start),\n            |b, \u0026(graph, start)| b.iter(|| parallel_bfs(graph, start)),\n        );\n    }\n    group.finish();\n}\n\nfn bench_pagerank_speedup(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"pagerank_speedup\");\n    \n    let sizes = vec![\n        (1_000, 5),\n        (5_000, 5),\n        (10_000, 5),\n        (50_000, 5),\n    ];\n\n    let damping = 0.85;\n    let iterations = 20;\n\n    for (num_nodes, avg_degree) in sizes {\n        let graph = create_test_graph(num_nodes, avg_degree);\n        \n        group.throughput(Throughput::Elements((num_nodes * iterations) as u64));\n        \n        group.bench_with_input(\n            BenchmarkId::new(\"serial\", num_nodes),\n            \u0026(\u0026graph, damping, iterations),\n            |b, \u0026(graph, damping, iterations)| b.iter(|| serial_pagerank(graph, damping, iterations)),\n        );\n\n        group.bench_with_input(\n            BenchmarkId::new(\"parallel\", num_nodes),\n            \u0026(\u0026graph, damping, iterations),\n            |b, \u0026(graph, damping, iterations)| b.iter(|| parallel_pagerank(graph, damping, iterations)),\n        );\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    name = benches;\n    config = Criterion::default().sample_size(50);\n    targets = \n        bench_dfs_speedup,\n        bench_bfs_speedup,\n        bench_pagerank_speedup,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","benches","traversal.rs"],"content":"//! 图遍历算法性能基准测试\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, BenchmarkId};\nuse god_gragh::graph::Graph;\nuse god_gragh::graph::traits::{GraphOps, GraphQuery};\nuse god_gragh::algorithms::traversal::{dfs, bfs, tarjan_scc};\n\nfn create_linear_graph(size: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(size, size);\n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    for i in 0..size.saturating_sub(1) {\n        graph.add_edge(nodes[i], nodes[i + 1], 1.0).unwrap();\n    }\n    \n    graph\n}\n\nfn create_grid_graph(rows: usize, cols: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let size = rows * cols;\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(size, size * 4);\n    \n    let nodes: Vec\u003c_\u003e = (0..size)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    for row in 0..rows {\n        for col in 0..cols {\n            let idx = row * cols + col;\n            // 向右连接\n            if col + 1 \u003c cols {\n                graph.add_edge(nodes[idx], nodes[idx + 1], 1.0).unwrap();\n            }\n            // 向下连接\n            if row + 1 \u003c rows {\n                graph.add_edge(nodes[idx], nodes[idx + cols], 1.0).unwrap();\n            }\n        }\n    }\n    \n    graph\n}\n\nfn create_scc_graph(num_sccs: usize, nodes_per_scc: usize) -\u003e Graph\u003cusize, f64\u003e {\n    let total_nodes = num_sccs * nodes_per_scc;\n    let mut graph: Graph\u003cusize, f64\u003e = Graph::with_capacity(total_nodes, total_nodes * 2);\n    \n    let nodes: Vec\u003c_\u003e = (0..total_nodes)\n        .map(|i| graph.add_node(i).unwrap())\n        .collect();\n    \n    // 每个 SCC 内部完全连接\n    for scc in 0..num_sccs {\n        let start = scc * nodes_per_scc;\n        for i in start..start + nodes_per_scc {\n            for j in start..start + nodes_per_scc {\n                if i != j {\n                    graph.add_edge(nodes[i], nodes[j], 1.0).unwrap();\n                }\n            }\n        }\n        // 连接到下一个 SCC（形成链）\n        if scc + 1 \u003c num_sccs {\n            let last_of_current = start + nodes_per_scc - 1;\n            let first_of_next = (scc + 1) * nodes_per_scc;\n            graph.add_edge(nodes[last_of_current], nodes[first_of_next], 1.0).unwrap();\n        }\n    }\n    \n    graph\n}\n\nfn bench_dfs(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000];\n\n    let mut group = c.benchmark_group(\"dfs\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_linear_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n            \n            b.iter(|| {\n                let mut count = 0;\n                dfs(\u0026graph, start, |_node| {\n                    count += 1;\n                    true\n                });\n                black_box(count);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_bfs(c: \u0026mut Criterion) {\n    let sizes = vec![100, 500, 1000, 5000];\n\n    let mut group = c.benchmark_group(\"bfs\");\n    for size in sizes {\n        group.bench_with_input(BenchmarkId::from_parameter(size), \u0026size, |b, \u0026size| {\n            let graph = create_linear_graph(size);\n            let start = graph.nodes().next().unwrap().index();\n            \n            b.iter(|| {\n                let mut count = 0;\n                bfs(\u0026graph, start, |_node, _depth| {\n                    count += 1;\n                    true\n                });\n                black_box(count);\n            });\n        });\n    }\n    group.finish();\n}\n\nfn bench_tarjan_scc(c: \u0026mut Criterion) {\n    let params = vec![(5, 20), (10, 50), (20, 100), (50, 200)];\n\n    let mut group = c.benchmark_group(\"tarjan_scc\");\n    for (num_sccs, nodes_per_scc) in params {\n        let total = num_sccs * nodes_per_scc;\n        group.bench_with_input(\n            BenchmarkId::from_parameter(total),\n            \u0026(num_sccs, nodes_per_scc),\n            |b, \u0026(num_sccs, nodes_per_scc)| {\n                let graph = create_scc_graph(num_sccs, nodes_per_scc);\n                \n                b.iter(|| {\n                    let sccs = tarjan_scc(\u0026graph);\n                    black_box(sccs);\n                });\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_dfs_grid(c: \u0026mut Criterion) {\n    let sizes = vec![(10, 10), (20, 20), (30, 30), (50, 50)];\n\n    let mut group = c.benchmark_group(\"dfs_grid\");\n    for (rows, cols) in sizes {\n        let total = rows * cols;\n        group.bench_with_input(BenchmarkId::from_parameter(total), \u0026(rows, cols), |b, \u0026(rows, cols)| {\n            let graph = create_grid_graph(rows, cols);\n            let start = graph.nodes().next().unwrap().index();\n            \n            b.iter(|| {\n                let mut count = 0;\n                dfs(\u0026graph, start, |_node| {\n                    count += 1;\n                    true\n                });\n                black_box(count);\n            });\n        });\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_dfs,\n    bench_bfs,\n    bench_tarjan_scc,\n    bench_dfs_grid,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","build.rs"],"content":"fn main() {\n    // Declare custom cfg for nightly Rust detection\n    println!(\"cargo::rustc-check-cfg=cfg(nightly)\");\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","centrality.rs"],"content":"//! 中心性算法模块\n//!\n//! 包含度中心性、介数中心性、接近中心性、PageRank 等算法\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse std::collections::{HashMap, VecDeque};\n\n/// 度中心性\n///\n/// 计算每个节点的度中心性（归一化的度数）\npub fn degree_centrality\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e HashMap\u003cNodeIndex, f64\u003e {\n    let n = graph.node_count();\n    if n \u003c= 1 {\n        return HashMap::new();\n    }\n\n    let mut centrality = HashMap::new();\n    let norm = 1.0 / (n - 1) as f64;\n\n    for node in graph.nodes() {\n        let degree = graph.out_degree(node.index()).unwrap_or(0) as f64;\n        centrality.insert(node.index(), degree * norm);\n    }\n\n    centrality\n}\n\n/// PageRank 算法\n///\n/// 计算每个节点的 PageRank 分数\n///\n/// # 参数\n/// * `graph` - 图\n/// * `damping` - 阻尼系数（通常 0.85）\n/// * `iterations` - 迭代次数\n///\n/// # 返回\n/// HashMap，键为节点索引，值为 PageRank 分数\npub fn pagerank\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    damping: f64,\n    iterations: usize,\n) -\u003e HashMap\u003cNodeIndex, f64\u003e {\n    let n = graph.node_count();\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    // 收集所有有效节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    \n    // 初始化：均匀分布\n    let mut scores: HashMap\u003cNodeIndex, f64\u003e = node_indices\n        .iter()\n        .map(|\u0026ni| (ni, 1.0 / n as f64))\n        .collect();\n\n    for _ in 0..iterations {\n        let mut new_scores: HashMap\u003cNodeIndex, f64\u003e = node_indices\n            .iter()\n            .map(|\u0026ni| (ni, 0.0))\n            .collect();\n\n        // 计算每个节点的 PageRank\n        for \u0026node in \u0026node_indices {\n            // 基础分数：随机跳转贡献\n            let mut rank = (1.0 - damping) / n as f64;\n\n            // 收集指向当前节点的邻居贡献\n            for neighbor in graph.nodes() {\n                // 检查 neighbor 是否指向 node\n                if graph.has_edge(neighbor.index(), node) {\n                    let out_degree = graph.out_degree(neighbor.index()).unwrap_or(1);\n                    if out_degree \u003e 0 {\n                        let contribution = scores.get(\u0026neighbor.index()).copied().unwrap_or(0.0);\n                        rank += damping * contribution / out_degree as f64;\n                    }\n                }\n            }\n\n            new_scores.insert(node, rank);\n        }\n\n        scores = new_scores;\n    }\n\n    scores\n}\n\n/// 介数中心性（基于 Brandes 算法）\n///\n/// 计算每个节点的介数中心性\n/// 介数中心性衡量节点在所有最短路径中出现的频率\npub fn betweenness_centrality\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e HashMap\u003cNodeIndex, f64\u003e {\n    let n = graph.node_count();\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let mut centrality: HashMap\u003cNodeIndex, f64\u003e = node_indices\n        .iter()\n        .map(|\u0026ni| (ni, 0.0))\n        .collect();\n\n    for s in \u0026node_indices {\n        // 单源最短路径\n        let mut dist: HashMap\u003cNodeIndex, i32\u003e = node_indices.iter().map(|\u0026ni| (ni, -1)).collect();\n        let mut sigma: HashMap\u003cNodeIndex, usize\u003e = node_indices.iter().map(|\u0026ni| (ni, 0)).collect();\n        let mut predecessors: HashMap\u003cNodeIndex, Vec\u003cNodeIndex\u003e\u003e = \n            node_indices.iter().map(|\u0026ni| (ni, Vec::new())).collect();\n        let mut stack = Vec::new();\n\n        dist.insert(*s, 0);\n        sigma.insert(*s, 1);\n        let mut queue = VecDeque::new();\n        queue.push_back(*s);\n\n        while let Some(v) = queue.pop_front() {\n            stack.push(v);\n\n            for w in graph.neighbors(v) {\n                // w 第一次访问\n                if dist.get(\u0026w).copied().unwrap_or(-1) \u003c 0 {\n                    dist.insert(w, dist.get(\u0026v).copied().unwrap_or(0) + 1);\n                    queue.push_back(w);\n                }\n\n                // 最短路径经过 v 到 w\n                if dist.get(\u0026w).copied().unwrap_or(0) == dist.get(\u0026v).copied().unwrap_or(0) + 1 {\n                    *sigma.get_mut(\u0026w).unwrap() += sigma.get(\u0026v).copied().unwrap_or(0);\n                    predecessors.get_mut(\u0026w).unwrap().push(v);\n                }\n            }\n        }\n\n        // 反向累加依赖值\n        let mut delta: HashMap\u003cNodeIndex, f64\u003e = node_indices.iter().map(|\u0026ni| (ni, 0.0)).collect();\n        \n        while let Some(w) = stack.pop() {\n            for \u0026v in predecessors.get(\u0026w).unwrap_or(\u0026Vec::new()) {\n                let delta_w = delta.get(\u0026w).copied().unwrap_or(0.0);\n                let sigma_w = sigma.get(\u0026w).copied().unwrap_or(1);\n                let sigma_v = sigma.get(\u0026v).copied().unwrap_or(1);\n                \n                if sigma_w \u003e 0 {\n                    let contrib = (sigma_v as f64 / sigma_w as f64) * (1.0 + delta_w);\n                    *delta.get_mut(\u0026v).unwrap() += contrib;\n                }\n            }\n            \n            if w != *s {\n                let centrality_w = centrality.get_mut(\u0026w).unwrap();\n                *centrality_w += delta.get(\u0026w).copied().unwrap_or(0.0);\n            }\n        }\n    }\n\n    // 归一化（有向图）\n    if n \u003e 2 {\n        let norm = 1.0 / ((n - 1) * (n - 2)) as f64;\n        for val in centrality.values_mut() {\n            *val *= norm;\n        }\n    }\n\n    centrality\n}\n\n/// 接近中心性（基于 BFS 计算平均最短距离）\n///\n/// 计算每个节点的接近中心性\n/// 接近中心性衡量节点到所有其他节点的平均最短距离的倒数\npub fn closeness_centrality\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e HashMap\u003cNodeIndex, f64\u003e {\n    let n = graph.node_count();\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let mut centrality: HashMap\u003cNodeIndex, f64\u003e = HashMap::new();\n\n    for \u0026source in \u0026node_indices {\n        // BFS 计算从 source 到所有节点的最短距离\n        let mut dist: HashMap\u003cNodeIndex, usize\u003e = node_indices.iter().map(|\u0026ni| (ni, usize::MAX)).collect();\n        let mut queue = VecDeque::new();\n\n        dist.insert(source, 0);\n        queue.push_back(source);\n\n        while let Some(v) = queue.pop_front() {\n            let d = dist.get(\u0026v).copied().unwrap_or(usize::MAX);\n\n            for w in graph.neighbors(v) {\n                if dist.get(\u0026w).copied().unwrap_or(usize::MAX) == usize::MAX {\n                    dist.insert(w, d + 1);\n                    queue.push_back(w);\n                }\n            }\n        }\n\n        // 计算可达节点的总距离\n        let mut total_dist = 0usize;\n        let mut reachable = 0usize;\n        \n        for \u0026node in \u0026node_indices {\n            if node != source {\n                let d = dist.get(\u0026node).copied().unwrap_or(usize::MAX);\n                if d != usize::MAX {\n                    total_dist += d;\n                    reachable += 1;\n                }\n            }\n        }\n\n        // 接近中心性 = 可达节点数 / 总距离\n        let closeness = if total_dist \u003e 0 {\n            reachable as f64 / total_dist as f64\n        } else if reachable == 0 {\n            0.0\n        } else {\n            1.0 // 所有节点距离都为 0（只有孤立点）\n        };\n\n        centrality.insert(source, closeness);\n    }\n\n    centrality\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_pagerank_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0)])\n            .build()\n            .unwrap();\n\n        let ranks = pagerank(\u0026graph, 0.85, 20);\n        assert_eq!(ranks.len(), 3);\n\n        // 在环形结构中，所有节点的 PageRank 应该相近\n        let values: Vec\u003c_\u003e = ranks.values().collect();\n        for i in 1..values.len() {\n            assert!((values[i] - values[0]).abs() \u003c 0.01);\n        }\n    }\n\n    #[test]\n    fn test_degree_centrality() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let centrality = degree_centrality(\u0026graph);\n        \n        // A 的出度为 3，中心性最高\n        let a_idx = graph.nodes().next().unwrap().index();\n        assert!(centrality.contains_key(\u0026a_idx));\n    }\n\n    #[test]\n    fn test_betweenness_centrality() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n\n        let centrality = betweenness_centrality(\u0026graph);\n        assert_eq!(centrality.len(), 3);\n        \n        // B 在 A-\u003eC 的路径上，介数中心性应该最高\n        let b_idx = graph.nodes().nth(1).unwrap().index();\n        let b_centrality = centrality.get(\u0026b_idx).copied().unwrap_or(0.0);\n        assert!(b_centrality \u003e 0.0);\n    }\n\n    #[test]\n    fn test_closeness_centrality() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0)])\n            .build()\n            .unwrap();\n\n        let centrality = closeness_centrality(\u0026graph);\n        assert_eq!(centrality.len(), 3);\n    }\n\n    #[test]\n    fn test_betweenness_centrality_star() {\n        // 星型图：中心节点介数应该最高\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"center\", \"A\", \"B\", \"C\"])\n            .with_edges(vec![\n                (1, 0, 1.0), (2, 0, 1.0), (3, 0, 1.0),  // A, B, C -\u003e center\n                (0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0),  // center -\u003e A, B, C\n            ])\n            .build()\n            .unwrap();\n\n        let centrality = betweenness_centrality(\u0026graph);\n        \n        // 中心节点应该是介数最高的\n        let center_idx = graph.nodes().next().unwrap().index();\n        let center_centrality = centrality.get(\u0026center_idx).copied().unwrap_or(0.0);\n        \n        // 验证中心节点的介数大于 0\n        assert!(center_centrality \u003e 0.0);\n    }\n\n    #[test]\n    fn test_closeness_centrality_connected() {\n        // 完全连通图的接近中心性应该都接近 1\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 1.0), (0, 2, 1.0), (0, 3, 1.0),\n                (1, 0, 1.0), (1, 2, 1.0), (1, 3, 1.0),\n                (2, 0, 1.0), (2, 1, 1.0), (2, 3, 1.0),\n                (3, 0, 1.0), (3, 1, 1.0), (3, 2, 1.0),\n            ])\n            .build()\n            .unwrap();\n\n        let centrality = closeness_centrality(\u0026graph);\n        \n        // 所有节点的接近中心性应该都大于 0\n        for (\u0026node, \u0026cent) in \u0026centrality {\n            assert!(cent \u003e 0.0, \"Node {:?} has zero closeness\", node);\n        }\n    }\n}\n","traces":[{"line":13,"address":[4071360,4072010,4072016],"length":1,"stats":{"Line":2}},{"line":14,"address":[4071398],"length":1,"stats":{"Line":2}},{"line":15,"address":[4071416],"length":1,"stats":{"Line":2}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[4071422],"length":1,"stats":{"Line":2}},{"line":20,"address":[3847578,3847659,3847533],"length":1,"stats":{"Line":4}},{"line":22,"address":[],"length":0,"stats":{"Line":4}},{"line":23,"address":[3847881,3847952],"length":1,"stats":{"Line":4}},{"line":24,"address":[],"length":0,"stats":{"Line":2}},{"line":27,"address":[],"length":0,"stats":{"Line":2}},{"line":41,"address":[3824962,3823104,3824968],"length":1,"stats":{"Line":1}},{"line":46,"address":[4079076],"length":1,"stats":{"Line":1}},{"line":47,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[3823350],"length":1,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":3}},{"line":55,"address":[],"length":0,"stats":{"Line":1}},{"line":57,"address":[],"length":0,"stats":{"Line":3}},{"line":60,"address":[4080201,4079480,4079393],"length":1,"stats":{"Line":3}},{"line":61,"address":[4079547],"length":1,"stats":{"Line":1}},{"line":63,"address":[3825040,3825024,3823813],"length":1,"stats":{"Line":3}},{"line":67,"address":[4079750,4079818],"length":1,"stats":{"Line":2}},{"line":69,"address":[]," ":{"Line":4}},{"line":198,"address":[],"length":0,"stats":{"Line":2}},{"line":199,"address":[],"length":0,"stats":{"Line":2}},{"line":205,"address":[4072903],"length":1,"stats":{"Line":2}},{"line":206,"address":[],"length":0,"stats":{"Line":2}},{"line":208,"address":[4073514,4072935],"length":1,"stats":{"Line":4}},{"line":209,"address":[],"length":0,"stats":{"Line":4}},{"line":210,"address":[],"length":0,"stats":{"Line":2}},{"line":211,"address":[],"length":0,"stats":{"Line":4}},{"line":212,"address":[],"length":0,"stats":{"Line":2}},{"line":213,"address":[],"length":0,"stats":{"Line":4}},{"line":219,"address":[4073653,4073761],"length":1,"stats":{"Line":3}},{"line":220,"address":[],"length":0,"stats":{"Line":2}},{"line":221,"address":[],"length":0,"stats":{"Line":1}},{"line":222,"address":[],"length":0,"stats":{"Line":1}},{"line":224,"address":[4073763],"length":1,"stats":{"Line":0}},{"line":227,"address":[],"length":0,"stats":{"Line":1}},{"line":230,"address":[],"length":0,"stats":{"Line":1}}],"covered":100,"coverable":106},{"path":["/","home","hugo","codes","god-gragh","src","algorithms","community.rs"],"content":"//! 社区发现算法模块\n//!\n//! 包含 Label Propagation、Louvain、连通分量等算法\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse std::collections::{HashMap, VecDeque};\n\n/// 连通分量算法（基于 BFS）\n///\n/// 返回所有连通分量，每个分量是节点索引的向量\npub fn connected_components\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e Vec\u003cVec\u003cNodeIndex\u003e\u003e {\n    // 收集所有有效节点\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    \n    // 创建索引到 NodeIndex 的映射\n    let index_to_node: std::collections::HashMap\u003cusize, NodeIndex\u003e = \n        node_indices.iter().map(|\u0026ni| (ni.index(), ni)).collect();\n    \n    let n = graph.node_count();\n    let mut visited = vec![false; n];\n    let mut components = Vec::new();\n\n    for \u0026node in \u0026node_indices {\n        if !visited[node.index()] {\n            let mut component = Vec::new();\n            bfs_component(graph, node, \u0026mut visited, \u0026mut component, \u0026index_to_node);\n            components.push(component);\n        }\n    }\n\n    components\n}\n\nfn bfs_component\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    start: NodeIndex,\n    visited: \u0026mut [bool],\n    component: \u0026mut Vec\u003cNodeIndex\u003e,\n    index_to_node: \u0026std::collections::HashMap\u003cusize, NodeIndex\u003e,\n) {\n    let mut queue = VecDeque::new();\n    queue.push_back(start);\n    visited[start.index()] = true;\n\n    while let Some(node) = queue.pop_front() {\n        component.push(node);\n\n        for neighbor in graph.neighbors(node) {\n            if !visited[neighbor.index()] {\n                visited[neighbor.index()] = true;\n                // 使用映射获取正确的 NodeIndex\n                if let Some(\u0026neighbor_ni) = index_to_node.get(\u0026neighbor.index()) {\n                    queue.push_back(neighbor_ni);\n                }\n            }\n        }\n    }\n}\n\n/// 强连通分量算法（基于 Kosaraju 算法）\n///\n/// 返回所有强连通分量（仅适用于有向图）\npub fn strongly_connected_components\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e Vec\u003cVec\u003cNodeIndex\u003e\u003e {\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let index_to_node: std::collections::HashMap\u003cusize, NodeIndex\u003e = \n        node_indices.iter().map(|\u0026ni| (ni.index(), ni)).collect();\n    \n    let n = graph.node_count();\n    let mut visited = vec![false; n];\n    let mut finish_order = Vec::with_capacity(n);\n\n    // 第一次 DFS，记录完成顺序\n    for \u0026node in \u0026node_indices {\n        if !visited[node.index()] {\n            dfs_finish_order(graph, node, \u0026mut visited, \u0026mut finish_order);\n        }\n    }\n\n    // 构建反向图（隐式）\n    // 在反向图上按完成顺序的逆序进行 DFS\n    let mut visited = vec![false; n];\n    let mut components = Vec::new();\n\n    for \u0026node in finish_order.iter().rev() {\n        if !visited[node.index()] {\n            let mut component = Vec::new();\n            dfs_reverse(graph, node, \u0026mut visited, \u0026mut component, \u0026index_to_node);\n            components.push(component);\n        }\n    }\n\n    components\n}\n\nfn dfs_finish_order\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    node: NodeIndex,\n    visited: \u0026mut [bool],\n    finish_order: \u0026mut Vec\u003cNodeIndex\u003e,\n) {\n    visited[node.index()] = true;\n\n    for neighbor in graph.neighbors(node) {\n        if !visited[neighbor.index()] {\n            dfs_finish_order(graph, neighbor, visited, finish_order);\n        }\n    }\n\n    finish_order.push(node);\n}\n\nfn dfs_reverse\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    node: NodeIndex,\n    visited: \u0026mut [bool],\n    component: \u0026mut Vec\u003cNodeIndex\u003e,\n    index_to_node: \u0026std::collections::HashMap\u003cusize, NodeIndex\u003e,\n) {\n    component.push(node);\n    visited[node.index()] = true;\n\n    // 在反向图中，我们需要找到所有指向当前节点的节点\n    for potential_source in graph.nodes() {\n        if graph.has_edge(potential_source.index(), node) {\n            let source_idx = potential_source.index();\n            if !visited[source_idx.index()] {\n                if let Some(\u0026source_ni) = index_to_node.get(\u0026source_idx.index()) {\n                    dfs_reverse(graph, source_ni, visited, component, index_to_node);\n                }\n            }\n        }\n    }\n}\n\n/// Label Propagation 社区发现算法\n///\n/// 基于标签传播的社区发现，每个节点最终被分配到一个社区标签\npub fn label_propagation\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e, max_iterations: usize) -\u003e HashMap\u003cNodeIndex, usize\u003e {\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let n = node_indices.len();\n\n    if n == 0 {\n        return HashMap::new();\n    }\n\n    // 初始化：每个节点一个唯一标签\n    let mut labels: HashMap\u003cNodeIndex, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026ni)| (ni, i))\n        .collect();\n\n    for _ in 0..max_iterations {\n        let mut changed = false;\n\n        for \u0026node in \u0026node_indices {\n            // 收集邻居的标签\n            let mut label_counts: HashMap\u003cusize, usize\u003e = HashMap::new();\n\n            // 无向图：考虑所有邻居（出边和入边）\n            for neighbor in graph.neighbors(node) {\n                if let Some(\u0026label) = labels.get(\u0026neighbor) {\n                    *label_counts.entry(label).or_insert(0) += 1;\n                }\n            }\n\n            // 找到出现频率最高的标签\n            if let Some((\u0026max_label, _)) = label_counts.iter().max_by_key(|\u0026(_, count)| count) {\n                let current_label = labels.get(\u0026node).copied().unwrap_or(usize::MAX);\n                if max_label != current_label {\n                    labels.insert(node, max_label);\n                    changed = true;\n                }\n            }\n        }\n\n        if !changed {\n            break;\n        }\n    }\n\n    labels\n}\n\n/// Louvain 社区发现算法（简化版）\n///\n/// 基于模块度优化的社区发现算法\npub fn louvain\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e, resolution: f64) -\u003e HashMap\u003cNodeIndex, usize\u003e \nwhere\n    T: Clone,\n{\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let n = node_indices.len();\n    \n    if n == 0 {\n        return HashMap::new();\n    }\n\n    // 初始化：每个节点一个社区\n    let mut communities: HashMap\u003cNodeIndex, usize\u003e = node_indices\n        .iter()\n        .enumerate()\n        .map(|(i, \u0026ni)| (ni, i))\n        .collect();\n\n    // 计算总边数\n    let total_edges = graph.edge_count() as f64;\n    if total_edges == 0.0 {\n        return communities;\n    }\n\n    // 计算每个节点的度数\n    let mut degrees: HashMap\u003cNodeIndex, usize\u003e = HashMap::new();\n    for \u0026node in \u0026node_indices {\n        degrees.insert(node, graph.out_degree(node).unwrap_or(0));\n    }\n\n    let mut improved = true;\n    while improved {\n        improved = false;\n\n        for \u0026node in \u0026node_indices {\n            let current_comm = *communities.get(\u0026node).unwrap();\n            let node_degree = *degrees.get(\u0026node).unwrap();\n\n            // 计算移动到每个邻居社区的模块度增益\n            let mut comm_delta_q: HashMap\u003cusize, f64\u003e = HashMap::new();\n\n            for neighbor in graph.neighbors(node) {\n                let neighbor_comm = *communities.get(\u0026neighbor).unwrap();\n                if neighbor_comm != current_comm {\n                    // 简化：假设无权重边\n                    let delta_q = 1.0 / (2.0 * total_edges)\n                        - resolution * (node_degree as f64 * degrees.get(\u0026neighbor).copied().unwrap_or(0) as f64)\n                            / (4.0 * total_edges * total_edges);\n\n                    *comm_delta_q.entry(neighbor_comm).or_insert(0.0) += delta_q;\n                }\n            }\n\n            // 选择最大增益的社区（使用 partial_cmp 处理 f64）\n            if let Some((\u0026best_comm, \u0026max_delta)) = comm_delta_q.iter().max_by(|a, b| {\n                a.1.partial_cmp(b.1).unwrap_or(std::cmp::Ordering::Equal)\n            }) {\n                if max_delta \u003e 0.0 {\n                    communities.insert(node, best_comm);\n                    improved = true;\n                }\n            }\n        }\n    }\n\n    // 重新编号社区，使标签从 0 开始连续\n    let mut comm_remap: HashMap\u003cusize, usize\u003e = HashMap::new();\n    let mut next_comm = 0usize;\n    for comm in communities.values_mut() {\n        if !comm_remap.contains_key(comm) {\n            comm_remap.insert(*comm, next_comm);\n            next_comm += 1;\n        }\n        *comm = comm_remap[comm];\n    }\n\n    communities\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_connected_components() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3, 4, 5, 6])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (3, 4, 1.0)])\n            .build()\n            .unwrap();\n\n        let components = connected_components(\u0026graph);\n        assert_eq!(components.len(), 3); // {0,1,2}, {3,4}, {5}\n    }\n\n    #[test]\n    fn test_strongly_connected_components() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![1, 2, 3, 4])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let components = strongly_connected_components(\u0026graph);\n        // {0,1,2} 形成一个强连通分量，{3} 单独一个\n        assert!(!components.is_empty());\n    }\n\n    #[test]\n    fn test_label_propagation() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![1, 2, 3, 4])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let labels = label_propagation(\u0026graph, 10);\n        assert_eq!(labels.len(), 4);\n    }\n}\n","traces":[{"line":13,"address":[4669327,4669321,4668336],"length":1,"stats":{"Line":2}},{"line":15,"address":[4668366,4669344,4669366],"length":1,"stats":{"Line":6}},{"line":18,"address":[],"length":0,"stats":{"Line":8}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":4}},{"line":22,"address":[],"length":0,"stats":{"Line":2}},{"line":23,"address":[3845648],"length":1,"stats":{"Line":2}},{"line":25,"address":[],"length":0,"stats":{"Line":4}},{"line":26,"address":[],"length":0,"stats":{"Line":6}},{"line":27,"address":[],"length":0,"stats":{"Line":2}},{"line":28,"address":[3846140,3846051],"length":1,"stats":{"Line":4}},{"line":29,"address":[4669227],"length":1,"stats":{"Line":2}},{"line":33,"addr
