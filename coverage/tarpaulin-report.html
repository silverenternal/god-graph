/\n/// # 返回\n/// HashMap，键为节点索引，值为最短距离\n///\n/// # 错误\n/// * `GraphError::NegativeWeight` - 检测到负权重边，建议使用 Bellman-Ford 算法\n///\n/// # 注意\n/// Dijkstra 算法不适用于负权重图。如果图可能包含负权重，请使用 `bellman_ford` 算法。\npub fn dijkstra\u003cT, E, F\u003e(\n    graph: \u0026Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    mut get_weight: F,\n) -\u003e GraphResult\u003cHashMap\u003cNodeIndex, f64\u003e\u003e\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    // 检测负权重边\n    for edge in graph.edges() {\n        let u = edge.source();\n        let v = edge.target();\n        let weight = get_weight(u, v, edge.data());\n        if weight \u003c 0.0 {\n            return Err(GraphError::NegativeWeight {\n                from: u.index(),\n                to: v.index(),\n                weight,\n            });\n        }\n    }\n\n    // 优先队列项：(节点，距离)，使用 Reverse 实现最小堆\n    struct State {\n        node: NodeIndex,\n        distance: f64,\n    }\n\n    impl PartialEq for State {\n        fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n            self.distance == other.distance\n        }\n    }\n\n    impl Eq for State {}\n\n    impl PartialOrd for State {\n        fn partial_cmp(\u0026self, other: \u0026Self) -\u003e Option\u003cOrdering\u003e {\n            Some(self.cmp(other))\n        }\n    }\n\n    impl Ord for State {\n        fn cmp(\u0026self, other: \u0026Self) -\u003e Ordering {\n            other.distance.total_cmp(\u0026self.distance)\n        }\n    }\n\n    let mut distances: HashMap\u003cNodeIndex, f64\u003e = HashMap::new();\n    let mut heap = BinaryHeap::new();\n\n    distances.insert(source, 0.0);\n    heap.push(State { node: source, distance: 0.0 });\n\n    while let Some(State { node, distance }) = heap.pop() {\n        // 跳过过期的条目\n        if distance \u003e *distances.get(\u0026node).unwrap_or(\u0026f64::INFINITY) {\n            continue;\n        }\n\n        for neighbor in graph.neighbors(node) {\n            let edge_data = graph.get_edge_by_nodes(node, neighbor)?;\n            let weight = get_weight(node, neighbor, edge_data);\n            let new_distance = distance + weight;\n\n            if new_distance \u003c *distances.get(\u0026neighbor).unwrap_or(\u0026f64::INFINITY) {\n                distances.insert(neighbor, new_distance);\n                heap.push(State { node: neighbor, distance: new_distance });\n            }\n        }\n    }\n\n    Ok(distances)\n}\n\n/// Bellman-Ford 算法\n///\n/// 计算从源节点到所有其他节点的最短路径\n/// 可以处理负权重边，并能检测负权环\n///\n/// # 返回\n/// * `Ok(HashMap)` - 最短距离\n/// * `Err(GraphError::NegativeCycle)` - 检测到负权环\npub fn bellman_ford\u003cT, E, F\u003e(\n    graph: \u0026Graph\u003cT, E\u003e,\n    source: NodeIndex,\n    mut get_weight: F,\n) -\u003e Result\u003cHashMap\u003cNodeIndex, f64\u003e, GraphError\u003e\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    let mut distances: HashMap\u003cNodeIndex, f64\u003e = HashMap::new();\n    \n    // 初始化距离\n    for node in graph.nodes() {\n        distances.insert(node.index(), f64::INFINITY);\n    }\n    distances.insert(source, 0.0);\n\n    let n = graph.node_count();\n\n    // 松弛操作，执行 n-1 轮\n    for _ in 0..n - 1 {\n        for edge in graph.edges() {\n            let u = edge.source();\n            let v = edge.target();\n            let w = get_weight(u, v, edge.data());\n\n            if distances.get(\u0026u) != Some(\u0026f64::INFINITY) {\n                let new_dist = distances[\u0026u] + w;\n                if new_dist \u003c *distances.get(\u0026v).unwrap_or(\u0026f64::INFINITY) {\n                    distances.insert(v, new_dist);\n                }\n            }\n        }\n    }\n\n    // 检测负权环\n    for edge in graph.edges() {\n        let u = edge.source();\n        let v = edge.target();\n        let w = get_weight(u, v, edge.data());\n\n        if distances.get(\u0026u) != Some(\u0026f64::INFINITY)\n            \u0026\u0026 distances[\u0026u] + w \u003c *distances.get(\u0026v).unwrap_or(\u0026f64::INFINITY)\n        {\n            return Err(GraphError::NegativeCycle);\n        }\n    }\n\n    Ok(distances)\n}\n\n/// A* 搜索算法\n///\n/// 使用启发式函数找到从起点到终点的最短路径\n///\n/// # 参数\n/// * `graph` - 图\n/// * `start` - 起始节点\n/// * `goal` - 目标节点\n/// * `get_weight` - 获取边权重的闭包\n/// * `heuristic` - 启发式函数，估计节点到目标的距离\npub fn astar\u003cT, E, F, H\u003e(\n    graph: \u0026Graph\u003cT, E\u003e,\n    start: NodeIndex,\n    goal: NodeIndex,\n    mut get_weight: F,\n    mut heuristic: H,\n) -\u003e GraphResult\u003c(f64, Vec\u003cNodeIndex\u003e)\u003e\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n    H: FnMut(NodeIndex) -\u003e f64,\n{\n    #[derive(Debug)]\n    struct State {\n        node: NodeIndex,\n        f_score: f64,\n    }\n\n    impl PartialEq for State {\n        fn eq(\u0026self, other: \u0026Self) -\u003e bool {\n            self.f_score == other.f_score\n        }\n    }\n\n    impl Eq for State {}\n\n    impl PartialOrd for State {\n        fn partial_cmp(\u0026self, other: \u0026Self) -\u003e Option\u003cOrdering\u003e {\n            Some(self.cmp(other))\n        }\n    }\n\n    impl Ord for State {\n        fn cmp(\u0026self, other: \u0026Self) -\u003e Ordering {\n            other.f_score.total_cmp(\u0026self.f_score)\n        }\n    }\n\n    let mut g_scores: HashMap\u003cNodeIndex, f64\u003e = HashMap::new();\n    let mut came_from: HashMap\u003cNodeIndex, NodeIndex\u003e = HashMap::new();\n    let mut heap = BinaryHeap::new();\n\n    g_scores.insert(start, 0.0);\n    heap.push(State {\n        node: start,\n        f_score: heuristic(start),\n    });\n\n    while let Some(State { node, .. }) = heap.pop() {\n        if node == goal {\n            // 重构路径\n            let mut path = vec![goal];\n            let mut current = goal;\n            while let Some(\u0026prev) = came_from.get(\u0026current) {\n                path.push(prev);\n                current = prev;\n            }\n            path.reverse();\n            return Ok((*g_scores.get(\u0026goal).unwrap_or(\u00260.0), path));\n        }\n\n        let current_g = *g_scores.get(\u0026node).unwrap_or(\u0026f64::INFINITY);\n\n        for neighbor in graph.neighbors(node) {\n            let edge_data = graph.get_edge_by_nodes(node, neighbor)?;\n            let weight = get_weight(node, neighbor, edge_data);\n            let tentative_g = current_g + weight;\n\n            if tentative_g \u003c *g_scores.get(\u0026neighbor).unwrap_or(\u0026f64::INFINITY) {\n                came_from.insert(neighbor, node);\n                g_scores.insert(neighbor, tentative_g);\n                let f_score = tentative_g + heuristic(neighbor);\n                heap.push(State { node: neighbor, f_score });\n            }\n        }\n    }\n\n    Err(GraphError::NodeNotFound { index: goal.index() })\n}\n\n/// Floyd-Warshall 算法\n///\n/// 计算所有节点对之间的最短路径距离\n/// 适用于任意权重的图（可处理负权重）\n/// 时间复杂度：O(V³)，空间复杂度：O(V²)\n///\n/// # 参数\n/// * `graph` - 图\n/// * `get_weight` - 获取边权重的闭包\n///\n/// # 返回\n/// * `Ok(HashMap\u003c(NodeIndex, NodeIndex), f64\u003e)` - 所有节点对的最短距离\n/// * `Err(GraphError::NegativeCycle)` - 检测到负权环\n///\n/// # 示例\n/// ```rust\n/// use god_gragh::graph::builders::GraphBuilder;\n/// use god_gragh::algorithms::shortest_path::floyd_warshall;\n///\n/// let graph = GraphBuilder::directed()\n///     .with_nodes(vec![\"A\", \"B\", \"C\"])\n///     .with_edges(vec![(0, 1, 1.0), (1, 2, 2.0), (0, 2, 4.0)])\n///     .build()\n///     .unwrap();\n///\n/// let distances = floyd_warshall(\u0026graph, |_, _, w| *w).unwrap();\n/// ```\npub fn floyd_warshall\u003cT, E, F\u003e(\n    graph: \u0026Graph\u003cT, E\u003e,\n    mut get_weight: F,\n) -\u003e Result\u003cHashMap\u003c(NodeIndex, NodeIndex), f64\u003e, GraphError\u003e\nwhere\n    F: FnMut(NodeIndex, NodeIndex, \u0026E) -\u003e f64,\n{\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let n = node_indices.len();\n\n    if n == 0 {\n        return Ok(HashMap::new());\n    }\n\n    // 创建索引到 NodeIndex 的映射\n    let index_to_node = \u0026node_indices;\n    let node_to_index: std::collections::HashMap\u003cusize, usize\u003e =\n        node_indices.iter().enumerate().map(|(i, ni)| (ni.index(), i)).collect();\n\n    // 初始化距离矩阵\n    const INF: f64 = f64::INFINITY;\n    let mut dist = vec![vec![INF; n]; n];\n\n    // 设置对角线为 0\n    for (i, row) in dist.iter_mut().enumerate().take(n) {\n        row[i] = 0.0;\n    }\n\n    // 设置直接边的权重\n    for edge in graph.edges() {\n        let u = edge.source();\n        let v = edge.target();\n        if let (Some(\u0026i), Some(\u0026j)) = (node_to_index.get(\u0026u.index()), node_to_index.get(\u0026v.index())) {\n            let weight = get_weight(u, v, edge.data());\n            dist[i][j] = dist[i][j].min(weight);\n        }\n    }\n\n    // Floyd-Warshall 主循环\n    for k in 0..n {\n        for i in 0..n {\n            for j in 0..n {\n                if dist[i][k] != INF \u0026\u0026 dist[k][j] != INF {\n                    let new_dist = dist[i][k] + dist[k][j];\n                    if new_dist \u003c dist[i][j] {\n                        dist[i][j] = new_dist;\n                    }\n                }\n            }\n        }\n    }\n\n    // 检测负权环：检查对角线是否有负值\n    #[allow(clippy::needless_range_loop)]\n    for i in 0..n {\n        if dist[i][i] \u003c 0.0 {\n            return Err(GraphError::NegativeCycle);\n        }\n    }\n\n    // 构建结果 HashMap\n    let mut result = HashMap::with_capacity(n * n);\n    for (i, row) in dist.iter().enumerate().take(n) {\n        for (j, \u0026value) in row.iter().enumerate().take(n) {\n            if value != INF {\n                result.insert((index_to_node[i], index_to_node[j]), value);\n            }\n        }\n    }\n\n    Ok(result)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_dijkstra_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 4.0), (1, 2, 2.0), (1, 3, 5.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let start = NodeIndex::new(0, 1);\n        let distances = dijkstra(\u0026graph, start, |_, _, _| 1.0).unwrap();\n\n        assert!(distances.contains_key(\u0026start));\n    }\n\n    #[test]\n    fn test_dijkstra_negative_weights() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, -2.0), (0, 2, 3.0)])\n            .build()\n            .unwrap();\n\n        let start = NodeIndex::new(0, 1);\n        let result = dijkstra(\u0026graph, start, |_, _, w| *w);\n\n        assert!(matches!(result, Err(GraphError::NegativeWeight { .. })));\n    }\n\n    #[test]\n    fn test_bellman_ford_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 4.0),\n                (0, 2, 2.0),\n                (1, 2, 1.0),\n                (1, 3, 5.0),\n                (2, 3, 3.0),\n            ])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let distances = bellman_ford(\u0026graph, source, |_, _, w| *w).unwrap();\n\n        assert_eq!(distances.get(\u0026source), Some(\u00260.0));\n        assert!(distances.len() == 4);\n    }\n\n    #[test]\n    fn test_bellman_ford_negative_weights() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, -2.0), (0, 2, 3.0)])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let distances = bellman_ford(\u0026graph, source, |_, _, w| *w).unwrap();\n\n        // A-\u003eB-\u003eC = 1 + (-2) = -1, which is shorter than A-\u003eC = 3\n        assert_eq!(distances.get(\u0026NodeIndex::new(2, 1)), Some(\u0026-1.0));\n    }\n\n    #[test]\n    fn test_bellman_ford_negative_cycle() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, -2.0), (2, 0, -3.0)])\n            .build()\n            .unwrap();\n\n        let source = NodeIndex::new(0, 1);\n        let result = bellman_ford(\u0026graph, source, |_, _, w| *w);\n\n        assert!(matches!(result, Err(GraphError::NegativeCycle)));\n    }\n\n    #[test]\n    fn test_astar_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 4.0), (1, 2, 2.0), (1, 3, 5.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let start = NodeIndex::new(0, 1);\n        let goal = NodeIndex::new(3, 1);\n\n        // 使用简单的启发式函数（始终返回 0，退化为 Dijkstra）\n        let (distance, path) = astar(\u0026graph, start, goal, |_, _, _| 1.0, |_| 0.0).unwrap();\n\n        assert!(distance \u003e 0.0);\n        assert!(!path.is_empty());\n        assert_eq!(path.first(), Some(\u0026start));\n        assert_eq!(path.last(), Some(\u0026goal));\n    }\n\n    #[test]\n    fn test_floyd_warshall_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![\n                (0, 1, 1.0), (0, 2, 4.0), (1, 2, 2.0), (1, 3, 5.0), (2, 3, 1.0)\n            ])\n            .build()\n            .unwrap();\n\n        let distances = floyd_warshall(\u0026graph, |_, _, w| *w).unwrap();\n\n        // 验证节点对之间的距离\n        let nodes: Vec\u003c_\u003e = graph.nodes().collect();\n        assert_eq!(distances.get(\u0026(nodes[0].index(), nodes[3].index())), Some(\u00264.0)); // A-\u003eB-\u003eC-\u003eD = 1+2+1 = 4\n    }\n\n    #[test]\n    fn test_floyd_warshall_negative_weights() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, -2.0), (0, 2, 3.0)])\n            .build()\n            .unwrap();\n\n        let distances = floyd_warshall(\u0026graph, |_, _, w| *w).unwrap();\n\n        let nodes: Vec\u003c_\u003e = graph.nodes().collect();\n        // A-\u003eB-\u003eC = 1 + (-2) = -1\n        assert_eq!(distances.get(\u0026(nodes[0].index(), nodes[2].index())), Some(\u0026-1.0));\n    }\n\n    #[test]\n    fn test_floyd_warshall_negative_cycle() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, -2.0), (2, 0, -3.0)])\n            .build()\n            .unwrap();\n\n        let result = floyd_warshall(\u0026graph, |_, _, w| *w);\n        assert!(matches!(result, Err(GraphError::NegativeCycle)));\n    }\n\n    #[test]\n    fn test_floyd_warshall_empty_graph() {\n        let graph: Graph\u003ci32, f64\u003e = GraphBuilder::directed().build().unwrap();\n        let distances = floyd_warshall(\u0026graph, |_, _, _: \u0026f64| 1.0).unwrap();\n        assert!(distances.is_empty());\n    }\n}\n","traces":[{"line":30,"address":[4965044,4961136,4962852,4963328,4963420,4961228],"length":1,"stats":{"Line":5}},{"line":39,"address":[3828239,3828165],"length":1,"stats":{"Line":10}},{"line":40,"address":[3828420,3829881],"length":1,"stats":{"Line":10}},{"line":41,"address":[5934400,5932208],"length":1,"stats":{"Line":5}},{"line":42,"address":[5932256,5934448],"length":1,"stats":{"Line":5}},{"line":43,"address":[3862320],"length":1,"stats":{"Line":5}},{"line":44,"address":[3862397],"length":1,"stats":{"Line":1}},{"line":45,"address":[3862341],"length":1,"stats":{"Line":1}},{"line":46,"address":[3862361],"length":1,"stats":{"Line":1}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[4192016],"length":1,"stats":{"Line":0}},{"line":60,"address":[ "home","hugo","codes","god-gragh","src","algorithms","traversal.rs"],"content":"//! 图遍历算法模块\n//!\n//! 包含 DFS、BFS、拓扑排序等遍历算法\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse crate::errors::GraphError;\nuse crate::GraphResult;\nuse std::collections::VecDeque;\n\n/// 深度优先搜索\n///\n/// 从起始节点开始进行 DFS 遍历，对每个访问的节点调用 visitor 闭包\n///\n/// # 参数\n/// * `graph` - 要遍历的图\n/// * `start` - 起始节点\n/// * `visitor` - 访问函数，返回 false 时停止遍历\n///\n/// # 示例\n/// ```rust,no_run\n/// use god_gragh::graph::Graph;\n/// use god_gragh::graph::traits::GraphOps;\n/// use god_gragh::algorithms::traversal::dfs;\n///\n/// let mut graph = Graph::\u003ci32, f64\u003e::directed();\n/// let a = graph.add_node(1).unwrap();\n/// let b = graph.add_node(2).unwrap();\n/// let c = graph.add_node(3).unwrap();\n/// graph.add_edge(a, b, 1.0).unwrap();\n/// graph.add_edge(b, c, 1.0).unwrap();\n///\n/// dfs(\u0026graph, a, |node| {\n///     println!(\"Visited: {:?}\", node);\n///     true\n/// });\n/// ```\npub fn dfs\u003cT, F\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e, start: NodeIndex, mut visitor: F)\nwhere\n    F: FnMut(NodeIndex) -\u003e bool,\n{\n    let n = graph.node_count();\n    let mut visited = vec![false; n];\n    let mut stack = vec![start];\n\n    while let Some(node) = stack.pop() {\n        if visited[node.index()] {\n            continue;\n        }\n\n        visited[node.index()] = true;\n\n        if !visitor(node) {\n            return;\n        }\n\n        // 将邻居压入栈\n        for neighbor in graph.neighbors(node) {\n            if !visited[neighbor.index()] {\n                stack.push(neighbor);\n            }\n        }\n    }\n}\n\n/// 广度优先搜索\n///\n/// 从起始节点开始进行 BFS 遍历，对每个访问的节点调用 visitor 闭包\n///\n/// # 参数\n/// * `graph` - 要遍历的图\n/// * `start` - 起始节点\n/// * `visitor` - 访问函数，返回 false 时停止遍历\n///\n/// # 示例\n/// ```rust,no_run\n/// use god_gragh::graph::Graph;\n/// use god_gragh::graph::traits::GraphOps;\n/// use god_gragh::algorithms::traversal::bfs;\n///\n/// let mut graph = Graph::\u003ci32, f64\u003e::directed();\n/// let a = graph.add_node(1).unwrap();\n/// let b = graph.add_node(2).unwrap();\n/// let c = graph.add_node(3).unwrap();\n/// graph.add_edge(a, b, 1.0).unwrap();\n/// graph.add_edge(b, c, 1.0).unwrap();\n///\n/// bfs(\u0026graph, a, |node, depth| {\n///     println!(\"Visited {:?} at depth {}\", node, depth);\n///     true\n/// });\n/// ```\npub fn bfs\u003cT, F\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e, start: NodeIndex, mut visitor: F)\nwhere\n    F: FnMut(NodeIndex, usize) -\u003e bool,\n{\n    let mut visited = vec![false; graph.node_count()];\n    let mut queue = VecDeque::new();\n    \n    visited[start.index()] = true;\n    queue.push_back((start, 0));\n\n    while let Some((node, depth)) = queue.pop_front() {\n        if !visitor(node, depth) {\n            return;\n        }\n\n        for neighbor in graph.neighbors(node) {\n            if !visited[neighbor.index()] {\n                visited[neighbor.index()] = true;\n                queue.push_back((neighbor, depth + 1));\n            }\n        }\n    }\n}\n\n/// 拓扑排序\n///\n/// 对 DAG 进行拓扑排序，返回节点的拓扑顺序\n/// 如果图中存在环，返回 Err\n///\n/// # 参数\n/// * `graph` - 有向无环图\n///\n/// # 返回\n/// * `Ok(Vec\u003cNodeIndex\u003e)` - 拓扑排序结果\n/// * `Err(GraphError::GraphHasCycle)` - 图中存在环\npub fn topological_sort\u003cT\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e GraphResult\u003cVec\u003cNodeIndex\u003e\u003e {\n    let n = graph.node_count();\n    let mut in_degree = vec![0usize; n];\n\n    // 收集所有有效节点及其索引映射\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    \n    // 创建索引到 NodeIndex 的映射\n    let index_to_node: std::collections::HashMap\u003cusize, NodeIndex\u003e = \n        node_indices.iter().map(|ni| (ni.index(), *ni)).collect();\n\n    // 计算每个节点的入度（使用内部索引）\n    for node in graph.nodes() {\n        for neighbor in graph.neighbors(node.index()) {\n            in_degree[neighbor.index()] += 1;\n        }\n    }\n\n    // 初始化队列（入度为 0 的节点）\n    let mut queue = VecDeque::new();\n    for node in \u0026node_indices {\n        if in_degree[node.index()] == 0 {\n            queue.push_back(*node);\n        }\n    }\n\n    let mut result = Vec::with_capacity(n);\n\n    while let Some(node_idx) = queue.pop_front() {\n        result.push(node_idx);\n\n        for neighbor in graph.neighbors(node_idx) {\n            // 获取正确的 NodeIndex（包含 generation）\n            if let Some(neighbor_ni) = index_to_node.get(\u0026neighbor.index()) {\n                in_degree[neighbor_ni.index()] -= 1;\n                if in_degree[neighbor_ni.index()] == 0 {\n                    queue.push_back(*neighbor_ni);\n                }\n            }\n        }\n    }\n\n    if result.len() != n {\n        Err(GraphError::GraphHasCycle)\n    } else {\n        Ok(result)\n    }\n}\n\n/// 查找所有路径\n///\n/// 查找从源节点到目标节点的所有路径\n///\n/// # 参数\n/// * `graph` - 图\n/// * `source` - 源节点\n/// * `target` - 目标节点\n///\n/// # 返回\n/// 所有路径的集合，每条路径是节点索引的向量\npub fn all_paths\u003cT\u003e(\n    graph: \u0026Graph\u003cT, impl Clone\u003e,\n    source: NodeIndex,\n    target: NodeIndex,\n) -\u003e Vec\u003cVec\u003cNodeIndex\u003e\u003e {\n    let mut result = Vec::new();\n    let mut path = vec![source];\n    let mut visited = vec![false; graph.node_count()];\n    visited[source.index()] = true;\n\n    fn dfs_helper\u003cT\u003e(\n        graph: \u0026Graph\u003cT, impl Clone\u003e,\n        current: NodeIndex,\n        target: NodeIndex,\n        path: \u0026mut Vec\u003cNodeIndex\u003e,\n        visited: \u0026mut [bool],\n        result: \u0026mut Vec\u003cVec\u003cNodeIndex\u003e\u003e,\n    ) {\n        if current == target {\n            result.push(path.clone());\n            return;\n        }\n\n        for neighbor in graph.neighbors(current) {\n            if !visited[neighbor.index()] {\n                visited[neighbor.index()] = true;\n                path.push(neighbor);\n                dfs_helper(graph, neighbor, target, path, visited, result);\n                path.pop();\n                visited[neighbor.index()] = false;\n            }\n        }\n    }\n\n    dfs_helper(graph, source, target, \u0026mut path, \u0026mut visited, \u0026mut result);\n    result\n}\n\n/// Tarjan 强连通分量算法\n///\n/// 查找有向图中的所有强连通分量 (SCC)\n/// 使用基于 DFS 的实现，时间复杂度 O(V + E)\n///\n/// # 参数\n/// * `graph` - 有向图\n///\n/// # 返回\n/// 所有强连通分量的集合，每个分量是节点索引的向量\n///\n/// # 示例\n/// ```rust\n/// use god_gragh::graph::builders::GraphBuilder;\n/// use god_gragh::algorithms::traversal::tarjan_scc;\n///\n/// let graph = GraphBuilder::directed()\n///     .with_nodes(vec![0, 1, 2, 3, 4])\n///     .with_edges(vec![\n///         (0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0),  // SCC: {0, 1, 2}\n///         (2, 3, 1.0),                              // 桥接边\n///         (3, 4, 1.0), (4, 3, 1.0),                // SCC: {3, 4}\n///     ])\n///     .build()\n///     .unwrap();\n///\n/// let sccs = tarjan_scc(\u0026graph);\n/// assert_eq!(sccs.len(), 2);\n/// ```\npub fn tarjan_scc\u003cT: Clone\u003e(graph: \u0026Graph\u003cT, impl Clone\u003e) -\u003e Vec\u003cVec\u003cNodeIndex\u003e\u003e {\n    let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n    let n = node_indices.len();\n\n    if n == 0 {\n        return Vec::new();\n    }\n\n    // 创建索引到 NodeIndex 的映射\n    let index_to_node: Vec\u003cNodeIndex\u003e = node_indices;\n\n    // Tarjan 算法状态\n    let mut index_counter = 0usize;\n    let mut stack: Vec\u003cusize\u003e = Vec::new();\n    let mut on_stack = vec![false; n];\n    let mut indices = vec![None; n];\n    let mut lowlinks = vec![0usize; n];\n    let mut sccs: Vec\u003cVec\u003cNodeIndex\u003e\u003e = Vec::new();\n\n    #[allow(clippy::too_many_arguments)]\n    fn strongconnect\u003cT, E\u003e(\n        graph: \u0026Graph\u003cT, E\u003e,\n        v: usize,\n        index_counter: \u0026mut usize,\n        stack: \u0026mut Vec\u003cusize\u003e,\n        on_stack: \u0026mut [bool],\n        indices: \u0026mut [Option\u003cusize\u003e],\n        lowlinks: \u0026mut [usize],\n        sccs: \u0026mut Vec\u003cVec\u003cNodeIndex\u003e\u003e,\n        index_to_node: \u0026[NodeIndex],\n    ) where\n        T: Clone,\n        E: Clone,\n    {\n        indices[v] = Some(*index_counter);\n        lowlinks[v] = *index_counter;\n        *index_counter += 1;\n        stack.push(v);\n        on_stack[v] = true;\n\n        let node = index_to_node[v];\n        for neighbor in graph.neighbors(node) {\n            let w = neighbor.index();\n            if w \u003e= index_to_node.len() {\n                continue;\n            }\n\n            match indices[w] {\n                None =\u003e {\n                    strongconnect(\n                        graph, w, index_counter, stack, on_stack, indices, lowlinks, sccs,\n                        index_to_node,\n                    );\n                    lowlinks[v] = lowlinks[v].min(lowlinks[w]);\n                }\n                Some(idx_w) if on_stack[w] =\u003e {\n                    lowlinks[v] = lowlinks[v].min(idx_w);\n                }\n                _ =\u003e {}\n            }\n        }\n\n        if Some(lowlinks[v]) == indices[v] {\n            let mut scc = Vec::new();\n            loop {\n                let w = stack.pop().unwrap();\n                on_stack[w] = false;\n                scc.push(index_to_node[w]);\n                if w == v {\n                    break;\n                }\n            }\n            sccs.push(scc);\n        }\n    }\n\n    for i in 0..n {\n        if indices[i].is_none() {\n            strongconnect(\n                graph,\n                i,\n                \u0026mut index_counter,\n                \u0026mut stack,\n                \u0026mut on_stack,\n                \u0026mut indices,\n                \u0026mut lowlinks,\n                \u0026mut sccs,\n                \u0026index_to_node,\n            );\n        }\n    }\n\n    sccs\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_dfs() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (1, 3, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let start = graph.nodes().next().unwrap().index();\n        let mut visited = Vec::new();\n\n        dfs(\u0026graph, start, |node| {\n            visited.push(node.index());\n            true\n        });\n\n        assert_eq!(visited.len(), 4);\n    }\n\n    #[test]\n    fn test_bfs() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (1, 3, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let start = graph.nodes().next().unwrap().index();\n        let mut visited = Vec::new();\n\n        bfs(\u0026graph, start, |node, _depth| {\n            visited.push(node.index());\n            true\n        });\n\n        assert_eq!(visited.len(), 4);\n    }\n\n    #[test]\n    fn test_topological_sort() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n            .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0), (1, 3, 1.0), (2, 3, 1.0)])\n            .build()\n            .unwrap();\n\n        let result = topological_sort(\u0026graph).unwrap();\n        assert_eq!(result.len(), 4);\n\n        // 验证拓扑顺序：A 必须在 B、C 之前，B、C 必须在 D 之前\n        let pos: Vec\u003c_\u003e = result.iter().map(|n| n.index()).enumerate()\n            .flat_map(|(i, n)| vec![(n, i)])\n            .collect();\n        assert!(!pos.is_empty());\n    }\n\n    #[test]\n    fn test_tarjan_scc() {\n        // 测试两个 SCC 的情况\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![0, 1, 2, 3, 4])\n            .with_edges(vec![\n                (0, 1, 1.0), (1, 2, 1.0), (2, 0, 1.0),  // SCC: {0, 1, 2}\n                (2, 3, 1.0),                              // 桥接边\n                (3, 4, 1.0), (4, 3, 1.0),                // SCC: {3, 4}\n            ])\n            .build()\n            .unwrap();\n\n        let sccs = tarjan_scc(\u0026graph);\n        assert_eq!(sccs.len(), 2);\n\n        // 验证每个 SCC 的大小\n        let sizes: Vec\u003c_\u003e = sccs.iter().map(|scc| scc.len()).collect();\n        assert!(sizes.contains(\u00263));\n        assert!(sizes.contains(\u00262));\n    }\n\n    #[test]\n    fn test_tarjan_scc_single_node() {\n        let graph: Graph\u003ci32, f64\u003e = GraphBuilder::directed()\n            .with_nodes(vec![1])\n            .build()\n            .unwrap();\n\n        let sccs = tarjan_scc(\u0026graph);\n        assert_eq!(sccs.len(), 1);\n        assert_eq!(sccs[0].len(), 1);\n    }\n\n    #[test]\n    fn test_tarjan_scc_empty_graph() {\n        let graph = GraphBuilder::\u003ci32, f64\u003e::directed()\n            .build()\n            .unwrap();\n\n        let sccs = tarjan_scc(\u0026graph);\n        assert!(sccs.is_empty());\n    }\n}\n","traces":[{"line":39,"address":[5884061,5884000,5885004,5883964,5883021,5882960],"length":1,"stats":{"Line":4}},{"line":43,"address":[3906881,3906933],"length":1,"stats":{"Line":8}},{"line":44,"address":[5884109,5883069],"length":1,"stats":{"Line":4}},{"line":45,"address":[5884192,5883097,5883152,5884137],"length":1,"stats":{"Line":8}},{"line":47,"address":[3820497,3820446],"length":1,"stats":{"Line":8}},{"line":48,"address":[3907253,3907292],"length":1,"stats":{"Line":8}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[5884510,5883470],"length":1,"stats":{"Line":4}},{"line":54,"address":[4540763],"length":1,"stats":{"Line":4}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[3820828,3820966,3820756],"length":1,"stats":{"Line":12}},{"line"    pub(crate) fn is_valid(\u0026self) -\u003e bool {\n        self.index != usize::MAX\n    }\n\n    /// 创建无效索引\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn invalid() -\u003e Self {\n        Self {\n            index: usize::MAX,\n            generation: 0,\n        }\n    }\n}\n\nimpl fmt::Debug for EdgeIndex {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"EdgeIndex({}, {})\", self.index, self.generation)\n    }\n}\n\nimpl Hash for EdgeIndex {\n    fn hash\u003cH: Hasher\u003e(\u0026self, state: \u0026mut H) {\n        self.index.hash(state);\n        self.generation.hash(state);\n    }\n}\n\n/// 边引用：对图中边的借用引用\n///\n/// 包含边索引、端点和数据引用，生命周期与图绑定\npub struct EdgeRef\u003c'a, E\u003e {\n    /// 边索引\n    pub index: EdgeIndex,\n    /// 源节点索引\n    pub source: NodeIndex,\n    /// 目标节点索引\n    pub target: NodeIndex,\n    /// 边数据引用\n    pub data: \u0026'a E,\n}\n\nimpl\u003c'a, E\u003e EdgeRef\u003c'a, E\u003e {\n    /// 创建新的 EdgeRef\n    #[inline]\n    pub fn new(index: EdgeIndex, source: NodeIndex, target: NodeIndex, data: \u0026'a E) -\u003e Self {\n        Self {\n            index,\n            source,\n            target,\n            data,\n        }\n    }\n\n    /// 获取边索引\n    #[inline]\n    pub fn index(\u0026self) -\u003e EdgeIndex {\n        self.index\n    }\n\n    /// 获取源节点索引\n    #[inline]\n    pub fn source(\u0026self) -\u003e NodeIndex {\n        self.source\n    }\n\n    /// 获取目标节点索引\n    #[inline]\n    pub fn target(\u0026self) -\u003e NodeIndex {\n        self.target\n    }\n\n    /// 获取边数据引用\n    #[inline]\n    pub fn data(\u0026self) -\u003e \u0026'a E {\n        self.data\n    }\n\n    /// 获取端点对\n    #[inline]\n    pub fn endpoints(\u0026self) -\u003e (NodeIndex, NodeIndex) {\n        (self.source, self.target)\n    }\n}\n\nimpl\u003c'a, E\u003e Clone for EdgeRef\u003c'a, E\u003e {\n    fn clone(\u0026self) -\u003e Self {\n        *self\n    }\n}\n\nimpl\u003c'a, E\u003e Copy for EdgeRef\u003c'a, E\u003e {}\n\nimpl\u003c'a, E\u003e fmt::Debug for EdgeRef\u003c'a, E\u003e\nwhere\n    E: fmt::Debug,\n{\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"EdgeRef\")\n            .field(\"index\", \u0026self.index)\n            .field(\"source\", \u0026self.source)\n            .field(\"target\", \u0026self.target)\n            .field(\"data\", self.data)\n            .finish()\n    }\n}\n\n/// 边存储结构\n///\n/// 包含源节点、目标节点和边数据\n/// 使用 64 字节对齐，避免 false sharing\n#[derive(Debug)]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\n#[cfg_attr(feature = \"serde\", serde(bound(\n    serialize = \"E: Serialize\",\n    deserialize = \"E: Deserialize\u003c'de\u003e\"\n)))]\n#[repr(align(64))]\npub(crate) struct EdgeStorage\u003cE\u003e {\n    /// 源节点索引\n    pub source: NodeIndex,\n    /// 目标节点索引\n    pub target: NodeIndex,\n    /// 边数据\n    pub data: Option\u003cE\u003e,\n    /// Generation 计数器\n    pub generation: u32,\n}\n\nimpl\u003cE\u003e Clone for EdgeStorage\u003cE\u003e {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            source: self.source,\n            target: self.target,\n            data: None, // 不克隆数据\n            generation: self.generation,\n        }\n    }\n}\n\nimpl\u003cE\u003e EdgeStorage\u003cE\u003e {\n    /// 创建新的边存储\n    #[inline]\n    pub(crate) fn new(source: NodeIndex, target: NodeIndex, data: E, generation: u32) -\u003e Self {\n        Self {\n            source,\n            target,\n            data: Some(data),\n            generation,\n        }\n    }\n\n    /// 创建已删除的边存储\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn deleted(source: NodeIndex, target: NodeIndex, generation: u32) -\u003e Self {\n        Self {\n            source,\n            target,\n            data: None,\n            generation,\n        }\n    }\n\n    /// 检查边是否被占用\n    #[inline]\n    pub(crate) fn is_occupied(\u0026self) -\u003e bool {\n        self.data.is_some()\n    }\n\n    /// 获取数据引用\n    #[inline]\n    pub(crate) fn data(\u0026self) -\u003e Option\u003c\u0026E\u003e {\n        self.data.as_ref()\n    }\n\n    /// 获取数据可变引用\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn data_mut(\u0026mut self) -\u003e Option\u003c\u0026mut E\u003e {\n        self.data.as_mut()\n    }\n\n    /// 获取端点对\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn endpoints(\u0026self) -\u003e (NodeIndex, NodeIndex) {\n        (self.source, self.target)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_edge_index_creation() {\n        let idx = EdgeIndex::new(42, 1);\n        assert_eq!(idx.index(), 42);\n        assert_eq!(idx.generation(), 1);\n        assert!(idx.is_valid());\n    }\n\n    #[test]\n    fn test_edge_index_invalid() {\n        let idx = EdgeIndex::invalid();\n        assert!(!idx.is_valid());\n        assert_eq!(idx.index(), usize::MAX);\n    }\n\n    #[test]\n    fn test_edge_ref() {\n        let source = NodeIndex::new(0, 1);\n        let target = NodeIndex::new(1, 1);\n        let edge_idx = EdgeIndex::new(0, 1);\n        \n        let edge_ref = EdgeRef::new(edge_idx, source, target, \u002642.0);\n        \n        assert_eq!(edge_ref.index(), edge_idx);\n        assert_eq!(edge_ref.source(), source);\n        assert_eq!(edge_ref.target(), target);\n        assert_eq!(*edge_ref.data(), 42.0);\n        assert_eq!(edge_ref.endpoints(), (source, target));\n    }\n\n    #[test]\n    fn test_edge_storage() {\n        let source = NodeIndex::new(0, 1);\n        let target = NodeIndex::new(1, 1);\n\n        let edge = EdgeStorage::new(source, target, 42.0, 1);\n        assert!(edge.is_occupied());\n        assert_eq!(edge.data(), Some(\u002642.0));\n\n        let deleted: EdgeStorage\u003cf64\u003e = EdgeStorage::deleted(source, target, 1);\n        assert!(!deleted.is_occupied());\n        assert_eq!(deleted.data(), None);\n    }\n}\n","traces":[{"line":    },\n\n    /// 超过最大节点容量\n    GraphCapacityExceeded {\n        /// 当前数量\n        current: usize,\n        /// 最大容量\n        max: usize,\n    },\n\n    /// 内存分配失败\n    MemoryAllocationFailed {\n        /// 请求的大小（字节）\n        requested: usize,\n    },\n\n    /// 无效的图方向操作\n    InvalidDirection,\n\n    /// 图不是有向图\n    GraphNotDirected,\n\n    /// 图不是无向图\n    GraphNotUndirected,\n\n    /// 图中存在环（用于 DAG 操作）\n    GraphHasCycle,\n\n    /// 算法不收敛\n    AlgorithmNotConverged {\n        /// 执行的迭代次数\n        iterations: usize,\n        /// 最终误差\n        error: f64,\n    },\n\n    /// 负权环检测到（Bellman-Ford）\n    NegativeCycle,\n\n    /// 负权重边检测到（Dijkstra 不支持）\n    NegativeWeight {\n        /// 源节点索引\n        from: usize,\n        /// 目标节点索引\n        to: usize,\n        /// 权重值\n        weight: f64,\n    },\n\n    /// 索引越界\n    IndexOutOfBounds {\n        /// 提供的索引\n        index: usize,\n        /// 边界\n        bound: usize,\n    },\n}\n\nimpl Display for GraphError {\n    fn fmt(\u0026self, f: \u0026mut Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            GraphError::NodeNotFound { index } =\u003e {\n                write!(f, \"节点不存在：索引 {} 无效或超出范围\", index)\n            }\n            GraphError::NodeDeleted { index, provided, current } =\u003e {\n                write!(\n                    f,\n                    \"节点已删除：索引 {} 的 generation 不匹配 (provided: {}, current: {})\",\n                    index, provided, current\n                )\n            }\n            GraphError::EdgeNotFound { index } =\u003e {\n                write!(f, \"边不存在：索引 {} 无效或超出范围\", index)\n            }\n            GraphError::EdgeDeleted { index, provided, current } =\u003e {\n                write!(\n                    f,\n                    \"边已删除：索引 {} 的 generation 不匹配 (provided: {}, current: {})\",\n                    index, provided, current\n                )\n            }\n            GraphError::EdgeAlreadyExists { from, to } =\u003e {\n                write!(f, \"边已存在：从节点 {} 到节点 {} 的边已存在\", from, to)\n            }\n            GraphError::SelfLoopNotAllowed { node } =\u003e {\n                write!(f, \"不允许自环：节点 {} 不能作为自身的边端点\", node)\n            }\n            GraphError::GraphCapacityExceeded { current, max } =\u003e {\n                write!(\n                    f,\n                    \"超过最大容量：当前 {}，最大 {}\",\n                    current, max\n                )\n            }\n            GraphError::MemoryAllocationFailed { requested } =\u003e {\n                write!(f, \"内存分配失败：请求 {} 字节\", requested)\n            }\n            GraphError::InvalidDirection =\u003e {\n                write!(f, \"无效的图方向操作\")\n            }\n            GraphError::GraphNotDirected =\u003e {\n                write!(f, \"图不是有向图\")\n            }\n            GraphError::GraphNotUndirected =\u003e {\n                write!(f, \"图不是无向图\")\n            }\n            GraphError::GraphHasCycle =\u003e {\n                write!(f, \"图中存在环\")\n            }\n            GraphError::AlgorithmNotConverged { iterations, error } =\u003e {\n                write!(\n                    f,\n                    \"算法不收敛：执行 {} 次迭代后误差为 {}\",\n                    iterations, error\n                )\n            }\n            GraphError::NegativeCycle =\u003e {\n                write!(f, \"检测到负权环\")\n            }\n            GraphError::NegativeWeight { from, to, weight } =\u003e {\n                write!(\n                    f,\n                    \"检测到负权重边：节点 {} 到 {} 的权重为 {}（Dijkstra 不支持负权重，建议使用 Bellman-Ford 算法）\",\n                    from, to, weight\n                )\n            }\n            GraphError::IndexOutOfBounds { index, bound } =\u003e {\n                write!(f, \"索引越界：索引 {} 超出边界 {}\", index, bound)\n            }\n        }\n    }\n}\n\n#[cfg(feature = \"std\")]\nimpl std::error::Error for GraphError {}\n\nimpl From\u003cGraphError\u003e for String {\n    fn from(err: GraphError) -\u003e Self {\n        err.to_string()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_error_display() {\n        let err = GraphError::NodeNotFound { index: 42 };\n        assert!(err.to_string().contains(\"42\"));\n\n        let err = GraphError::EdgeAlreadyExists { from: 1, to: 2 };\n        assert!(err.to_string().contains(\"1\"));\n        assert!(err.to_string().contains(\"2\"));\n    }\n}\n","traces":[{"line":117,"address":[6912752],"length":1,"stats":{"Line":1}},{"line":118,"address":[4217457],"length":1,"stats":{"Line":1}},{"line":119,"address":[4554980],"length":1,"stats":{"Line":1}},{"line":120,"address":[4217501],"length":1,"stats":{"Line":1}},{"line":122,"address":[6912925],"length":1,"stats":{"Line":0}},{"line":123,"address":[4217630],"length":1,"stats":{"Line":0}},{"line":129,"address":[6913191],"length":1,"stats":{"Line":0}},{"line":130,"address":[4217875],"length":1,"stats":{"Line":0}},{"line":132,"address":[4217995],"length":1,"stats":{"Line":0}},{"line":133,"address":[4555517],"length":1,"stats":{"Line":0}},{"line":139,"address":[4555773],"length":1,"stats":{"Line":1}},{"line":140,"address":[6913652],"length":1,"stats":{"Line":1}},{"line":142,"address":[4399362],"length":1,"stats":{"Line":0}},{"line":143,"address":[4218526],"length":1,"stats":{"Line":0}},{"line":145,"address":[4218646],"length":1,"stats":{"Line":0}},{"line":146,"address":[6914001],"length":1,"stats":{"Line":0}},{"line":152,"address":[4556332],"length":1,"stats":{"Line":0}},{"line":153,"address":[4218875],"length":1,"stats":{"Line":0}},{"line":156,"address":[6914318],"length":1,"stats":{"Line":0}},{"line":159,"address":[6914359],"length":1,"stats":{"Line":0}},{"line":162,"address":[4219072],"length":1,"stats":{"Line":0}},{"line":165,"address":[4219113],"length":1,"stats":{"Line":0}},{"line":167,"address":[6914487],"length":1,"stats":{"Line":0}},{"line":168,"address":[4556653],"length":1,"stats":{"Line":0}},{"line":175,"address":[4219371],"length":1,"stats":{"Line":0}},{"line":177,"a //! ```\n\nuse crate::graph::Graph;\nuse crate::graph::traits::GraphQuery;\nuse std::fmt::Write;\n\n/// DOT 格式导出选项\n#[derive(Clone, Debug)]\npub struct DotOptions {\n    /// 是否显示节点标签\n    pub show_node_labels: bool,\n    /// 是否显示边标签\n    pub show_edge_labels: bool,\n    /// 是否显示节点索引\n    pub show_node_indices: bool,\n    /// 图的名称（用于 label）\n    pub graph_name: Option\u003cString\u003e,\n    /// 额外的图属性\n    pub graph_attributes: Vec\u003c(String, String)\u003e,\n    /// 节点默认属性\n    pub node_attributes: Vec\u003c(String, String)\u003e,\n    /// 边默认属性\n    pub edge_attributes: Vec\u003c(String, String)\u003e,\n}\n\nimpl Default for DotOptions {\n    fn default() -\u003e Self {\n        Self {\n            show_node_labels: true,\n            show_edge_labels: true,\n            show_node_indices: true,\n            graph_name: None,\n            graph_attributes: Vec::new(),\n            node_attributes: vec![\n                (\"shape\".to_string(), \"circle\".to_string()),\n                (\"style\".to_string(), \"filled\".to_string()),\n                (\"fillcolor\".to_string(), \"lightblue\".to_string()),\n            ],\n            edge_attributes: vec![\n                (\"color\".to_string(), \"gray\".to_string()),\n                (\"arrowhead\".to_string(), \"vee\".to_string()),\n            ],\n        }\n    }\n}\n\nimpl DotOptions {\n    /// 创建默认选项\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// 设置为无向图样式\n    pub fn undirected(mut self) -\u003e Self {\n        self.edge_attributes.retain(|(k, _)| k != \"arrowhead\");\n        self\n    }\n\n    /// 设置图名称\n    pub fn with_name(mut self, name: impl Into\u003cString\u003e) -\u003e Self {\n        self.graph_name = Some(name.into());\n        self\n    }\n\n    /// 隐藏节点标签\n    pub fn hide_node_labels(mut self) -\u003e Self {\n        self.show_node_labels = false;\n        self\n    }\n\n    /// 隐藏边标签\n    pub fn hide_edge_labels(mut self) -\u003e Self {\n        self.show_edge_labels = false;\n        self\n    }\n}\n\n/// 使用默认选项将图导出为 DOT 格式\npub fn to_dot\u003cT, E\u003e(graph: \u0026Graph\u003cT, E\u003e) -\u003e String\nwhere\n    T: std::fmt::Display,\n    E: std::fmt::Display,\n{\n    to_dot_with_options(graph, \u0026DotOptions::default())\n}\n\n/// 使用自定义选项将图导出为 DOT 格式\n///\n/// # 参数\n/// * `graph` - 要导出的图\n/// * `options` - DOT 导出选项\n///\n/// # 返回\n/// DOT 格式字符串\npub fn to_dot_with_options\u003cT, E\u003e(graph: \u0026Graph\u003cT, E\u003e, options: \u0026DotOptions) -\u003e String\nwhere\n    T: std::fmt::Display,\n    E: std::fmt::Display,\n{\n    let mut output = String::new();\n    \n    // 图声明：digraph（有向）或 graph（无向）\n    let graph_type = \"digraph\";\n    let name = options.graph_name.as_deref().unwrap_or(\"G\");\n    writeln!(\u0026mut output, \"{} {} {{\", graph_type, name).unwrap();\n\n    // 图属性\n    for (key, value) in \u0026options.graph_attributes {\n        writeln!(\u0026mut output, \"  {} = {};\", key, value).unwrap();\n    }\n\n    // 节点默认属性\n    if !options.node_attributes.is_empty() {\n        write!(\u0026mut output, \"  node [\").unwrap();\n        for (i, (key, value)) in options.node_attributes.iter().enumerate() {\n            if i \u003e 0 {\n                write!(\u0026mut output, \", \").unwrap();\n            }\n            write!(\u0026mut output, \"{} = {}\", key, value).unwrap();\n        }\n        writeln!(\u0026mut output, \"];\").unwrap();\n    }\n\n    // 边默认属性\n    if !options.edge_attributes.is_empty() {\n        write!(\u0026mut output, \"  edge [\").unwrap();\n        for (i, (key, value)) in options.edge_attributes.iter().enumerate() {\n            if i \u003e 0 {\n                write!(\u0026mut output, \", \").unwrap();\n            }\n            write!(\u0026mut output, \"{} = {}\", key, value).unwrap();\n        }\n        writeln!(\u0026mut output, \"];\").unwrap();\n    }\n\n    writeln!(\u0026mut output).unwrap();\n\n    // 导出节点\n    for node in graph.nodes() {\n        let idx = node.index();\n        \n        // 构建节点标签\n        let label = if options.show_node_labels \u0026\u0026 options.show_node_indices {\n            format!(\"{}: {}\", idx, node.data())\n        } else if options.show_node_labels {\n            format!(\"{}\", node.data())\n        } else if options.show_node_indices {\n            format!(\"{}\", idx)\n        } else {\n            String::new()\n        };\n\n        if label.is_empty() {\n            writeln!(\u0026mut output, \"  {};\", idx).unwrap();\n        } else {\n            writeln!(\u0026mut output, \"  {} [label=\\\"{}\\\"];\", idx, escape_dot(\u0026label)).unwrap();\n        }\n    }\n\n    writeln!(\u0026mut output).unwrap();\n\n    // 导出边\n    for edge in graph.edges() {\n        let source = edge.source().index();\n        let target = edge.target().index();\n        \n        let edge_def = if options.show_edge_labels {\n            format!(\" [label=\\\"{}\\\"]\", escape_dot(\u0026format!(\"{}\", edge.data())))\n        } else {\n            String::new()\n        };\n\n        writeln!(\u0026mut output, \"  {} -\u003e {}{};\", source, target, edge_def).unwrap();\n    }\n\n    writeln!(\u0026mut output, \"}}\").unwrap();\n    output\n}\n\n/// 导出无向图的 DOT 格式\n///\n/// 使用 `--` 而不是 `-\u003e` 表示边\npub fn to_dot_undirected\u003cT, E\u003e(graph: \u0026Graph\u003cT, E\u003e) -\u003e String\nwhere\n    T: std::fmt::Display,\n    E: std::fmt::Display,\n{\n    let mut output = String::new();\n    \n    writeln!(\u0026mut output, \"graph G {{\").unwrap();\n    writeln!(\u0026mut output, \"  node [shape=circle, style=filled, fillcolor=lightblue];\").unwrap();\n    writeln!(\u0026mut output).unwrap();\n\n    // 导出节点\n    for node in graph.nodes() {\n        let idx = node.index();\n        writeln!(\u0026mut output, \"  {} [label=\\\"{}: {}\\\"];\", idx, idx, node.data()).unwrap();\n    }\n\n    writeln!(\u0026mut output).unwrap();\n\n    // 导出边（无向图使用 --）\n    for edge in graph.edges() {\n        let source = edge.source().index();\n        let target = edge.target().index();\n        writeln!(\u0026mut output, \"  {} -- {} [label=\\\"{}\\\"];\", source, target, edge.data()).unwrap();\n    }\n\n    writeln!(\u0026mut output, \"}}\").unwrap();\n    output\n}\n\n/// 转义 DOT 字符串中的特殊字符\nfn escape_dot(s: \u0026str) -\u003e String {\n    s.replace('\\\\', \"\\\\\\\\\")\n        .replace('\"', \"\\\\\\\"\")\n        .replace('\\n', \"\\\\n\")\n        .replace('\\r', \"\\\\r\")\n        .replace('\\t', \"\\\\t\")\n}\n\n/// 将 DOT 字符串写入文件\n///\n/// # 参数\n/// * `dot` - DOT 格式字符串\n/// * `path` - 输出文件路径\n///\n/// # 返回\n/// 成功返回 Ok(())，失败返回 IO 错误\npub fn write_dot_to_file(dot: \u0026str, path: \u0026str) -\u003e std::io::Result\u003c()\u003e {\n    std::fs::write(path, dot)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::builders::GraphBuilder;\n\n    #[test]\n    fn test_dot_export_basic() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\"])\n            .with_edge(0, 1, 1.0)\n            .build()\n            .unwrap();\n\n        let dot = to_dot(\u0026graph);\n        assert!(dot.contains(\"digraph\"));\n        assert!(dot.contains(\"A\"));\n        assert!(dot.contains(\"B\"));\n        assert!(dot.contains(\"-\u003e\"));\n    }\n\n    #[test]\n    fn test_dot_export_with_options() {\n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 2.0)])\n            .build()\n            .unwrap();\n\n        let options = DotOptions::new()\n            .with_name(\"MyGraph\")\n            .hide_edge_labels();\n        \n        let dot = to_dot_with_options(\u0026graph, \u0026options);\n        assert!(dot.contains(\"digraph MyGraph\"));\n        // 边标签已隐藏，但节点标签仍然存在\n        // 检查没有边标签（格式为 [label=\"x\"] 在边定义中）\n        assert!(!dot.contains(\"-\u003e [label=\"));\n    }\n\n    #[test]\n    fn test_dot_escaping() {\n        assert_eq!(escape_dot(\"hello\"), \"hello\");\n        assert_eq!(escape_dot(\"he\\\"llo\"), \"he\\\\\\\"llo\");\n        assert_eq!(escape_dot(\"he\\\\llo\"), \"he\\\\\\\\llo\");\n        assert_eq!(escape_dot(\"line1\\nline2\"), \"line1\\\\nline2\");\n    }\n\n    #[test]\n    fn test_dot_empty_graph() {\n        let graph = GraphBuilder::\u003cString, f64\u003e::directed()\n            .build()\n            .unwrap();\n\n        let dot = to_dot(\u0026graph);\n        assert!(dot.contains(\"digraph\"));\n        assert!(dot.contains(\"{\"));\n        assert!(dot.contains(\"}\"));\n    }\n\n    #[test]\n    fn test_dot_undirected() {\n        let graph = GraphBuilder::undirected()\n            .with_nodes(vec![\"A\", \"B\"])\n            .with_edge(0, 1, 1.0)\n            .build()\n            .unwrap();\n\n        let dot = to_dot_undirected(\u0026graph);\n        assert!(dot.contains(\"graph\"));\n        assert!(dot.contains(\"--\")); // 无向图使用 --\n    }\n}\n","traces":[{"line":43,"address":[4261715,4261699,4259792],"length":1,"stats":{"Line":1}},{"line":49,"address":[4409024],"length":1,"stats":{"Line":1}},{"line":50,"address":[4410910,4409390,4409182,4409091,4409146,4409601,4409813],"length":1,"stats":{"Line":3}},{"line":55,"address":[4261705,4261365,4260903,4260845,4260942,4261153],"length":1,"stats":{"Line":6}},{"line":65,"address":[4624400],"length":1,"stats":{"Line":1}},{"line":66,"address":[4624408],"length":1,"stats":{"Line":1}},{"line":70,"address":[4624224,4624316],"length":1,"stats":{"Line":0}},{"line":71,"address":[6925433],"length":1,"stats":{"Line":0}},{"line":72,"address":[4261808],"length":1,"stats":{"Line":0}},{"line":76,"address":[],"length":0,"stats":{"Line":1}},{"line":77,"address":[4293722,4293780],"length":1,"stats":{"Line":2}},{"line":78,"address":[4293905],"length":1,"stats":{"Line":1}},{"line":82,"address":[4624368],"length":1,"stats":{"Line":0}},{"line":83,"address":[6925576],"length":1,"stats":{"Line":0}},{"line":84,"address":[4624380],"length":1," {"path":["/","home","hugo","codes","god-gragh","src","generators","barabasi_albert.rs"],"content":"//! Barabási-Albert 优先连接模型生成器\n//!\n//! 生成无标度网络，度分布服从幂律\n\nuse crate::graph::Graph;\nuse crate::graph::builders::GraphBuilder;\n\n/// 生成 Barabási-Albert 无标度网络\n///\n/// # 参数\n/// * `n` - 最终节点数量\n/// * `m` - 新节点连接的现有节点数\n///\n/// # 返回\n/// 生成的无向图\n///\n/// # 示例\n/// ```\n/// use god_gragh::generators::barabasi_albert_graph;\n/// use god_gragh::graph::Graph;\n/// use god_gragh::graph::traits::GraphBase;\n///\n/// let graph: Graph\u003ci32, f64\u003e = barabasi_albert_graph(100, 3);\n/// assert_eq!(graph.node_count(), 100);\n/// ```\npub fn barabasi_albert_graph\u003cT\u003e(n: usize, m: usize) -\u003e Graph\u003cT, f64\u003e\nwhere\n    T: Clone + Default,\n{\n    if n == 0 {\n        return Graph::directed();\n    }\n\n    let mut builder = GraphBuilder::undirected();\n\n    // 初始化：创建一个完全图作为种子（m+1 个节点）\n    let initial_size = (m + 1).min(n);\n    builder = builder.with_nodes((0..initial_size).map(|_| T::default()));\n\n    // 添加初始完全图的边\n    for i in 0..initial_size {\n        for j in (i + 1)..initial_size {\n            builder = builder.with_edge(i, j, 1.0);\n        }\n    }\n\n    // 优先连接：逐个添加新节点\n    for new_node in initial_size..n {\n        // 添加新节点\n        builder = builder.with_nodes(std::iter::once(T::default()));\n\n        // 选择 m 个现有节点进行连接\n        // 简化实现：直接连接前 m 个节点\n        for node_idx in 0..m.min(new_node) {\n            builder = builder.with_edge(node_idx, new_node, 1.0);\n        }\n\n        // 如果优先连接不够，随机连接\n        #[cfg(feature = \"rand\")]\n        {\n            use rand::{Rng, SeedableRng};\n            use rand_chacha::ChaCha8Rng;\n            let mut rng = ChaCha8Rng::seed_from_u64(42);\n\n            let mut connected = m.min(new_node);\n            while connected \u003c m \u0026\u0026 connected \u003c new_node {\n                let random_node = rng.gen_range(0..new_node);\n                builder = builder.with_edge(random_node, new_n  返回\n/// 生成的树\npub fn tree_graph\u003cT\u003e(n: usize) -\u003e Graph\u003cT, f64\u003e\nwhere\n    T: Clone + Default,\n{\n    if n == 0 {\n        return Graph::undirected();\n    }\n\n    let mut builder = GraphBuilder::undirected()\n        .with_nodes((0..n).map(|_| T::default()));\n\n    // 简单实现：生成一条路径\n    for i in 0..n - 1 {\n        builder = builder.with_edge(i, i + 1, 1.0);\n    }\n\n    builder.build().unwrap_or_else(|_| Graph::undirected())\n}\n\n/// 生成完全二叉树\npub fn binary_tree_graph\u003cT\u003e(height: usize) -\u003e Graph\u003cT, f64\u003e\nwhere\n    T: Clone + Default,\n{\n    let n = (1 \u003c\u003c height) - 1; // 2^h - 1\n    let mut builder = GraphBuilder::undirected()\n        .with_nodes((0..n).map(|_| T::default()));\n\n    for i in 0..n {\n        let left = 2 * i + 1;\n        let right = 2 * i + 2;\n\n        if left \u003c n {\n            builder = builder.with_edge(i, left, 1.0);\n        }\n        if right \u003c n {\n            builder = builder.with_edge(i, right, 1.0);\n        }\n    }\n\n    builder.build().unwrap_or_else(|_| Graph::undirected())\n}\n","traces":[{"line":15,"address":[3835488,3836285,3836279],"length":1,"stats":{"Line":1}},{"line":19,"address":[],"length":0,"stats":{"Line":1}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{"Line":2}},{"line":24,"address":[3836318,3836368,3836382,3835682,3835578,3835610],"length":1,"stats":{"Line":4}},{"line":27,"address":[],"length":0,"stats":{"Line":3}},{"line":28,"address":[3835935,3836120,3836180,3836269],"length":1,"stats":{"Line":2}},{"line":31,"address":[],"length":0,"stats":{"Line":1}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,
