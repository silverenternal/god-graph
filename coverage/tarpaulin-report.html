ength":0,"stats":{"Line":1}},{"line":246,"address":[],"length":0,"stats":{"Line":2}},{"line":247,"address":[],"length":0,"stats":{"Line":1}},{"line":253,"address":[],"length":0,"stats":{"Line":0}},{"line":254,"address":[],"length":0,"stats":{"Line":0}},{"line":255,"address":[],"length":0,"stats":{"Line":0}},{"line":260,"address":[],"length":0,"stats":{"Line":1}},{"line":261,"address":[],"length":0,"stats":{"Line":1}},{"line":266,"address":[4634336],"length":1,"stats":{"Line":2}},{"line":267,"address":[],"length":0,"stats":{"Line":2}},{"line":272,"address":[],"length":0,"stats":{"Line":1}},{"line":273,"address":[],"length":0,"stats":{"Line":2}},{"line":278,"address":[],"length":0,"stats":{"Line":0}},{"line":279,"address":[],"length":0,"stats":{"Line":0}},{"line":284,"address":[],"length":0,"stats":{"Line":0}},{"line":285,"address":[],"length":0,"stats":{"Line":0}},{"line":290,"address":[],"length":0,"stats":{"Line":0}},{"line":291,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":298,"address":[],"length":0,"stats":{"Line":0}},{"line":299,"address":[],"length":0,"stats":{"Line":0}},{"line":300,"address":[],"length":0,"stats":{"Line":0}},{"line":304,"address":[],"length":0,"stats":{"Line":1}},{"line":305,"address":[],"length":0,"stats":{"Line":3}},{"line":306,"address":[],"length":0,"stats":{"Line":2}},{"line":307,"address":[],"length":0,"stats":{"Line":1}},{"line":309,"address":[],"length":0,"stats":{"Line":1}},{"line":315,"address":[],"length":0,"stats":{"Line":0}},{"line":316,"address":[],"length":0,"stats":{"Line":0}},{"line":321,"address":[],"length":0,"stats":{"Line":0}},{"line":322,"address":[],"length":0,"stats":{"Line":0}}],"covered":61,"coverable":94},{"path":["/","home","hugo","codes","god-gragh","src","utils","cache.rs"],"content":"//! Cache 优化和预取工具\n//!\n//! 提供 CPU 缓存优化功能，包括：\n//! - 64 字节对齐的填充类型，避免多线程访问时的 false sharing\n//! - 软件预取指令，提前将数据加载到 CPU 缓存\n//!\n//! ## 使用示例\n//!\n//! ```rust\n//! use god_gragh::utils::cache::{Padded, prefetch_read};\n//!\n//! // 创建对齐的填充值\n//! let padded = Padded::new(42);\n//! assert_eq!(*padded, 42);\n//!\n//! // 预取数据到缓存\n//! let data = vec![1, 2, 3, 4, 5];\n//! prefetch_read(\u0026data[0]);\n//! ```\n\n/// 64 字节对齐的填充类型，避免 false sharing\n///\n/// 在多线程环境中，当多个线程访问相邻内存时，\n/// 即使访问不同的变量，也可能因为缓存行共享而导致性能下降。\n/// `Padded\u003cT\u003e` 通过将数据填充到 64 字节（缓存行大小）来避免这个问题。\n///\n/// ## 类型参数\n///\n/// - `T`: 要包装的数据类型\n///\n/// ## 示例\n///\n/// ```rust\n/// use god_gragh::utils::cache::Padded;\n///\n/// let padded = Padded::new(42);\n/// assert_eq!(*padded, 42);\n/// assert!(Padded::\u003cu8\u003e::size() \u003e= 64); // 至少 64 字节\n/// ```\n#[repr(align(64))]\n#[derive(Debug, Clone, Copy)]\npub struct Padded\u003cT\u003e {\n    /// 包装的数据\n    pub data: T,\n    /// 填充字节，确保 64 字节对齐\n    _padding: [u8; 64],\n}\n\nimpl\u003cT\u003e Padded\u003cT\u003e {\n    /// 创建新的 Padded 包装\n    ///\n    /// ## 参数\n    ///\n    /// - `data`: 要包装的数据\n    ///\n    /// ## 示例\n    ///\n    /// ```rust\n    /// use god_gragh::utils::cache::Padded;\n    ///\n    /// let padded = Padded::new(42);\n    /// assert_eq!(padded.data, 42);\n    /// ```\n    pub fn new(data: T) -\u003e Self {\n        Self {\n            data,\n            _padding: [0; 64],\n        }\n    }\n\n    /// 获取 Padded 结构的大小（字节）\n    ///\n    /// 返回值总是 \u003e= 64，因为缓存行对齐\n    pub fn size() -\u003e usize {\n        core::mem::size_of::\u003cSelf\u003e()\n    }\n\n    /// 验证指针是否 64 字节对齐\n    ///\n    /// ## 参数\n    ///\n    /// - `ptr`: 要验证的指针\n    ///\n    /// ## 返回\n    ///\n    /// - `true`: 对齐正确\n    /// - `false`: 对齐错误\n    ///\n    /// ## 示例\n    ///\n    /// ```rust\n    /// use god_gragh::utils::cache::Padded;\n    ///\n    /// let padded = Padded::new(42);\n    /// assert!(Padded::is_aligned(\u0026padded));\n    /// ```\n    pub fn is_aligned(ptr: \u0026T) -\u003e bool {\n        (ptr as *const T as usize) % 64 == 0\n    }\n\n    /// 验证 Vec 中 T 的指针是否 64 字节对齐\n    ///\n    /// ## 参数\n    ///\n    /// - `vec`: 要验证的 Vec\n    ///\n    /// ## 返回\n    ///\n    /// - `true`: 对齐正确\n    /// - `false`: 对齐错误\n    ///\n    /// ## 示例\n    ///\n    /// ```rust\n    /// use god_gragh::utils::cache::Padded;\n    ///\n    /// let vec: Vec\u003cPadded\u003cu8\u003e\u003e = vec![Padded::new(1), Padded::new(2)];\n    /// assert!(Padded::is_vec_aligned(\u0026vec));\n    /// ```\n    pub fn is_vec_aligned(vec: \u0026[T]) -\u003e bool {\n        if vec.is_empty() {\n            return true;\n        }\n        (vec.as_ptr() as usize) % 64 == 0\n    }\n}\n\nimpl\u003cT\u003e core::ops::Deref for Padded\u003cT\u003e {\n    type Target = T;\n\n    fn deref(\u0026self) -\u003e \u0026Self::Target {\n        \u0026self.data\n    }\n}\n\nimpl\u003cT\u003e core::ops::DerefMut for Padded\u003cT\u003e {\n    fn deref_mut(\u0026mut self) -\u003e \u0026mut Self::Target {\n        \u0026mut self.data\n    }\n}\n\nimpl\u003cT: Default\u003e Default for Padded\u003cT\u003e {\n    fn default() -\u003e Self {\n        Self::new(T::default())\n    }\n}\n\n/// 预取数据到 CPU 缓存用于读取\n///\n/// 使用 CPU 的 prefetch 指令提前将数据加载到缓存中，\n/// 可以减少后续访问的延迟。这是一个性能优化提示，\n/// 在某些架构上可能被忽略。\n///\n/// ## 参数\n///\n/// - `data`: 要预取的数据\n///\n/// ## 平台支持\n///\n/// - x86_64: 使用 `_mm_prefetch` 指令\n/// - 其他架构：使用 `std::hint::prefetch_read_data`（需要 std）\n///\n/// ## 示例\n///\n/// ```rust\n/// use god_gragh::utils::cache::prefetch_read;\n///\n/// let data = vec![1, 2, 3, 4, 5];\n/// prefetch_read(\u0026data[0]);\n/// // 现在访问 data[0] 可能更快\n/// ```\n#[inline]\npub fn prefetch_read\u003cT\u003e(data: \u0026T) {\n    #[cfg(target_arch = \"x86_64\")]\n    unsafe {\n        core::arch::x86_64::_mm_prefetch(\n            data as *const T as *const i8,\n            core::arch::x86_64::_MM_HINT_T0,\n        );\n    }\n\n    #[cfg(not(target_arch = \"x86_64\"))]\n    {\n        #[cfg(feature = \"std\")]\n        unsafe {\n            std::hint::prefetch_read_data(\n                data as *const T as *const _,\n                core::mem::size_of::\u003cT\u003e(),\n            );\n        }\n    }\n}\n\n/// 预取数据到 CPU 缓存用于写入\n///\n/// 使用 CPU 的 prefetch 指令提前将数据加载到缓存中，\n/// 为后续的写入操作做准备。\n///\n/// ## 参数\n///\n/// - `data`: 要预取的数据\n///\n/// ## 平台支持\n///\n/// - x86_64: 使用 `_mm_prefetch` 指令\n/// - 其他架构：无操作（空实现）\n///\n/// ## 示例\n///\n/// ```rust\n/// use god_gragh::utils::cache::prefetch_write;\n///\n/// let mut data = vec![1, 2, 3, 4, 5];\n/// prefetch_write(\u0026mut data[0]);\n/// // 现在写入 data[0] 可能更快\n/// ```\n#[inline]\npub fn prefetch_write\u003cT\u003e(data: \u0026mut T) {\n    #[cfg(target_arch = \"x86_64\")]\n    unsafe {\n        core::arch::x86_64::_mm_prefetch(\n            data as *mut T as *const i8,\n            core::arch::x86_64::_MM_HINT_T0,\n        );\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_padded_size() {\n        assert!(Padded::\u003cu8\u003e::size() \u003e= 64);\n    }\n\n    #[test]\n    fn test_padded_deref() {\n        let padded = Padded::new(42);\n        assert_eq!(*padded, 42);\n\n        let mut padded = Padded::new(42);\n        *padded = 43;\n        assert_eq!(padded.data, 43);\n    }\n}\n","traces":[{"line":64,"address":[4542432],"length":1,"stats":{"Line":1}},{"line":67,"address":[],"length":0,"stats":{"Line":1}},{"line":74,"address":[],"length":0,"stats":{"Line":1}},{"line":75,"address":[],"length":0,"stats":{"Line":1}},{"line":97,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":0}},{"line":121,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[],"length":0,"stats":{"Line":0}},{"line":124,"address":[],"length":0,"stats":{"Line":0}},{"line":131,"address":[],"length":0,"stats":{"Line":1}},{"line":132,"address":[],"length":0,"stats":{"Line":1}},{"line":137,"address":[],"length":0,"stats":{"Line":1}},{"line":138,"address":[],"length":0,"stats":{"Line":1}},{"line":143,"address":[],"length":0,"stats":{"Line":0}},{"line":144,"address":[],"length":0,"stats":{"Line":0}},{"line":173,"address":[],"length":0,"stats":{"Line":0}},{"line":174,"address":[],"length":0,"stats":{"Line":0}},{"line":177,"address":[],"length":0,"stats":{"Line":0}},{"line":178,"address":[],"length":0,"stats":{"Line":0}},{"line":184,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[],"length":0,"stats":{"Line":0}},{"line":188,"address":[],"length":0,"stats":{"Line":0}},{"line":218,"address":[],"length":0,"stats":{"Line":0}},{"line":219,"address":[],"length":0,"stats":{"Line":0}},{"line":222,"address":[],"length":0,"stats":{"Line":0}},{"line":223,"address":[],"length":0,"stats":{"Line":0}}],"covered":8,"coverable":27},{"path":["/","home","hugo","codes","god-gragh","src","utils","matrix.rs"],"content":"//! 矩阵表示模块\n//!\n//! 提供图的矩阵表示和线性代数集成\n//! 需要启用 `matrix` 特性\n\nuse crate::graph::Graph;\nuse crate::graph::traits::{GraphBase, GraphQuery};\nuse crate::node::NodeIndex;\nuse nalgebra::{DMatrix, DVector};\n\n/// 图的邻接矩阵表示\npub struct AdjacencyMatrix {\n    matrix: DMatrix\u003cf64\u003e,\n    node_indices: Vec\u003cNodeIndex\u003e,\n}\n\nimpl AdjacencyMatrix {\n    /// 从图构建邻接矩阵\n    pub fn from_graph\u003cT, E\u003e(graph: \u0026Graph\u003cT, E\u003e) -\u003e Self\n    where\n        E: Clone + Into\u003cf64\u003e,\n    {\n        let n = graph.node_count();\n        let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n        let index_to_pos: std::collections::HashMap\u003cusize, usize\u003e = node_indices\n            .iter()\n            .enumerate()\n            .map(|(i, ni)| (ni.index(), i))\n            .collect();\n\n        let mut matrix = DMatrix::zeros(n, n);\n\n        for edge in graph.edges() {\n            if let Ok((src, tgt)) = graph.edge_endpoints(edge.index()) {\n                if let (Some(\u0026i), Some(\u0026j)) = (\n                    index_to_pos.get(\u0026src.index()),\n                    index_to_pos.get(\u0026tgt.index()),\n                ) {\n                    let weight: f64 = edge.data().clone().into();\n                    matrix[(i, j)] = weight;\n                }\n            }\n        }\n\n        Self {\n            matrix,\n            node_indices,\n        }\n    }\n\n    /// 获取底层矩阵\n    pub fn as_matrix(\u0026self) -\u003e \u0026DMatrix\u003cf64\u003e {\n        \u0026self.matrix\n    }\n\n    /// 获取节点索引映射\n    pub fn node_indices(\u0026self) -\u003e \u0026[NodeIndex] {\n        \u0026self.node_indices\n    }\n\n    /// 获取矩阵大小\n    pub fn size(\u0026self) -\u003e usize {\n        self.matrix.nrows()\n    }\n\n    /// 获取节点在矩阵中的位置\n    pub fn node_position(\u0026self, node: NodeIndex) -\u003e Option\u003cusize\u003e {\n        self.node_indices\n            .iter()\n            .position(|\u0026ni| ni.index() == node.index())\n    }\n\n    /// 获取节点从矩阵位置\n    pub fn node_from_position(\u0026self, pos: usize) -\u003e Option\u003cNodeIndex\u003e {\n        self.node_indices.get(pos).copied()\n    }\n}\n\n/// 图的拉普拉斯矩阵表示\n///\n/// L = D - A，其中 D 是度矩阵，A 是邻接矩阵\npub struct LaplacianMatrix {\n    matrix: DMatrix\u003cf64\u003e,\n    node_indices: Vec\u003cNodeIndex\u003e,\n}\n\nimpl LaplacianMatrix {\n    /// 从图构建拉普拉斯矩阵\n    pub fn from_graph\u003cT\u003e(graph: \u0026Graph\u003cT, f64\u003e) -\u003e Self {\n        let n = graph.node_count();\n        let node_indices: Vec\u003cNodeIndex\u003e = graph.nodes().map(|n| n.index()).collect();\n        let index_to_pos: std::collections::HashMap\u003cusize, usize\u003e = node_indices\n            .iter()\n            .enumerate()\n            .map(|(i, ni)| (ni.index(), i))\n            .collect();\n\n        let mut matrix = DMatrix::zeros(n, n);\n\n        // 构建度矩阵和邻接矩阵\n        for edge in graph.edges() {\n            if let Ok((src, tgt)) = graph.edge_endpoints(edge.index()) {\n                if let (Some(\u0026i), Some(\u0026j)) = (\n                    index_to_pos.get(\u0026src.index()),\n                    index_to_pos.get(\u0026tgt.index()),\n                ) {\n                    let weight = *edge.data();\n                    // 非对角线元素为 -w_ij\n                    matrix[(i, j)] = -weight;\n                    // 对角线元素为度\n                    matrix[(i, i)] += weight;\n                    matrix[(j, j)] += weight;\n                }\n            }\n        }\n\n        Self {\n            matrix,\n            node_indices,\n        }\n    }\n\n    /// 获取底层矩阵\n    pub fn as_matrix(\u0026self) -\u003e \u0026DMatrix\u003cf64\u003e {\n        \u0026self.matrix\n    }\n\n    /// 获取节点索引映射\n    pub fn node_indices(\u0026self) -\u003e \u0026[NodeIndex] {\n        \u0026self.node_indices\n    }\n}\n\n/// 计算图的 Fiedler 向量（拉普拉斯矩阵的第二小特征值对应的特征向量）\n///\n/// Fiedler 向量可用于图分割和社区检测\npub fn fiedler_vector\u003cT\u003e(graph: \u0026Graph\u003cT, f64\u003e) -\u003e Option\u003cDVector\u003cf64\u003e\u003e\nwhere\n    T: Clone,\n{\n    let laplacian = LaplacianMatrix::from_graph(graph);\n    let matrix = laplacian.as_matrix();\n\n    // 使用幂迭代法计算最小非零特征值对应的特征向量\n    // 这里使用简化的实现\n    let n = matrix.nrows();\n    if n \u003c 2 {\n        return None;\n    }\n\n    // 初始化随机向量\n    let mut v = DVector::from_fn(n, |i, _| {\n        (i as f64 * 0.1).sin()\n    });\n    v.normalize_mut();\n\n    // 减去与全 1 向量平行的分量（对应零特征值）\n    let sum: f64 = v.sum();\n    let ones = DVector::from_element(n, 1.0);\n    v -= \u0026ones * (sum / n as f64);\n    v.normalize_mut();\n\n    // 幂迭代\n    for _ in 0..100 {\n        let mut w = matrix * \u0026v;\n\n        // 减去与全 1 向量平行的分量\n        let sum: f64 = w.sum();\n        w -= \u0026ones * (sum / n as f64);\n\n        let norm = w.norm();\n        if norm \u003c 1e-10 {\n            break;\n        }\n        v = w / norm;\n    }\n\n    Some(v)\n}\n\n/// 计算图的谱半径（邻接矩阵的最大特征值的绝对值）\npub fn spectral_radius\u003cT\u003e(graph: \u0026Graph\u003cT, f64\u003e) -\u003e f64\nwhere\n    T: Clone,\n{\n    let adjacency = AdjacencyMatrix::from_graph(graph);\n    let matrix = adjacency.as_matrix();\n\n    // 使用幂     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
