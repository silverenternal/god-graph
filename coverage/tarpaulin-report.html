新边，不删除旧边\n                        // 完整实现需要更复杂的边管理\n                        builder = builder.with_edge(i, new_target, 1.0);\n                    }\n                }\n            }\n        }\n    }\n\n    // 未启用 rand 特性时，beta 参数未使用\n    #[cfg(not(feature = \"rand\"))]\n    {\n        let _ = beta;\n    }\n\n    builder.build().unwrap_or_else(|_| Graph::directed())\n}\n","traces":[{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":75,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":18},{"path":["/","home","hugo","codes","god-gragh","src","graph","builders.rs"],"content":"//! 图构建器模块\n//!\n//! 提供流式 API 用于构建图\n\nuse crate::graph::Graph;\nuse crate::graph::traits::GraphOps;\nuse crate::errors::{GraphError, GraphResult};\n\n/// 图构建器\n///\n/// 提供流式 API 用于方便地构建图\npub struct GraphBuilder\u003cT, E\u003e {\n    graph: Graph\u003cT, E\u003e,\n    nodes: Vec\u003cT\u003e,\n    edges: Vec\u003c(usize, usize, E)\u003e,\n}\n\nimpl\u003cT, E\u003e GraphBuilder\u003cT, E\u003e\nwhere\n    T: Clone,\n    E: Clone,\n{\n    /// 创建新的有向图构建器\n    pub fn directed() -\u003e Self {\n        Self {\n            graph: Graph::directed(),\n            nodes: Vec::new(),\n            edges: Vec::new(),\n        }\n    }\n\n    /// 创建新的无向图构建器\n    pub fn undirected() -\u003e Self {\n        Self {\n            graph: Graph::undirected(),\n            nodes: Vec::new(),\n            edges: Vec::new(),\n        }\n    }\n\n    /// 添加节点数据\n    pub fn with_node(mut self, data: T) -\u003e Self {\n        self.nodes.push(data);\n        self\n    }\n\n    /// 批量添加节点\n    pub fn with_nodes\u003cI\u003e(mut self, iter: I) -\u003e Self\n    where\n        I: IntoIterator\u003cItem = T\u003e,\n    {\n        self.nodes.extend(iter);\n        self\n    }\n\n    /// 添加边\n    pub fn with_edge(mut self, from: usize, to: usize, data: E) -\u003e Self {\n        self.edges.push((from, to, data));\n        self\n    }\n\n    /// 批量添加边\n    pub fn with_edges\u003cI\u003e(mut self, iter: I) -\u003e Self\n    where\n        I: IntoIterator\u003cItem = (usize, usize, E)\u003e,\n    {\n        self.edges.extend(iter);\n        self\n    }\n\n    /// 构建图\n    pub fn build(mut self) -\u003e GraphResult\u003cGraph\u003cT, E\u003e\u003e {\n        // 先添加所有节点\n        let mut node_indices = Vec::with_capacity(self.nodes.len());\n        for data in self.nodes {\n            let idx = self.graph.add_node(data)?;\n            node_indices.push(idx);\n        }\n\n        // 再添加所有边\n        for (from, to, data) in self.edges {\n            if from \u003e= node_indices.len() || to \u003e= node_indices.len() {\n                return Err(GraphError::IndexOutOfBounds {\n                    index: from.max(to),\n                    bound: node_indices.len(),\n                });\n            }\n            self.graph.add_edge(node_indices[from], node_indices[to], data)?;\n        }\n\n        Ok(self.graph)\n    }\n}\n\nimpl\u003cT, E\u003e Default for GraphBuilder\u003cT, E\u003e\nwhere\n    T: Clone,\n    E: Clone,\n{\n    fn default() -\u003e Self {\n        Self::directed()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::graph::traits::GraphBase;\n\n    #[test]\n    fn test_builder_basic() {\n        let graph = GraphBuilder::directed()\n            .with_node(\"A\")\n            .with_node(\"B\")\n            .with_node(\"C\")\n            .with_edge(0, 1, 1.0)\n            .with_edge(1, 2, 2.0)\n            .build()\n            .unwrap();\n\n        assert_eq!(graph.node_count(), 3);\n        assert_eq!(graph.edge_count(), 2);\n    }\n\n    #[test]\n    fn test_builder_with_nodes() {\n        let graph: Graph\u003ci32, f64\u003e = GraphBuilder::directed()\n            .with_nodes(vec![1, 2, 3, 4])\n            .build()\n            .unwrap();\n\n        assert_eq!(graph.node_count(), 4);\n    }\n\n    #[test]\n    fn test_builder_with_edges() {\n        use crate::graph::traits::GraphBase;\n        \n        let graph = GraphBuilder::directed()\n            .with_nodes(vec![\"A\", \"B\", \"C\"])\n            .with_edges(vec![(0, 1, 1.0), (1, 2, 2.0), (0, 2, 3.0)])\n            .build()\n            .unwrap();\n\n        assert_eq!(graph.node_count(), 3);\n        assert_eq!(graph.edge_count(), 3);\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":20}},{"line":26,"address":[3857846],"length":1,"stats":{"Line":20}},{"line":27,"address":[4549819,4550403,4550115],"length":1,"stats":{"Line":20}},{"line":28,"address":[3857915],"length":1,"stats":{"Line":20}},{"line":33,"address":[3853049,3852784,3853043],"length":1,"stats":{"Line":8}},{"line":35,"address":[3852806],"length":1,"stats":{"Line":8}},{"line":36,"address":[],"length":0,"stats":{"Line":10}},{"line":37,"address":[4542619,4542903],"length":1,"stats":{"Line":10}},{"line":42,"address":[3858432,3858569],"length":1,"stats":{"Line":1}},{"line":43,"address":[3858493],"length":1,"stats":{"Line":1}},{"line":44,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[3853376,3853657,3853509,3853536,3853216,3853349],"length":1,"stats":{"Line":29}},{"line":52,"address":[],"length":0,"stats":{"Line":29}},{"line":53,"address":[],"length":0,"stats":{"Line":29}},{"line":57,"address":[3858404,3858112,3858244,3858272],"length":1,"stats":{"Line":2}},{"line":58,"address":[3858313,3858153],"length":1,"stats":{"Line":2}},{"line":59,"address":[],"length":0,"stats":{"Line":2}},{"line":63,"address":[3853072,3853193],"length":1,"stats":{"Line":26}},{"line":67,"address":[3892443,3892299],"length":1,"stats":{"Line":26}},{"line":68,"address":[3892517,3892373],"length":1,"stats":{"Line":26}},{"line":72,"address":[4547329,4547629,4545322,4545760,4549673,4549373,4547744,4543680,4545628],"length":1,"stats":{"Line":27}},{"line":74,"address":[3893364,3895509,3895370,3893499],"length":1,"stats":{"Line":54}},{"line":75,"address":[],"length":0,"stats":{"Line":81}},{"line":76,"address":[],"length":0,"stats":{"Line":54}},{"line":77,"address":[3857570,3855509],"length":1,"stats":{"Line":28}},{"line":81,"address":[],"length":0,"stats":{"Line":78}},{"line":82,"address":[],"length":0,"stats":{"Line":84}},{"line":83,"address":[3894764,3896837],"length":1,"stats":{"Line":0}},{"line":84,"address":[3894347,3896415],"length":1,"stats":{"Line":0}},{"line":85,"address":[3896807,3894736],"length":1,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":28}},{"line":91,"address":[3856624,3854566],"length":1,"stats":{"Line":28}},{"line":100,"address":[],"length":0,"stats":{"Line":0}},{"line":101,"address":[],"length":0,"stats":{"Line":0}}],"covered":29,"coverable":34},{"path":["/","home","hugo","codes","god-gragh","src","graph","impl_.rs"],"content":"//! Graph 核心实现\n//!\n//! 使用桶式邻接表（Bucket Adjacency List）和 Arena 分配器实现高性能图数据结构\n//!\n//! ## 内存布局说明\n//!\n//! 本实现采用**桶式邻接表**（Bucket Adjacency List）格式，而非传统 CSR（压缩稀疏行）：\n//!\n//! | 特性 | 传统 CSR | 本实现（桶式邻接表） |\n//! |------|----------|---------------------|\n//! | 结构 | row_offsets + col_indices | Vec\u003cAdjBucket\u003e，每个 bucket 含独立 Vec |\n//! | 增量更新 | ❌ 不支持（需 O(V+E) 重建） | ✅ O(1) 插入 |\n//! | 空间效率 | ✅ 最优（无额外开销） | ⚠️ 略高（每节点一个 Vec 头） |\n//! | 适用场景 | 静态图 | 动态图（频繁增删边） |\n//!\n//! 历史原因：早期代码使用 `CsrStorage` 命名，实际实现是桶式邻接表。\n//! 为保持 API 稳定性，内部结构仍用此名，但文档已正名为**桶式邻接表**。\n\nuse core::fmt;\n\n#[cfg(feature = \"serde\")]\nuse serde::{Serialize, Deserialize};\n\nuse crate::edge::{EdgeIndex, EdgeRef, EdgeStorage};\nuse crate::errors::{GraphError, GraphResult};\nuse crate::node::{NodeIndex, NodeRef, NodeSlot};\nuse crate::graph::traits::{GraphBase, GraphOps, GraphQuery};\n\n/// 单个邻接桶，用于 O(1) 增量边插入\n/// 使用 64 字节缓存行对齐，避免 false sharing\n#[derive(Clone, Debug)]\n#[repr(align(64))]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\npub(crate) struct AdjBucket {\n    neighbors: Vec\u003cusize\u003e,\n    edge_indices: Vec\u003cusize\u003e,\n    deleted_mask: Vec\u003cu64\u003e,\n    deleted_count: usize,\n    _padding: [u8; 8], // 确保 64 字节对齐\n}\n\nimpl AdjBucket {\n    fn new() -\u003e Self {\n        Self {\n            neighbors: Vec::new(),\n            edge_indices: Vec::new(),\n            deleted_mask: Vec::new(),\n            deleted_count: 0,\n            _padding: [0; 8],\n        }\n    }\n\n    #[inline]\n    fn push(\u0026mut self, target: usize, edge_idx: usize) {\n        self.neighbors.push(target);\n        self.edge_indices.push(edge_idx);\n        let bit_idx = self.neighbors.len() - 1;\n        let word_idx = bit_idx / 64;\n        while self.deleted_mask.len() \u003c= word_idx {\n            self.deleted_mask.push(0);\n        }\n    }\n\n    #[inline]\n    fn mark_deleted(\u0026mut self, pos: usize) {\n        let word_idx = pos / 64;\n        let bit = pos % 64;\n        if word_idx \u003c self.deleted_mask.len() {\n            let mask = 1u64 \u003c\u003c bit;\n            if self.deleted_mask[word_idx] \u0026 mask == 0 {\n                self.deleted_mask[word_idx] |= mask;\n                self.deleted_count += 1;\n            }\n        }\n    }\n\n    #[inline]\n    fn is_deleted(\u0026self, pos: usize) -\u003e bool {\n        let word_idx = pos / 64;\n        let bit = pos % 64;\n        if word_idx \u003e= self.deleted_mask.len() {\n            return false;\n        }\n        self.deleted_mask[word_idx] \u0026 (1u64 \u003c\u003c bit) != 0\n    }\n\n    #[inline]\n    fn compact(\u0026mut self) {\n        if self.deleted_count == 0 {\n            return;\n        }\n        let mut write_pos = 0;\n        for read_pos in 0..self.neighbors.len() {\n            if !self.is_deleted(read_pos) {\n                if write_pos != read_pos {\n                    self.neighbors[write_pos] = self.neighbors[read_pos];\n                    self.edge_indices[write_pos] = self.edge_indices[read_pos];\n                }\n                write_pos += 1;\n            }\n        }\n        self.neighbors.truncate(write_pos);\n        self.edge_indices.truncate(write_pos);\n        let words_needed = write_pos.div_ceil(64);\n        self.deleted_mask.truncate(words_needed);\n        for w in self.deleted_mask.iter_mut() {\n            *w = 0;\n        }\n        self.deleted_count = 0;\n    }\n\n    #[inline]\n    fn find(\u0026self, target: usize) -\u003e Option\u003cusize\u003e {\n        self.neighbors\n            .iter()\n            .position(|\u0026n| n == target)\n            .filter(|\u0026pos| !self.is_deleted(pos))\n    }\n\n    #[inline]\n    fn len(\u0026self) -\u003e usize {\n        self.neighbors.len() - self.deleted_count\n    }\n\n    #[inline]\n    fn iter(\u0026self) -\u003e AdjBucketIter\u003c'_\u003e {\n        AdjBucketIter {\n            bucket: self,\n            pos: 0,\n        }\n    }\n\n    /// 获取有效邻居的快照（用于快照语义迭代器）\n    #[inline]\n    fn snapshot(\u0026self) -\u003e Vec\u003c(usize, usize)\u003e {\n        self.iter().collect()\n    }\n}\n\n/// 邻接桶迭代器\npub(crate) struct AdjBucketIter\u003c'a\u003e {\n    bucket: \u0026'a AdjBucket,\n    pos: usize,\n}\n\nimpl\u003c'a\u003e Iterator for AdjBucketIter\u003c'a\u003e {\n    type Item = (usize, usize); // (target, edge_index)\n\n    #[inline]\n    fn next(\u0026mut self) -\u003e Option\u003cSelf::Item\u003e {\n        while self.pos \u003c self.bucket.neighbors.len() {\n            // 软件预取：预取下一批数据到 CPU 缓存（需要 nightly 特性）\n            // 在稳定版 Rust 上使用 std::hint 或条件编译\n            #[cfg(all(feature = \"unstable\", target_feature = \"sse\"))]\n            {\n                use core::arch::x86_64::_mm_prefetch;\n                use core::arch::x86_64::_MM_HINT_T0;\n\n                let prefetch_pos = self.pos + 4;\n                if prefetch_pos \u003c self.bucket.neighbors.len() {\n                    unsafe {\n                        _mm_prefetch(\n                            self.bucket.neighbors.as_ptr().add(prefetch_pos) as *const i8,\n                            _MM_HINT_T0,\n                        );\n                        _mm_prefetch(\n                            self.bucket.edge_indices.as_ptr().add(prefetch_pos) as *const i8,\n                            _MM_HINT_T0,\n                        );\n                    }\n                }\n            }\n\n            let pos = self.pos;\n            self.pos += 1;\n            if !self.bucket.is_deleted(pos) {\n                return Some((self.bucket.neighbors[pos], self.bucket.edge_indices[pos]));\n            }\n        }\n        None\n    }\n}\n\n/// 邻居迭代器（快照语义）\n///\n/// 在创建时捕获目标节点的 generation，迭代期间只返回该快照中的邻居\npub struct NeighborsIter {\n    /// 原始邻居数据快照（target_idx, generation）\n    snapshot: std::vec::IntoIter\u003c(usize, u32)\u003e,\n}\n\nimpl NeighborsIter {\n    pub(crate) fn new(snapshot: Vec\u003c(usize, u32)\u003e) -\u003e Self {\n        Self {\n            snapshot: snapshot.into_iter(),\n        }\n    }\n}\n\nimpl Iterator for NeighborsIter {\n    type Item = NodeIndex;\n\n    #[inline]\n    fn next(\u0026mut self) -\u003e Option\u003cSelf::Item\u003e {\n        self.snapshot.next().map(|(idx, generation)| NodeIndex::new(idx, generation))\n    }\n}\n\n/// 关联边迭代器（快照语义）\n///\n/// 在创建时捕获边的 generation，迭代期间只返回该快照中的边\npub struct IncidentEdgesIter {\n    /// 原始边数据快照（edge_idx, generation）\n    snapshot: std::vec::IntoIter\u003c(usize, u32)\u003e,\n}\n\nimpl IncidentEdgesIter {\n    pub(crate) fn new(snapshot: Vec\u003c(usize, u32)\u003e) -\u003e Self {\n        Self {\n            snapshot: snapshot.into_iter(),\n        }\n    }\n}\n\nimpl Iterator for IncidentEdgesIter {\n    type Item = EdgeIndex;\n\n    #[inline]\n    fn next(\u0026mut self) -\u003e Option\u003cSelf::Item\u003e {\n        self.snapshot.next().map(|(idx, generation)| EdgeIndex::new(idx, generation))\n    }\n}\n\n/// 邻接桶存储：桶式邻接表格式\n///\n/// ## 命名说明\n///\n/// 历史原因：早期代码使用 `CsrStorage` 命名，但实际实现是**桶式邻接表**（Bucket Adjacency List）。\n/// 传统 CSR（压缩稀疏行）格式使用 `row_offsets + col_indices`，不支持 O(1) 增量更新。\n/// 本实现使用 `Vec\u003cAdjBucket\u003e`，每个 bucket 含独立 `Vec`，支持 O(1) 插入和惰性删除。\n///\n/// 为保持 API 稳定性，保留 `CsrStorage` 别名，但推荐在新代码中使用 `AdjacencyBuckets`。\n#[derive(Clone, Debug)]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\npub(crate) struct AdjacencyBuckets {\n    buckets: Vec\u003cAdjBucket\u003e,\n    reverse_buckets: Vec\u003cAdjBucket\u003e,\n    num_nodes: usize,\n    needs_compact: bool,\n}\n\n/// 向后兼容别名\n///\n/// 历史原因：早期代码使用 `CsrStorage` 命名，但实际实现是桶式邻接表。\n/// 为保持 API 稳定性保留此别名，但推荐在新代码中使用 `AdjacencyBuckets`。\n#[deprecated(since = \"0.3.1\", note = \"使用 AdjacencyBuckets 代替，命名更准确反映实现\")]\n#[allow(dead_code)]\npub(crate) type CsrStorage = AdjacencyBuckets;\n\nimpl AdjacencyBuckets {\n    pub(crate) fn new() -\u003e Self {\n        let this = Self {\n            buckets: Vec::new(),\n            reverse_buckets: Vec::new(),\n            num_nodes: 0,\n            needs_compact: false,\n        };\n        // 验证空 Vec 的对齐（空指针 0 % 64 = 0，总是成立，但保留断言用于文档说明）\n        debug_assert_eq!(this.buckets.as_ptr() as usize % 64, 0, \"buckets 初始对齐失败\");\n        debug_assert_eq!(this.reverse_buckets.as_ptr() as usize % 64, 0, \"reverse_buckets 初始对齐失败\");\n        this\n    }\n\n    /// 验证 buckets 的 64 字节对齐\n    ///\n    /// 使用运行时断言确保 Vec\u003cAdjBucket\u003e 的指针是 64 字节对齐的。\n    /// AdjBucket 使用 #[repr(align(64))]，但需要验证实际分配的对齐。\n    ///\n    /// ## Panics\n    ///\n    /// 如果对齐不正确会 panic，并输出详细的调试信息。\n    #[inline]\n    pub(crate) fn assert_aligned(\u0026self) {\n        let buckets_ptr = self.buckets.as_ptr() as usize;\n        let reverse_ptr = self.reverse_buckets.as_ptr() as usize;\n        assert_eq!(\n            buckets_ptr % 64, 0,\n            \"AdjacencyBuckets: buckets 未 64 字节对齐 (ptr={:#x}, mod={})\",\n            buckets_ptr, buckets_ptr % 64\n        );\n        assert_eq!(\n            reverse_ptr % 64, 0,\n            \"AdjacencyBuckets: reverse_buckets 未 64 字节对齐 (ptr={:#x}, mod={})\",\n            reverse_ptr, reverse_ptr % 64\n        );\n    }\n\n    pub(crate) fn reserve(\u0026mut self, nodes: usize, _edges: usize) {\n        self.buckets.reserve(nodes);\n        self.reverse_buckets.reserve(nodes);\n        // 验证分配后的对齐\n        self.assert_aligned();\n    }\n\n    fn ensure_capacity(\u0026mut self, node_index: usize) {\n        while self.buckets.len() \u003c= node_index {\n            self.buckets.push(AdjBucket::new());\n        }\n        while self.reverse_buckets.len() \u003c= node_index {\n            self.reverse_buckets.push(AdjBucket::new());\n        }\n        self.num_nodes = self.buckets.len();\n        // 验证扩容后的对齐\n        self.assert_aligned();\n    }\n\n    /// O(1) 添加边\n    pub(crate) fn add_edge(\u0026mut self, node_index: usize, target_index: usize, edge_index: usize) {\n        self.ensure_capacity(node_index.max(target_index));\n        self.buckets[node_index].push(target_index, edge_index);\n        self.reverse_buckets[target_index].push(node_index, edge_index);\n    }\n\n    /// 标记边为已删除\n    pub(crate) fn mark_edge_deleted(\u0026mut self, node_index: usize, target_index: usize) {\n        if let Some(pos) = self.buckets[node_index].find(target_index) {\n            self.buckets[node_index].mark_deleted(pos);\n            self.needs_compact = true;\n        }\n        if let Some(pos) = self.reverse_buckets[target_index].find(node_index) {\n            self.reverse_buckets[target_index].mark_deleted(pos);\n        }\n    }\n\n    pub(crate) fn compact(\u0026mut self) {\n        if !self.needs_compact {\n            return;\n        }\n        for bucket in \u0026mut self.buckets {\n            bucket.compact();\n        }\n        for bucket in \u0026mut self.reverse_buckets {\n            bucket.compact();\n        }\n        self.needs_compact = false;\n    }\n\n    #[allow(dead_code)]\n    pub(crate) fn neighbors_raw(\u0026self, node_index: usize) -\u003e impl Iterator\u003cItem = usize\u003e + '_ {\n        self.buckets\n            .get(node_index)\n            .into_iter()\n            .flat_map(|b| b.iter())\n            .map(move |(target_idx, _)| target_idx)\n    }\n\n    #[allow(dead_code)]\n    pub(crate) fn reverse_neighbors_raw(\u0026self, node_index: usize) -\u003e impl Iterator\u003cItem = usize\u003e + '_ {\n        self.reverse_buckets\n            .get(node_index)\n            .into_iter()\n            .flat_map(|b| b.iter())\n            .map(move |(src_idx, _)| src_idx)\n    }\n\n    pub(crate) fn edge_indices_iter(\n        \u0026self,\n        node_index: usize,\n    ) -\u003e impl Iterator\u003cItem = usize\u003e + '_ {\n        self.buckets\n            .get(node_index)\n            .into_iter()\n            .flat_map(|b| b.iter().map(|(_, ei)| ei))\n    }\n\n    /// 获取边索引的快照（用于快照语义迭代器）\n    pub(crate) fn edge_indices_snapshot(\u0026self, node_index: usize) -\u003e Vec\u003cusize\u003e {\n        self.edge_indices_iter(node_index).collect()\n    }\n\n    /// 获取邻居的快照（用于快照语义迭代器）\n    pub(crate) fn neighbors_snapshot(\u0026self, node_index: usize) -\u003e Vec\u003c(usize, usize)\u003e {\n        self.buckets\n            .get(node_index)\n            .map(|b| b.snapshot())\n            .unwrap_or_default()\n    }\n\n    pub(crate) fn has_edge(\u0026self, node_index: usize, target_index: usize) -\u003e bool {\n        self.buckets\n            .get(node_index)\n            .and_then(|b| b.find(target_index))\n            .is_some()\n    }\n\n    pub(crate) fn degree(\u0026self, node_index: usize) -\u003e usize {\n        self.buckets.get(node_index).map(|b| b.len()).unwrap_or(0)\n    }\n\n    pub(crate) fn in_degree(\u0026self, node_index: usize) -\u003e usize {\n        self.reverse_buckets\n            .get(node_index)\n            .map(|b| b.len())\n            .unwrap_or(0)\n    }\n\n    pub(crate) fn reverse_edge_indices_iter(\n        \u0026self,\n        node_index: usize,\n    ) -\u003e impl Iterator\u003cItem = usize\u003e + '_ {\n        self.reverse_buckets\n            .get(node_index)\n            .into_iter()\n            .flat_map(|b| b.iter().map(|(_, ei)| ei))\n    }\n\n    pub(crate) fn clear(\u0026mut self) {\n        self.buckets.clear();\n        self.reverse_buckets.clear();\n        self.num_nodes = 0;\n        self.needs_compact = false;\n    }\n\n    #[allow(dead_code)]\n    pub(crate) fn num_nodes(\u0026self) -\u003e usize {\n        self.num_nodes\n    }\n}\n\nimpl Default for AdjacencyBuckets {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// 图结构主实现\n/// 使用缓存行对齐优化，减少 false sharing\n#[derive(Clone)]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\n#[cfg_attr(feature = \"serde\", serde(bound(\n    serialize = \"T: Serialize, E: Serialize\",\n    deserialize = \"T: Deserialize\u003c'de\u003e, E: Deserialize\u003c'de\u003e\"\n)))]\npub struct Graph\u003cT, E\u003e {\n    nodes: Vec\u003cNodeSlot\u003cT\u003e\u003e,\n    edges: Vec\u003cEdgeStorage\u003cE\u003e\u003e,\n    csr: AdjacencyBuckets,\n    node_count: usize,\n    edge_count: usize,\n    free_nodes: Vec\u003cusize\u003e,\n    free_edges: Vec\u003cusize\u003e,\n}\n\nimpl\u003cT, E\u003e fmt::Debug for Graph\u003cT, E\u003e\nwhere\n    T: fmt::Debug,\n    E: fmt::Debug,\n{\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"Graph\")\n            .field(\"node_count\", \u0026self.node_count)\n            .field(\"edge_count\", \u0026self.edge_count)\n            .finish()\n    }\n}\n\nimpl\u003cT, E\u003e Graph\u003cT, E\u003e {\n    /// 创建新的有向图\n    pub fn directed() -\u003e Self {\n        Self {\n            nodes: Vec::new(),\n            edges: Vec::new(),\n            csr: AdjacencyBuckets::new(),\n            node_count: 0,\n            edge_count: 0,\n            free_nodes: Vec::new(),\n            free_edges: Vec::new(),\n        }\n    }\n\n    /// 创建新的无向图\n    pub fn undirected() -\u003e Self {\n        Self::directed()\n    }\n\n    /// 创建带预分配容量的有向图\n    pub fn with_capacity(nodes: usize, edges: usize) -\u003e Self {\n        let mut graph = Self::directed();\n        graph.reserve(nodes, edges);\n        graph\n    }\n\n    /// 检查图是否为空\n    #[inline]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.node_count == 0\n    }\n\n    /// 清空图\n    pub fn clear(\u0026mut self) {\n        self.nodes.clear();\n        self.edges.clear();\n        self.csr.clear();\n        self.node_count = 0;\n        self.edge_count = 0;\n        self.free_nodes.clear();\n        self.free_edges.clear();\n    }\n\n    /// 通过节点索引获取边数据\n    pub fn get_edge_by_nodes(\u0026self, from: NodeIndex, to: NodeIndex) -\u003e GraphResult\u003c\u0026E\u003e {\n        for edge_idx in self.csr.edge_indices_iter(from.index()) {\n            if edge_idx \u003c self.edges.len() {\n                let edge = \u0026self.edges[edge_idx];\n                if edge.is_occupied() \u0026\u0026 edge.target == to {\n                    return edge.data().ok_or(GraphError::EdgeNotFound { index: edge_idx });\n                }\n            }\n        }\n        Err(GraphError::EdgeNotFound { index: usize::MAX })\n    }\n}\n\nimpl\u003cT, E\u003e GraphBase for Graph\u003cT, E\u003e {\n    type NodeData = T;\n    type EdgeData = E;\n\n    #[inline]\n    fn node_count(\u0026self) -\u003e usize {\n        self.node_count\n    }\n\n    #[inline]\n    fn edge_count(\u0026self) -\u003e usize {\n        self.edge_count\n    }\n\n    #[inline]\n    fn contains_node(\u0026self, index: NodeIndex) -\u003e bool {\n        if index.index() \u003e= self.nodes.len() {\n            return false;\n        }\n        let slot = \u0026self.nodes[index.index()];\n        slot.is_occupied() \u0026\u0026 slot.generation == index.generation()\n    }\n\n    #[inline]\n    fn contains_edge(\u0026self, index: EdgeIndex) -\u003e bool {\n        if index.index() \u003e= self.edges.len() {\n            return false;\n        }\n        let edge = \u0026self.edges[index.index()];\n        edge.is_occupied() \u0026\u0026 edge.generation == index.generation()\n    }\n}\n\nimpl\u003cT, E\u003e GraphQuery for Graph\u003cT, E\u003e {\n    #[inline]\n    fn get_node(\u0026self, index: NodeIndex) -\u003e GraphResult\u003c\u0026T\u003e {\n        if index.index() \u003e= self.nodes.len() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n        let slot = \u0026self.nodes[index.index()];\n        if !slot.is_occupied() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n        if slot.generation != index.generation() {\n            return Err(GraphError::NodeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: slot.generation,\n            });\n        }\n        slot.data().ok_or(GraphError::NodeNotFound { index: index.index() })\n    }\n\n    #[inline]\n    fn get_edge(\u0026self, index: EdgeIndex) -\u003e GraphResult\u003c\u0026E\u003e {\n        if index.index() \u003e= self.edges.len() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n        let edge = \u0026self.edges[index.index()];\n        if !edge.is_occupied() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n        if edge.generation != index.generation() {\n            return Err(GraphError::EdgeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: edge.generation,\n            });\n        }\n        edge.data().ok_or(GraphError::EdgeNotFound { index: index.index() })\n    }\n\n    #[inline]\n    fn edge_endpoints(\u0026self, index: EdgeIndex) -\u003e GraphResult\u003c(NodeIndex, NodeIndex)\u003e {\n        if index.index() \u003e= self.edges.len() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n        let edge = \u0026self.edges[index.index()];\n        if !edge.is_occupied() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n        if edge.generation != index.generation() {\n            return Err(GraphError::EdgeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: edge.generation,\n            });\n        }\n        Ok((edge.source, edge.target))\n    }\n\n    /// 获取节点的邻居迭代器\n    ///\n    /// # 快照语义\n    ///\n    /// 迭代器在**创建时**捕获目标节点的邻居快照：\n    /// - 返回的迭代器包含创建时的所有有效邻居\n    /// - 迭代期间图的修改不会影响迭代器返回的内容\n    /// - 如果邻居节点在迭代期间被删除，该节点会被跳过\n    ///\n    /// # 推荐用法\n    ///\n    /// ```\n    /// # use god_gragh::prelude::*;\n    /// # let mut graph = GraphBuilder::directed()\n    /// #     .with_nodes(vec![1, 2, 3])\n    /// #     .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0)])\n    /// #     .build().unwrap();\n    /// # let node = graph.nodes().next().unwrap().index();\n    /// // 安全：迭代器持有快照，迭代期间可以修改图\n    /// for neighbor in graph.neighbors(node) {\n    ///     println!(\"{:?}\", graph[neighbor]);\n    /// }\n    /// ```\n    #[inline]\n    fn neighbors(\u0026self, node: NodeIndex) -\u003e impl Iterator\u003cItem = NodeIndex\u003e {\n        let node_index = node.index();\n        // 在创建时捕获邻居快照（包含 generation 信息）\n        let snapshot: Vec\u003c(usize, u32)\u003e = self.csr\n            .neighbors_snapshot(node_index)\n            .into_iter()\n            .map(|(target_idx, _edge_idx)| {\n                let generation = self.nodes.get(target_idx).map(|n| n.generation).unwrap_or(0);\n                (target_idx, generation)\n            })\n            .collect();\n        NeighborsIter::new(snapshot)\n    }\n\n    /// 获取节点的关联边迭代器\n    ///\n    /// # 快照语义\n    ///\n    /// 迭代器在**创建时**捕获关联边的快照：\n    /// - 返回的迭代器包含创建时的所有有效边\n    /// - 迭代期间图的修改不会影响迭代器返回的内容\n    /// - 如果边在迭代期间被删除，该边会被跳过\n    ///\n    /// # 推荐用法\n    ///\n    /// ```\n    /// # use god_gragh::prelude::*;\n    /// # let mut graph = GraphBuilder::directed()\n    /// #     .with_nodes(vec![1, 2, 3])\n    /// #     .with_edges(vec![(0, 1, 1.0), (0, 2, 1.0)])\n    /// #     .build().unwrap();\n    /// # let node = graph.nodes().next().unwrap().index();\n    /// // 安全：迭代器持有快照，迭代期间可以修改图\n    /// for edge_idx in graph.incident_edges(node) {\n    ///     println!(\"{:?}\", graph.get_edge(edge_idx).unwrap());\n    /// }\n    /// ```\n    #[inline]\n    fn incident_edges(\u0026self, node: NodeIndex) -\u003e impl Iterator\u003cItem = EdgeIndex\u003e {\n        let node_index = node.index();\n        // 在创建时捕获边索引快照（包含 generation 信息）\n        let snapshot: Vec\u003c(usize, u32)\u003e = self.csr\n            .edge_indices_snapshot(node_index)\n            .into_iter()\n            .map(|edge_idx| {\n                let generation = self.edges.get(edge_idx).map(|e| e.generation).unwrap_or(0);\n                (edge_idx, generation)\n            })\n            .collect();\n        IncidentEdgesIter::new(snapshot)\n    }\n\n    #[inline]\n    fn has_edge(\u0026self, from: NodeIndex, to: NodeIndex) -\u003e bool {\n        self.csr.has_edge(from.index(), to.index())\n    }\n\n    #[inline]\n    fn out_degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e {\n        if !self.contains_node(node) {\n            return Err(GraphError::NodeNotFound { index: node.index() });\n        }\n        Ok(self.csr.degree(node.index()))\n    }\n\n    #[inline]\n    fn in_degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e {\n        if !self.contains_node(node) {\n            return Err(GraphError::NodeNotFound { index: node.index() });\n        }\n        Ok(self.csr.in_degree(node.index()))\n    }\n\n    #[inline]\n    fn degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e {\n        let out_deg = self.out_degree(node)?;\n        let in_deg = self.in_degree(node)?;\n        Ok(out_deg + in_deg)\n    }\n\n    #[inline]\n    fn nodes(\u0026self) -\u003e impl Iterator\u003cItem = NodeRef\u003c'_, T\u003e\u003e {\n        self.nodes\n            .iter()\n            .enumerate()\n            .filter_map(|(idx, slot)| {\n                if slot.is_occupied() {\n                    Some(NodeRef::new(\n                        NodeIndex::new(idx, slot.generation),\n                        slot.data()?,\n                    ))\n                } else {\n                    None\n                }\n            })\n    }\n\n    #[inline]\n    fn edges(\u0026self) -\u003e impl Iterator\u003cItem = EdgeRef\u003c'_, E\u003e\u003e {\n        self.edges\n            .iter()\n            .enumerate()\n            .filter_map(|(idx, edge)| {\n                if edge.is_occupied() {\n                    Some(EdgeRef::new(\n                        EdgeIndex::new(idx, edge.generation),\n                        edge.source,\n                        edge.target,\n                        edge.data()?,\n                    ))\n                } else {\n                    None\n                }\n            })\n    }\n}\n\nimpl\u003cT, E\u003e GraphOps for Graph\u003cT, E\u003e {\n    #[inline]\n    fn add_node(\u0026mut self, data: T) -\u003e GraphResult\u003cNodeIndex\u003e {\n        let (index, generation) = if let Some(free_idx) = self.free_nodes.pop() {\n            let slot = \u0026mut self.nodes[free_idx];\n            let new_generation = slot.generation.wrapping_add(1);\n            *slot = NodeSlot::new(new_generation, data);\n            (free_idx, new_generation)\n        } else {\n            let index = self.nodes.len();\n            let generation = 1u32;\n            self.nodes.push(NodeSlot::new(generation, data));\n            (index, generation)\n        };\n\n        self.node_count += 1;\n        self.csr.ensure_capacity(index);\n        Ok(NodeIndex::new(index, generation))\n    }\n\n    #[inline]\n    fn remove_node(\u0026mut self, index: NodeIndex) -\u003e GraphResult\u003cT\u003e {\n        if index.index() \u003e= self.nodes.len() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n\n        let slot = \u0026mut self.nodes[index.index()];\n        if !slot.is_occupied() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n        if slot.generation != index.generation() {\n            return Err(GraphError::NodeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: slot.generation,\n            });\n        }\n\n        // 删除出边\n        let edge_indices: Vec\u003cusize\u003e = self.csr.edge_indices_iter(index.index()).collect();\n        for edge_idx in edge_indices {\n            if edge_idx \u003c self.edges.len() {\n                let edge = \u0026self.edges[edge_idx];\n                if edge.is_occupied() {\n                    self.csr.mark_edge_deleted(index.index(), edge.target.index());\n                    let edge_slot = \u0026mut self.edges[edge_idx];\n                    edge_slot.data = None;\n                    self.edge_count -= 1;\n                    self.free_edges.push(edge_idx);\n                }\n            }\n        }\n\n        // 删除入边\n        let incoming: Vec\u003cusize\u003e = self.csr.reverse_edge_indices_iter(index.index()).collect();\n        for edge_idx in incoming {\n            if edge_idx \u003c self.edges.len() {\n                let edge = \u0026self.edges[edge_idx];\n                if edge.is_occupied() {\n                    self.csr.mark_edge_deleted(edge.source.index(), index.index());\n                    let edge_slot = \u0026mut self.edges[edge_idx];\n                    edge_slot.data = None;\n                    self.edge_count -= 1;\n                    self.free_edges.push(edge_idx);\n                }\n            }\n        }\n\n        self.csr.compact();\n\n        let data = slot.data.take().ok_or(GraphError::NodeNotFound { index: index.index() })?;\n        self.node_count -= 1;\n        self.free_nodes.push(index.index());\n\n        Ok(data)\n    }\n\n    #[inline]\n    fn add_edge(\u0026mut self, from: NodeIndex, to: NodeIndex, data: E) -\u003e GraphResult\u003cEdgeIndex\u003e {\n        if !self.contains_node(from) {\n            return Err(GraphError::NodeNotFound { index: from.index() });\n        }\n        if !self.contains_node(to) {\n            return Err(GraphError::NodeNotFound { index: to.index() });\n        }\n\n        let (index, generation) = if let Some(free_idx) = self.free_edges.pop() {\n            let edge = \u0026mut self.edges[free_idx];\n            let new_generation = edge.generation.wrapping_add(1);\n            *edge = EdgeStorage::new(from, to, data, new_generation);\n            (free_idx, new_generation)\n        } else {\n            let index = self.edges.len();\n            let generation = 1u32;\n            self.edges.push(EdgeStorage::new(from, to, data, generation));\n            (index, generation)\n        };\n\n        self.edge_count += 1;\n        self.csr.add_edge(from.index(), to.index(), index);\n        Ok(EdgeIndex::new(index, generation))\n    }\n\n    #[inline]\n    fn remove_edge(\u0026mut self, index: EdgeIndex) -\u003e GraphResult\u003cE\u003e {\n        if index.index() \u003e= self.edges.len() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n\n        let edge = \u0026mut self.edges[index.index()];\n        if !edge.is_occupied() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n        if edge.generation != index.generation() {\n            return Err(GraphError::EdgeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: edge.generation,\n            });\n        }\n\n        let source_index = edge.source.index();\n        let target_index = edge.target.index();\n        self.csr.mark_edge_deleted(source_index, target_index);\n\n        let data = edge.data.take().ok_or(GraphError::EdgeNotFound { index: index.index() })?;\n        self.edge_count -= 1;\n        self.free_edges.push(index.index());\n        self.csr.compact();\n\n        Ok(data)\n    }\n\n    #[inline]\n    fn update_node(\u0026mut self, index: NodeIndex, data: T) -\u003e GraphResult\u003cT\u003e {\n        if index.index() \u003e= self.nodes.len() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n\n        let slot = \u0026mut self.nodes[index.index()];\n        if !slot.is_occupied() {\n            return Err(GraphError::NodeNotFound { index: index.index() });\n        }\n        if slot.generation != index.generation() {\n            return Err(GraphError::NodeDeleted {\n                index: index.index(),\n                provided: index.generation(),\n                current: slot.generation,\n            });\n        }\n\n        let old_data = slot.data.replace(data);\n        old_data.ok_or(GraphError::NodeNotFound { index: index.index() })\n    }\n\n    #[inline]\n    fn update_edge(\u0026mut self, index: EdgeIndex, data: E) -\u003e GraphResult\u003cE\u003e {\n        if index.index() \u003e= self.edges.len() {\n            return Err(GraphError::EdgeNotFound { index: index.index() });\n        }\n\n        let edge = ) -\u003e (usize, Option\u003cusize\u003e) {\n        self.indices.size_hint()\n    }\n}\n\nimpl\u003c'a\u003e ExactSizeIterator for IncidentEdges\u003c'a\u003e {}\nimpl\u003c'a\u003e core::iter::FusedIterator for IncidentEdges\u003c'a\u003e {}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[4281360],"length":1,"stats":{"Line":0}},{"line":66,"address":[4281184],"length":1,"stats":{"Line":0}},{"line":67,"address":[6902864,6902898],"length":1,"stats":{"Line":0}},{"line":71,"address":[4430464],"length":1,"stats":{"Line":0}},{"line":72,"address":[4430481],"length":1,"stats":{"Line":0}},{"line":87,"address":[4430512],"length":1,"stats":{"Line":0}},{"line":99,"address":[6944736],"length":1,"stats":{"Line":0}},{"line":100,"address":[6944768],"length":1,"stats":{"Line":0}},{"line":104,"address":[4281136],"length":1,"stats":{"Line":0}},{"line":105,"address":[4281153],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":14},{"path":["/","home","hugo","codes","god-gragh","src","graph","mod.rs"],"content":"//! 图核心模块\n//!\n//! 提供 Graph 数据结构和核心操作 trait\n\npub mod traits;\npub mod impl_;\npub mod builders;\npub mod iterators;\n\npub use traits::{GraphBase, GraphOps, GraphQuery, Direction};\npub use impl_::Graph;\npub use builders::GraphBuilder;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","src","graph","traits.rs"],"content":"//! 图核心 trait 定义\n//!\n//! 定义图操作的基本接口，支持泛型实现\n\nuse crate::edge::{EdgeIndex, EdgeRef};\nuse crate::node::{NodeIndex, NodeRef};\nuse crate::errors::{GraphError, GraphResult};\n\n/// 图基础 trait\n///\n/// 定义所有图类型必须实现的基本操作\npub trait GraphBase {\n    /// 节点数据类型\n    type NodeData;\n    /// 边数据类型\n    type EdgeData;\n\n    /// 获取节点数量\n    fn node_count(\u0026self) -\u003e usize;\n\n    /// 获取边数量\n    fn edge_count(\u0026self) -\u003e usize;\n\n    /// 检查是否为空图\n    fn is_empty(\u0026self) -\u003e bool {\n        self.node_count() == 0\n    }\n\n    /// 检查是否包含节点\n    fn contains_node(\u0026self, index: NodeIndex) -\u003e bool;\n\n    /// 检查是否包含边\n    fn contains_edge(\u0026self, index: EdgeIndex) -\u003e bool;\n}\n\n/// 图查询 trait\n///\n/// 定义图的只读查询操作\npub trait GraphQuery: GraphBase {\n    /// 获取节点引用\n    fn get_node(\u0026self, index: NodeIndex) -\u003e GraphResult\u003c\u0026Self::NodeData\u003e;\n\n    /// 获取边引用\n    fn get_edge(\u0026self, index: EdgeIndex) -\u003e GraphResult\u003c\u0026Self::EdgeData\u003e;\n\n    /// 获取边的端点\n    fn edge_endpoints(\u0026self, index: EdgeIndex) -\u003e GraphResult\u003c(NodeIndex, NodeIndex)\u003e;\n\n    /// 获取节点的出边邻居迭代器\n    fn neighbors(\u0026self, node: NodeIndex) -\u003e impl Iterator\u003cItem = NodeIndex\u003e;\n\n    /// 获取节点的关联边迭代器\n    fn incident_edges(\u0026self, node: NodeIndex) -\u003e impl Iterator\u003cItem = EdgeIndex\u003e;\n\n    /// 检查是否存在从 from 到 to 的边\n    fn has_edge(\u0026self, from: NodeIndex, to: NodeIndex) -\u003e bool;\n\n    /// 获取节点的出度\n    fn out_degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e;\n\n    /// 获取节点的入度（有向图）\n    fn in_degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e {\n        self.out_degree(node)\n    }\n\n    /// 获取节点的总度数\n    fn degree(\u0026self, node: NodeIndex) -\u003e GraphResult\u003cusize\u003e {\n        self.out_degree(node)\n    }\n\n    /// 获取所有节点迭代器\n    fn nodes(\u0026self) -\u003e impl Iterator\u003cItem = NodeRef\u003c'_, Self::NodeData\u003e\u003e;\n\n    /// 获取所有边迭代器\n    fn edges(\u0026self) -\u003e impl Iterator\u003cItem = EdgeRef\u003c'_, Self::EdgeData\u003e\u003e;\n}\n\n/// 图可变操作 trait\n///\n/// 定义图的可变操作\npub trait GraphOps: GraphBase {\n    /// 添加节点\n    fn add_node(\u0026mut self, data: Self::NodeData) -\u003e GraphResult\u003cNodeIndex\u003e;\n\n    /// 删除节点，返回节点数据\n    fn remove_node(\u0026mut self, index: NodeIndex) -\u003e GraphResult\u003cSelf::NodeData\u003e;\n\n    /// 添加边\n    fn add_edge(\n        \u0026mut self,\n        from: NodeIndex,\n        to: NodeIndex,\n        data: Self::EdgeData,\n    ) -\u003e GraphResult\u003cEdgeIndex\u003e;\n\n    /// 删除边，返回边数据\n    fn remove_edge(\u0026mut self, index: EdgeIndex) -\u003e GraphResult\u003cSelf::EdgeData\u003e;\n\n    /// 更新节点数据，返回旧数据\n    fn update_node(\n        \u0026mut self,\n        index: NodeIndex,\n        data: Self::NodeData,\n    ) -\u003e GraphResult\u003cSelf::NodeData\u003e;\n\n    /// 更新边数据，返回旧数据\n    fn update_edge(\n        \u0026mut self,\n        index: EdgeIndex,\n        data: Self::EdgeData,\n    ) -\u003e GraphResult\u003cSelf::EdgeData\u003e;\n\n    /// 清空图\n    fn clear(\u0026mut self);\n\n    /// 预分配容量\n    fn reserve(\u0026mut self, additional_nodes: usize, additional_edges: usize);\n}\n\n/// 边方向\n#[derive(Debug, Copy, Clone, PartialEq, Eq, Hash)]\npub enum Direction {\n    /// 出边方向\n    Outgoing,\n    /// 入边方向\n    Incoming,\n}\n\nimpl Direction {\n    /// 获取相反方向\n    #[inline]\n    pub fn opposite(self) -\u003e Self {\n        match self {\n            Direction::Outgoing =\u003e Direction::Incoming,\n            Direction::Incoming =\u003e Direction::Outgoing,\n        }\n    }\n\n    /// 检查是否为出边方向\n    #[inline]\n    pub fn is_outgoing(self) -\u003e bool {\n        matches!(self, Direction::Outgoing)\n    }\n\n    /// 检查是否为入边方向\n    #[inline]\n    pub fn is_incoming(self) -\u003e bool {\n        matches!(self, Direction::Incoming)\n    }\n}\n\n/// 索引验证辅助函数\n///\n/// 验证 NodeIndex 的 generation 是否匹配\n#[inline]\npub fn validate_node_index(provided: NodeIndex, current_generation: u32) -\u003e GraphResult\u003c()\u003e {\n    if provided.generation() == current_generation {\n        Ok(())\n    } else {\n        Err(GraphError::NodeDeleted {\n            index: provided.index(),\n            provided: provided.generation(),\n            current: current_generation,\n        })\n    }\n}\n\n/// 索引验证辅助函数\n///\n/// 验证 EdgeIndex 的 generation 是否匹配\n#[inline]\npub fn validate_edge_index(provided: EdgeIndex, current_generation: u32) -\u003e GraphResult\u003c()\u003e {\n    if provided.generation() == current_generation {\n        Ok(())\n    } else {\n        Err(GraphError::EdgeDeleted {\n            index: provided.index(),\n            provided: provided.generation(),\n            current: current_generation,\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_direction() {\n        assert_eq!(Direction::Outgoing.opposite(), Direction::Incoming);\n        assert_eq!(Direction::Incoming.opposite(), Direction::Outgoing);\n        assert!(Direction::Outgoing.is_outgoing());\n        assert!(Direction::Incoming.is_incoming());\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":132,"address":[],"length":0,"stats":{"Line":1}},{"line":133,"address":[],"length":0,"stats":{"Line":1}},{"line":134,"address":[],"length":0,"stats":{"Line":1}},{"line":135,"address":[4386505],"length":1,"stats":{"Line":1}},{"line":141,"address":[],"length":0,"stats":{"Line":1}},{"line":142,"address":[],"length":0,"stats":{"Line":1}},{"line":147,"address":[],"length":0,"stats":{"Line":1}},{"line":148,"address":[],"length":0,"stats":{"Line":1}},{"line":156,"address":[],"length":0,"stats":{"Line":0}},{"line":157,"address":[4386384,4386271],"length":1,"stats":{"Line":0}},{"line":158,"address":[],"length":0,"stats":{"Line":0}},{"line":160,"address":[],"length":0,"stats":{"Line":0}},{"line":161,"address":[],"length":0,"stats":{"Line":0}},{"line":162,"address":[],"length":0,"stats":{"Line":0}},{"line":163,"address":[],"length":0,"stats":{"Line":0}},{"line b mod edge;\npub mod algorithms;\npub mod generators;\npub mod export;\npub mod utils;\npub mod prelude;\n\n// 重新导出核心类型\npub use errors::{GraphError, GraphResult};\npub use graph::Graph;\npub use node::{NodeIndex, NodeRef};\npub use edge::{EdgeIndex, EdgeRef};\n\n/// 库版本号\npub const VERSION: \u0026str = env!(\"CARGO_PKG_VERSION\");\n\n/// 最大支持的节点数量\npub const MAX_NODES: usize = usize::MAX \u003e\u003e 1;\n\n/// 最大支持的边数量\npub const MAX_EDGES: usize = usize::MAX \u003e\u003e 1;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","src","main.rs"],"content":"//! God-Graph 示例程序\n\nuse god_gragh::prelude::*;\nuse god_gragh::graph::traits::GraphQuery;\n\nfn main() {\n    println!(\"🚀 God-Graph 高性能图库\\n\");\n\n    // 示例 1：基本图操作\n    println!(\"=== 示例 1：基本图操作 ===\");\n    basic_graph_example();\n\n    // 示例 2：图遍历\n    println!(\"\\n=== 示例 2：图遍历 ===\");\n    traversal_example();\n\n    // 示例 3：最短路径\n    println!(\"\\n=== 示例 3：最短路径 (Dijkstra) ===\");\n    shortest_path_example();\n\n    // 示例 4：PageRank\n    println!(\"\\n=== 示例 4：PageRank ===\");\n    pagerank_example();\n\n    // 示例 5：图生成器\n    println!(\"\\n=== 示例 5：网格图生成 ===\");\n    generator_example();\n\n    // 示例 6：DOT 导出\n    println!(\"\\n=== 示例 6：DOT 格式导出 ===\");\n    export_example();\n}\n\n/// 基本图操作示例\nfn basic_graph_example() {\n    // 使用构建器创建图\n    let graph = GraphBuilder::directed()\n        .with_node(\"北京\")\n        .with_node(\"上海\")\n        .with_node(\"广州\")\n        .with_node(\"深圳\")\n        .with_edge(0, 1, 1200.0) // 北京 -\u003e 上海\n        .with_edge(0, 2, 2100.0) // 北京 -\u003e 广州\n        .with_edge(1, 3, 1400.0) // 上海 -\u003e 深圳\n        .with_edge(2, 3, 150.0)  // 广州 -\u003e 深圳\n        .build()\n        .expect(\"图构建失败\");\n\n    println!(\"节点数：{}\", graph.node_count());\n    println!(\"边数：{}\", graph.edge_count());\n\n    // 访问节点\n    let beijing = graph.nodes().next().unwrap().index();\n    println!(\"城市：{}\", graph[beijing]);\n\n    // 遍历邻居\n    print!(\"北京的邻居：\");\n    for neighbor in graph.neighbors(beijing) {\n        print!(\"{} \", graph[neighbor]);\n    }\n    println!();\n}\n\n/// 图遍历示例\nfn traversal_example() {\n    let graph = GraphBuilder::directed()\n        .with_nodes(vec![\"A\", \"B\", \"C\", \"D\", \"E\"])\n        .with_edges(vec![\n            (0, 1, 1.0),\n            (0, 2, 1.0),\n            (1, 3, 1.0),\n            (2, 3, 1.0),\n            (3, 4, 1.0),\n        ])\n        .build()\n        .unwrap();\n\n    let start = graph.nodes().next().unwrap().index();\n\n    // DFS\n    print!(\"DFS 遍历：\");\n    dfs(\u0026graph, start, |node| {\n        print!(\"{} \", graph[node]);\n        true\n    });\n    println!();\n\n    // BFS\n    print!(\"BFS 遍历：\");\n    bfs(\u0026graph, start, |node, depth| {\n        print!(\"{}(d={}) \", graph[node], depth);\n        true\n    });\n    println!();\n\n    // 拓扑排序\n    match topological_sort(\u0026graph) {\n        Ok(order) =\u003e {\n            print!(\"拓扑排序：\");\n            for node in order {\n                print!(\"{} \", graph[node]);\n            }\n            println!();\n        }\n        Err(e) =\u003e println!(\"拓扑排序失败：{}\", e),\n    }\n}\n\n/// 最短路径示例\nfn shortest_path_example() {\n    let graph = GraphBuilder::directed()\n        .with_nodes(vec![\"A\", \"B\", \"C\", \"D\"])\n        .with_edges(vec![\n            (0, 1, 1.0),\n            (0, 2, 4.0),\n            (1, 2, 2.0),\n            (1, 3, 5.0),\n            (2, 3, 1.0),\n        ])\n        .build()\n        .unwrap();\n\n    let start = graph.nodes().next().unwrap().index();\n\n    match dijkstra(\u0026graph, start, |_, _, w| *w) {\n        Ok(distances) =\u003e {\n            println!(\"从 A 到各节点的最短距离:\");\n            for (node, dist) in \u0026distances {\n                println!(\"  {}: {:.1}\", graph[*node], dist);\n            }\n        }\n        Err(e) =\u003e println!(\"Dijkstra 失败：{}\", e),\n    }\n}\n\n/// PageRank 示例\nfn pagerank_example() {\n    let graph = GraphBuilder::directed()\n        .with_nodes(vec![\"网页 A\", \"网页 B\", \"网页 C\", \"网页 D\"])\n        .with_edges(vec![\n            (0, 1, 1.0),\n            (0, 2, 1.0),\n            (1, 2, 1.0),\n            (2, 0, 1.0),\n            (2, 3, 1.0),\n            (3, 2, 1.0),\n        ])\n        .build()\n        .unwrap();\n\n    let ranks = pagerank(\u0026graph, 0.85, 20);\n\n    println!(\"PageRank 分数:\");\n    let mut sorted: Vec\u003c_\u003e = ranks.iter().collect();\n    sorted.sort_by(|a, b| b.1.partial_cmp(a.1).unwrap());\n    for (node, rank) in sorted {\n        println!(\"  {}: {:.4}\", graph[*node], rank);\n    }\n}\n\n/// 图生成器示例\nfn generator_example() {\n    // 生成 3x3 网格图\n    let graph = grid_graph::\u003cString\u003e(3, 3, false);\n    println!(\"3x3 网格图:\");\n    println!(\"  节点数：{}\", graph.node_count());\n    println!(\"  边数：{}\", graph.edge_count());\n\n    // 生成完全图 K5\n    let graph = complete_graph::\u003cString\u003e(5);\n    println!(\"\\n完全图 K5:\");\n    println!(\"  节点数：{}\", graph.node_count());\n    println!(\"  边数：{}\", graph.edge_count());\n}\n\n/// DOT 导出示例\nfn export_example() {\n    let graph = GraphBuilder::directed()\n        .with_node(\"A\")\n        .with_node(\"B\")\n        .with_node(\"C\")\n        .with_edge(0, 1, 1.0)\n        .with_edge(1, 2, 1.0)\n        .with_edge(2, 0, 1.0)\n        .build()\n        .unwrap();\n\n    let dot = to_dot(\u0026graph);\n    println!(\"DOT 格式:\");\n    println!(\"{}\", dot);\n}\n","traces":[{"line":6,"address":[3888784],"length":1,"stats":{"Line":0}},{"line":7,"address":[3888785],"length":1,"stats":{"Line":0}},{"line":10,"address":[3888814],"length":1,"stats":{"Line":0}},{"line":11,"address":[3888843],"length":1,"stats":{"Line":0}},{"line":14,"address":[3888848],"length":1,"stats":{"Line":0}},{"line":15,"address":[3888877],"length":1,"stats":{"Line":0}},{"line":18,"address":[3888882],"length":1,"stats":{"Line":0}},{"line":19,"address":[3888911],"length":1,"stats":{"Line":0}},{"line":22,"address":[3 数防止 ABA 问题\n\nuse core::fmt;\nuse core::hash::{Hash, Hasher};\n\n#[cfg(feature = \"serde\")]\nuse serde::{Serialize, Deserialize};\n\n/// 节点索引：稳定引用节点的句柄\n///\n/// 包含槽位索引和 generation 计数，确保删除后不会错误访问新节点\n#[derive(Copy, Clone, PartialEq, Eq, PartialOrd, Ord)]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\npub struct NodeIndex {\n    /// 在 Arena 中的槽位索引\n    pub(crate) index: usize,\n    /// Generation 计数器，防止 ABA 问题\n    pub(crate) generation: u32,\n}\n\nimpl NodeIndex {\n    /// 创建新的 NodeIndex（内部使用）\n    #[inline]\n    pub(crate) fn new(index: usize, generation: u32) -\u003e Self {\n        Self { index, generation }\n    }\n\n    /// 获取槽位索引\n    #[inline]\n    pub fn index(\u0026self) -\u003e usize {\n        self.index\n    }\n\n    /// 获取 generation 计数\n    #[inline]\n    pub fn generation(\u0026self) -\u003e u32 {\n        self.generation\n    }\n\n    /// 检查索引是否有效（用于内部验证）\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn is_valid(\u0026self) -\u003e bool {\n        self.index != usize::MAX\n    }\n\n    /// 创建无效索引\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn invalid() -\u003e Self {\n        Self {\n            index: usize::MAX,\n            generation: 0,\n        }\n    }\n}\n\nimpl fmt::Debug for NodeIndex {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"NodeIndex({}, {})\", self.index, self.generation)\n    }\n}\n\nimpl fmt::Display for NodeIndex {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}\", self.index)\n    }\n}\n\nimpl Hash for NodeIndex {\n    fn hash\u003cH: Hasher\u003e(\u0026self, state: \u0026mut H) {\n        self.index.hash(state);\n        self.generation.hash(state);\n    }\n}\n\n/// 节点引用：对图中节点的借用引用\n///\n/// 包含节点索引和对节点数据的引用，生命周期与图绑定\npub struct NodeRef\u003c'a, T\u003e {\n    /// 节点索引\n    pub index: NodeIndex,\n    /// 节点数据引用\n    pub data: \u0026'a T,\n}\n\nimpl\u003c'a, T\u003e NodeRef\u003c'a, T\u003e {\n    /// 创建新的 NodeRef\n    #[inline]\n    pub fn new(index: NodeIndex, data: \u0026'a T) -\u003e Self {\n        Self { index, data }\n    }\n\n    /// 获取节点索引\n    #[inline]\n    pub fn index(\u0026self) -\u003e NodeIndex {\n        self.index\n    }\n\n    /// 获取节点数据引用\n    #[inline]\n    pub fn data(\u0026self) -\u003e \u0026'a T {\n        self.data\n    }\n\n    /// 解引用到节点数据\n    #[inline]\n    pub fn get(\u0026self) -\u003e \u0026'a T {\n        self.data\n    }\n}\n\nimpl\u003c'a, T\u003e Clone for NodeRef\u003c'a, T\u003e {\n    fn clone(\u0026self) -\u003e Self {\n        *self\n    }\n}\n\nimpl\u003c'a, T\u003e Copy for NodeRef\u003c'a, T\u003e {}\n\nimpl\u003c'a, T\u003e fmt::Debug for NodeRef\u003c'a, T\u003e\nwhere\n    T: fmt::Debug,\n{\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"NodeRef\")\n            .field(\"index\", \u0026self.index)\n            .field(\"data\", self.data)\n            .finish()\n    }\n}\n\n/// 节点存储槽位\n///\n/// 包含 generation 计数和可选数据，支持安全的删除和复用\n/// 使用 64 字节对齐，避免 false sharing\n#[derive(Debug)]\n#[cfg_attr(feature = \"serde\", derive(Serialize, Deserialize))]\n#[cfg_attr(feature = \"serde\", serde(bound(\n    serialize = \"T: Serialize\",\n    deserialize = \"T: Deserialize\u003c'de\u003e\"\n)))]\n#[repr(align(64))]\npub(crate) struct NodeSlot\u003cT\u003e {\n    /// Generation 计数器，每次分配递增\n    pub generation: u32,\n    /// 节点数据，None 表示已删除\n    pub data: Option\u003cT\u003e,\n}\n\nimpl\u003cT\u003e Clone for NodeSlot\u003cT\u003e {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            generation: self.generation,\n            data: None, // 不克隆数据，因为 Clone 通常用于图结构克隆\n        }\n    }\n}\n\nimpl\u003cT\u003e NodeSlot\u003cT\u003e {\n    /// 创建新的节点槽位\n    #[inline]\n    pub(crate) fn new(generation: u32, data: T) -\u003e Self {\n        Self {\n            generation,\n            data: Some(data),\n        }\n    }\n\n    /// 创建已删除的槽位\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn deleted(generation: u32) -\u003e Self {\n        Self {\n            generation,\n            data: None,\n        }\n    }\n\n    /// 检查槽位是否被占用\n    #[inline]\n    pub(crate) fn is_occupied(\u0026self) -\u003e bool {\n        self.data.is_some()\n    }\n\n    /// 获取数据引用\n    #[inline]\n    pub(crate) fn data(\u0026self) -\u003e Option\u003c\u0026T\u003e {\n        self.data.as_ref()\n    }\n\n    /// 获取数据可变引用\n    #[inline]\n    #[allow(dead_code)]\n    pub(crate) fn data_mut(\u0026mut self) -\u003e Option\u003c\u0026mut T\u003e {\n        self.data.as_mut()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_node_index_creation() {\n        let idx = NodeIndex::new(42, 1);\n        assert_eq!(idx.index(), 42);\n        assert_eq!(idx.generation(), 1);\n        assert!(idx.is_valid());\n    }\n\n    #[test]\n    fn test_node_index_invalid() {\n        let idx = NodeIndex::invalid();\n        assert!(!idx.is_valid());\n        assert_eq!(idx.index(), usize::MAX);\n    }\n\n    #[test]\n    fn test_node_index_hash() {\n        use core::hash::{Hash, Hasher};\n        use std::collections::hash_map::DefaultHasher;\n\n        let idx1 = NodeIndex::new(42, 1);\n        let idx2 = NodeIndex::new(42, 1);\n        let idx3 = NodeIndex::new(42, 2);\n\n        let mut h1 = DefaultHasher::new();\n        let mut h2 = DefaultHasher::new();\n        let mut h3 = DefaultHasher::new();\n\n        idx1.hash(\u0026mut h1);\n        idx2.hash(\u0026mut h2);\n        idx3.hash(\u0026mut h3);\n\n        assert_eq!(h1.finish(), h2.finish());\n        assert_ne!(h1.finish(), h3.finish());\n    }\n\n    #[test]\n    fn test_node_slot() {\n        let mut slot = NodeSlot::new(1, \"test\");\n        assert!(slot.is_occupied());\n        assert_eq!(slot.data(), Some(\u0026\"test\"));\n        assert_eq!(slot.data_mut(), Some(\u0026mut \"test\"));\n\n        let deleted: NodeSlot\u003c\u0026str\u003e = NodeSlot::deleted(1);\n        assert!(!deleted.is_occupied());\n        assert_eq!(deleted.data(), None);\n    }\n}\n","traces":[{"line":26,"address":[3890096],"length":1,"stats":{"Line":33}},{"line":32,"address":[4222496],"length":1,"stats":{"Line":25}},{"line":33,"address":[4363461],"length":1,"stats":{"Line":25}},{"line":38,"address":[4222464],"length":1,"stats":{"Line":18}},{"line":39,"address":[5938997],"length":1,"stats":{"Line":18}},{"line":45,"address":[4363488],"length":1,"stats":{"Line":1}},{"line":46,"address":[6879349],"length":1,"stats":{"Line":1}},{"line":52,"address":[4363472],"length":1,"stats":{"Line":1}},{"line":61,"address":[6878800],"length":1,"stats":{"Line":0}},{"line":62,"address":[4222009],"length":1,"stats":{"Line":0}},{"line":67,"address":[6878976],"length":1,"stats":{"Line":1}},{"line":68,"address":[4124281],"length":1,"stats":{"Line":1}},{"line":73,"address":[4927936],"length":1,"stats":{"Line":3}},{"line":74,"address":[3863000],"length":1,"stats":{"Line":4}},{"line":75,"address":[3863016],"length":1,"stats":{"Line":3}},{"line":92,"address":[3864272,3864240],"length":1,"stats":{"Line":8}},{"line":98,"address":[3822944],"length":1,"stats":{"Line":10}},{"line":99,"address":[3864309,3864325],"length":1,"stats":{"Line":10}},{"line":104,"address":[3822928],"length":1,"stats":{"Line":1}},{"line":105,"address":[4928117,4928101],"length":1,"stats":{"Line":1}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":111,"address":[],"length":0,"stats":{"Line":0}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":0}},{"line":127,"address":[],"length":0,"stats":{"Line":0}},{"line":128,"address":[],"length":0,"stats":{"Line":0}},{"line":129,"address":[],"length":0,"stats":{"Line":0}},{"line":130,"address":[],"length":0,"stats":{"Line":0}},{"line":154,"address":[3863040],"length":1,"stats":{"Line":1}},{"line":156,"address":[],"length":0,"stats":{"Line":1}},{"line":165,"address":[3823024,3822992],"length":1,"stats":{"Line":42}},{"line":168,"address":[],"length":0,"stats":{"Line":2}},{"line":175,"address":[],"length":0,"stats":{"Line":1}},{"line":184,"address":[4928208,4928192,4928176],"length":1,"stats":{"Line":29}},{"line":185,"address":[4928197,4928213,4928181],"length":1,"stats":{"Line":32}},{"line":190,"address":[3823088],"length":1,"stats":{"Line":21}},{"line":191,"address":[3823093],"length":1,"stats":{"Line":11}},{"line":197,"address":[],"length":0,"stats":{"Line":1}},{"line":198,"address":[],"length":0,"stats":{"Line":1}}],"covered":29,"coverable":39},{"path":["/","home","hugo","codes","god-gragh","src","prelude.rs"],"content":"//! Prelude 模块\n//!\n//! 提供常用的导入，方便使用\n\npub use crate::graph::Graph;\npub use crate::graph::traits::{Direction, GraphBase, GraphOps, GraphQuery};\npub use crate::graph::builders::GraphBuilder;\npub use crate::node::{NodeIndex, NodeRef};\npub use crate::edge::{EdgeIndex, EdgeRef};\npub use crate::errors::{GraphError, GraphResult};\n\n// 常用算法\npub use crate::algorithms::traversal::{bfs, dfs, topological_sort, all_paths};\npub use crate::algorithms::shortest_path::{dijkstra, bellman_ford, astar};\npub use crate::algorithms::centrality::{pagerank, degree_centrality};\npub use crate::algorithms::community::connected_components;\npub use crate::algorithms::properties::{\n    is_connected, is_bipartite, is_dag, is_tree, has_cycle, diameter, density,\n};\n\n// 常用图生成器\npub use crate::generators::{\n    grid_graph, complete_graph, tree_graph, erdos_renyi_graph,\n};\n\n// 导出工具\npub use crate::export::{to_dot, to_adjacency_list, to_edge_list};\n\n// 工具\npub use crate::utils::{Arena, Padded};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hugo","codes","god-gragh","src","utils","arena.rs"],"content":"//! Arena 分配器模块\n//!\n//! 提供高效的内存分配策略，支持对象复用和稳定索引\n//!\n//! ## 特性\n//!\n//! - **O(1) 分配和释放**: 使用空闲列表实现常数时间复杂度\n//! - **缓存友好**: 64 字节对齐，避免 false sharing\n//! - **稳定索引**: generation 计数防止 ABA 问题\n//! - **内存连续**: 数据连续存储，优化 CPU 缓存命中率\n//!\n//! ## 使用示例\n//!\n//! ```\n//! # fn main() {\n//! use god_gragh::utils::arena::{Arena, Slot};\n//!\n//! let mut arena = Arena::new();\n//! let (idx, generation) = arena.allocate(42);\n//! assert_eq!(arena.get(idx, generation), Some(\u002642));\n//!\n//! // 释放后 generation 递增\n//! arena.deallocate(idx, generation);\n//! assert!(arena.get(idx, generation).is_none()); // 旧 generation 失效\n//! # }\n//! ```\n\nuse std::marker::PhantomData;\nuse std::fmt;\n\n/// 缓存行大小，用于对齐优化\n#[allow(dead_code)]\nconst CACHE_LINE_SIZE: usize = 64;\n\n/// 单个槽位，存储数据和 generation 计数\n///\n/// `generation` 用于检测 ABA 问题：\n/// - 每次分配时递增\n/// - 释放后索引失效，因为 generation 不匹配\n#[derive(Clone, Debug)]\npub struct Slot\u003cT\u003e {\n    /// 存储的数据，None 表示槽位已释放\n    pub data: Option\u003cT\u003e,\n    /// 代数计数器，每次分配递增\n    pub generation: u32,\n}\n\nimpl\u003cT\u003e Slot\u003cT\u003e {\n    /// 创建新槽位\n    pub fn new(data: T, generation: u32) -\u003e Self {\n        Self {\n            data: Some(data),\n            generation,\n        }\n    }\n\n    /// 检查槽位是否被占用\n    #[inline]\n    pub fn is_occupied(\u0026self) -\u003e bool {\n        self.data.is_some()\n    }\n\n    /// 获取数据引用\n    #[inline]\n    pub fn data(\u0026self) -\u003e Option\u003c\u0026T\u003e {\n        self.data.as_ref()\n    }\n\n    /// 获取可变数据引用\n    #[inline]\n    pub fn data_mut(\u0026mut self) -\u003e Option\u003c\u0026mut T\u003e {\n        self.data.as_mut()\n    }\n\n    /// 替换数据并返回旧数据\n    #[inline]\n    pub fn replace(\u0026mut self, new_data: T) -\u003e Option\u003cT\u003e {\n        self.data.replace(new_data)\n    }\n\n    /// 清空数据\n    #[inline]\n    pub fn clear(\u0026mut self) -\u003e Option\u003cT\u003e {\n        self.data.take()\n    }\n}\n\n/// Arena 分配器\n///\n/// 特点：\n/// - O(1) 分配和释放\n/// - 内存连续，cache-friendly\n/// - 支持对象复用（通过空闲列表）\n/// - generation 计数防止 ABA 问题\n///\n/// ## 类型参数\n///\n/// - `T`: 存储的数据类型\n///\n/// ## 示例\n///\n/// ```\n/// use god_gragh::utils::arena::Arena;\n///\n/// let mut arena = Arena::with_capacity(100);\n/// let (idx, generation) = arena.allocate(\"hello\".to_string());\n/// assert_eq!(arena.get(idx, generation), Some(\u0026\"hello\".to_string()));\n/// ```\npub struct Arena\u003cT\u003e {\n    /// 存储槽位\n    slots: Vec\u003cSlot\u003cT\u003e\u003e,\n    /// 空闲列表（已删除槽位的索引）\n    free_list: Vec\u003cusize\u003e,\n    _marker: PhantomData\u003cT\u003e,\n}\n\nimpl\u003cT\u003e fmt::Debug for Arena\u003cT\u003e {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"Arena\")\n            .field(\"len\", \u0026self.len())\n            .field(\"capacity\", \u0026self.capacity())\n            .field(\"free_list_len\", \u0026self.free_list.len())\n            .finish()\n    }\n}\n\nimpl\u003cT\u003e Arena\u003cT\u003e {\n    /// 创建新的 Arena\n    pub fn new() -\u003e Self {\n        Self {\n            slots: Vec::new(),\n            free_list: Vec::new(),\n            _marker: PhantomData,\n        }\n    }\n\n    /// 创建预分配容量的 Arena\n    pub fn with_capacity(capacity: usize) -\u003e Self {\n        Self {\n            slots: Vec::with_capacity(capacity),\n            free_list: Vec::with_capacity(capacity),\n            _marker: PhantomData,\n        }\n    }\n\n    /// 分配新对象，返回 (索引，generation)\n    ///\n    /// ## 复杂度\n    ///\n    /// - 时间：O(1) 摊销\n    /// - 空间：O(1)\n    #[inline]\n    pub fn allocate(\u0026mut self, value: T) -\u003e (usize, u32) {\n        if let Some(index) = self.free_list.pop() {\n            // 复用空闲槽位\n            let slot = \u0026mut self.slots[index];\n            let new_generation = slot.generation.wrapping_add(1);\n            *slot = Slot::new(value, new_generation);\n            (index, new_generation)\n        } else {\n            // 分配新槽位\n            let index = self.slots.len();\n            let generation = 1u32;\n            self.slots.push(Slot::new(value, generation));\n            (index, generation)\n        }\n    }\n\n    /// 释放对象\n    ///\n    /// ## 参数\n    ///\n    /// - `index`: 槽位索引\n    /// - `generation`: 当前 generation，用于验证\n    ///\n    /// ## 返回值\n    ///\n    /// - `Some(T)`: 成功释放，返回数据\n    /// - `None`: 索引无效或 generation 不匹配\n    #[inline]\n    pub fn deallocate(\u0026mut self, index: usize, generation: u32) -\u003e Option\u003cT\u003e {\n        if index \u003e= self.slots.len() {\n            return None;\n        }\n\n        let slot = \u0026mut self.slots[index];\n        if slot.generation != generation {\n            return None; // generation 不匹配\n        }\n\n        let value = slot.data.take()?;\n        self.free_list.push(index);\n        Some(value)\n    }\n\n    /// 获取对象引用\n    ///\n    /// ## 参数\n    ///\n    /// - `index`: 槽位索引\n    /// - `generation`: 用于验证的 generation\n    #[inline]\n    pub fn get(\u0026self, index: usize, generation: u32) -\u003e Option\u003c\u0026T\u003e {\n        self.slots\n            .get(index)\n            .filter(|slot| slot.generation == generation \u0026\u0026 slot.is_occupied())\n            .and_then(|slot| slot.data())\n    }\n\n    /// 获取对象可变引用\n    #[inline]\n    pub fn get_mut(\u0026mut self, index: usize, generation: u32) -\u003e Option\u003c\u0026mut T\u003e {\n        self.slots\n            .get_mut(index)\n            .filter(|slot| slot.generation == generation \u0026\u0026 slot.is_occupied())\n            .and_then(|slot| slot.data_mut())\n    }\n\n    /// 检查索引是否有效\n    #[inline]\n    pub fn is_valid(\u0026self, index: usize, generation: u32) -\u003e bool {\n        self.slots\n            .get(index)\n            .is_some_and(|slot| slot.generation == generation \u0026\u0026 slot.is_occupied())\n    }\n\n    /// 获取槽位引用（用于高级操作）\n    #[inline]\n    pub fn get_slot(\u0026self, index: usize) -\u003e Option\u003c\u0026Slot\u003cT\u003e\u003e {\n        self.slots.get(index)\n    }\n\n    /// 获取槽位可变引用\n    #[inline]\n    pub fn get_slot_mut(\u0026mut self, index: usize) -\u003e Option\u003c\u0026mut Slot\u003cT\u003e\u003e {\n        self.slots.get_mut(index)\n    }\n\n    /// 清空 Arena，但不释放内存\n    #[inline]\n    pub fn clear(\u0026mut self) {\n        for slot in \u0026mut self.slots {\n            slot.data = None;\n        }\n        self.free_list.clear();\n        for i in 0..self.slots.len() {\n            self.free_list.push(i);\n        }\n    }\n\n    /// 完全清空 Arena，释放所有内存\n    #[inline]\n    pub fn drain(\u0026mut self) {\n        self.slots.clear();\n        self.free_list.clear();\n    }\n\n    /// 获取已分配对象数量\n    #[inline]\n    pub fn len(\u0026self) -\u003e usize {\n        self.slots.len() - self.free_list.len()\n    }\n\n    /// 检查是否为空\n    #[inline]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.len() == 0\n    }\n\n    /// 获取总容量（包括空闲槽位）\n    #[inline]\n    pub fn capacity(\u0026self) -\u003e usize {\n        self.slots.capacity()\n    }\n\n    /// 获取槽位总数\n    #[inline]\n    pub fn num_slots(\u0026self) -\u003e usize {\n        self.slots.len()\n    }\n\n    /// 获取空闲槽位数量\n    #[inline]\n    pub fn num_free(\u0026self) -\u003e usize {\n        self.free_list.len()\n    }\n\n    /// 预分配容量\n    #[inline]\n    pub fn reserve(\u0026mut self, additional: usize) {\n        self.slots.reserve(additional);\n        self.free_list.reserve(additional);\n    }\n\n    /// 压缩空闲列表，回收内存\n    ///\n    /// 当空闲列表过大时调用，可以减少内存占用\n    pub fn shrink_to_fit(\u0026mut self) {\n        self.free_list.shrink_to_fit();\n        self.slots.shrink_to_fit();\n    }\n\n    /// 迭代所有已分配的槽位\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = (usize, u32, \u0026T)\u003e {\n        self.slots.iter().enumerate().filter_map(|(idx, slot)| {\n            if slot.is_occupied() {\n                Some((idx, slot.generation, slot.data.as_ref().unwrap()))\n            } else {\n                None\n            }\n        })\n    }\n\n    /// 迭代所有槽位（包括空闲的）\n    pub fn iter_all(\u0026self) -\u003e impl Iterator\u003cItem = (usize, \u0026Slot\u003cT\u003e)\u003e {\n        self.slots.iter().enumerate()\n    }\n}\n\nimpl\u003cT\u003e Default for Arena\u003cT\u003e {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_arena_allocate() {\n        let mut arena = Arena::new();\n        let (idx, generation) = arena.allocate(42);\n        assert_eq!(arena.get(idx, generation), Some(\u002642));\n        assert_eq!(generation, 1);\n    }\n\n    #[test]\n    fn test_arena_deallocate() {\n        let mut arena = Arena::new();\n        let (idx, generation) = arena.allocate(42);\n        let value = arena.deallocate(idx, generation);\n        assert_eq!(value, Some(42));\n        assert_eq!(arena.get(idx, generation), None);\n    }\n\n    #[test]\n    fn test_arena_reuse() {\n        let mut arena = Arena::new();\n        let (idx1, gen1) = arena.allocate(1);\n        let _ = arena.deallocate(idx1, gen1);\n        let (idx2, gen2) = arena.allocate(2);\n\n        // idx2 应该复用 idx1 的槽位\n        assert_eq!(idx2, idx1);\n        // generation 应该递增\n        assert_eq!(gen2, gen1 + 1);\n        assert!(arena.get(idx2, gen2).is_some());\n        assert!(arena.get(idx2, gen1).is_none());\n    }\n\n    #[test]\n    fn test_arena_is_valid() {\n        let mut arena = Arena::new();\n        let (idx, generation) = arena.allocate(42);\n        \n        assert!(arena.is_valid(idx, generation));\n        assert!(!arena.is_valid(idx, generation + 1)); // generation 不匹配\n        assert!(!arena.is_valid(idx + 1, generation)); // 索引越界\n        \n        arena.deallocate(idx, generation);\n        assert!(!arena.is_valid(idx, generation)); // 已释放\n    }\n\n    #[test]\n    fn test_arena_len_and_capacity() {\n        let mut arena = Arena::with_capacity(10);\n        assert_eq!(arena.len(), 0);\n        assert!(arena.is_empty());\n        assert!(arena.capacity() \u003e= 10);\n        \n        let (idx, generation) = arena.allocate(1);\n        assert_eq!(arena.len(), 1);\n        assert!(!arena.is_empty());\n        \n        arena.deallocate(idx, generation);\n        assert_eq!(arena.len(), 0);\n    }\n\n    #[test]\n    fn test_arena_clear() {\n        let mut arena = Arena::new();\n        let (idx1, _) = arena.allocate(1);\n        let (idx2, _) = arena.allocate(2);\n        \n        arena.clear();\n        \n        assert!(arena.is_empty());\n        assert!(!arena.is_valid(idx1, 1));\n        assert!(!arena.is_valid(idx2, 1));\n    }\n\n    #[test]\n    fn test_arena_iter() {\n        let mut arena = Arena::new();\n        let (idx1, gen1) = arena.allocate(1);\n        let (idx2, gen2) = arena.allocate(2);\n        let (idx3, gen3) = arena.allocate(3);\n        \n        arena.deallocate(idx2, gen2);\n        \n        let items: Vec\u003c_\u003e = arena.iter().collect();\n        assert_eq!(items.len(), 2);\n        assert!(items.iter().any(|(i, g, v)| *i == idx1 \u0026\u0026 *g == gen1 \u0026\u0026 **v == 1));\n        assert!(items.iter().any(|(i, g, v)| *i == idx3 \u0026\u0026 *g == gen3 \u0026\u0026 **v == 3));\n    }\n\n    #[test]\n    fn test_arena_generation_wrap() {\n        let mut arena = Arena::new();\n        let (idx, mut generation) = arena.allocate(42);\n        \n        // 模拟多次分配/释放，测试 generation 回绕\n        for _ in 0..10 {\n            arena.deallocate(idx, generation);\n            let (_, new_generation) = arena.allocate(100);\n            generation = new_generation;\n        }\n        \n        // 仍然可以正常访问\n        assert!(arena.is_valid(idx, generation));\n    }\n\n    #[test]\n    fn test_arena_get_mut() {\n        let mut arena = Arena::new();\n        let (idx, generation) = arena.allocate(42);\n        \n        if let Some(val) = arena.get_mut(idx, generation) {\n            *val = 100;\n        }\n        \n        assert_eq!(arena.get(idx, generation), Some(\u0026100));\n    }\n\n    #[test]\n    fn test_arena_with_capacity() {\n        let mut arena = Arena::\u003ci32\u003e::with_capacity(100);\n        assert!(arena.is_empty());\n        assert!(arena.capacity() \u003e= 100);\n        \n        // 预分配后应该不需要重新分配\n        for i in 0..100 {\n            arena.allocate(i);\n        }\n        assert_eq!(arena.len(), 100);\n    }\n}\n","traces":[{"line":50,"address":[],"length":0,"stats":{"Line":3}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[4632208],"length":1,"stats":{"Line":1}},{"line":60,"address":[],"length":0,"stats":{"Line":1}},{"line":65,"address":[],"length":0,"stats":{"Line":2}},{"line":66,"address":[],"length":0,"stats":{"Line":1}},{"line":71,"address":[],"length":0,"stats":{"Line":1}},{"line":72,"address":[4632277],"length":1,"stats":{"Line":1}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":118,"address":[],"length":0,"stats":{"Line":0}},{"line":119,"address":[],"length":0,"stats":{"Line":0}},{"line":120,"address":[],"length":0,"stats":{"Line":0}},{"line":121,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[],"length":0,"stats":{"Line":0}},{"line":129,"address":[4633160,4633024,4633166],"length":1,"stats":{"Line":1}},{"line":131,"address":[4633043],"length":1,"stats":{"Line":1}},{"line":132,"address":[],"length":0,"stats":{"Line":1}},{"line":138,"address":[4632713,4632707,4632560],"length":1,"stats":{"Line":1}},{"line":140,"address":[4632589],"length":1,"stats":{"Line":1}},{"line":141,"address":[4632604],"length":1,"stats":{"Line":1}},{"line":153,"address":[],"length":0,"stats":{"Line":1}},{"line":154,"address":[4634288,4633919,4634002],"length":1,"stats":{"Line":7}},{"line":156,"address":[4634087,4634046],"length":1,"stats":{"Line":2}},{"line":157,"address":[],"length":0,"stats":{"Line":1}},{"line":158,"address":[],"length":0,"stats":{"Line":2}},{"line":159,"address":[4634177],"length":1,"stats":{"Line":2}},{"line":162,"addr
